<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(e=>console.warn('SW登録失敗:',e));
  });
}
function toast(msg,err){const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.className='toast show'+(err?' err':'');clearTimeout(t._tm);t._tm=setTimeout(()=>t.className='toast',2500);}
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap');
:root{
  --bg:#f5f6fa;--surface:#fff;--surface2:#fafbfc;--surface3:#f0f1f5;
  --text:#1a1d27;--text-dim:#5a6270;--text-faint:#8a92a0;
  --border:#d8dbe3;--border-light:#ecedf0;
  --accent:#06b6d4;--accent-dim:rgba(51,102,255,.1);
  --green:#2a9d5a;--green-dim:rgba(42,157,90,.1);
  --orange:#f59e0b;--orange-dim:rgba(245,158,11,.1);
  --red:#dc2626;--red-dim:rgba(220,38,38,.1);
  --purple:#8b5cf6;--purple-dim:rgba(139,92,246,.1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scrollbar-gutter:stable}
body{font:400 14px/1.5 'Noto Sans JP',-apple-system,sans-serif;color:var(--text);background:var(--bg);min-height:100vh;padding-top:48px}
.empty-msg{text-align:center;padding:40px 20px;color:var(--text-faint);font-size:13px}
.app{padding:16px}
.loading-overlay{position:fixed;inset:48px 0 0 0;background:rgba(255,255,255,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;color:var(--text-dim);font-size:14px;backdrop-filter:blur(2px)}
.loading-overlay .spin{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
.loading{text-align:center;padding:80px 20px;color:var(--text-dim);font-size:14px}
.loading .spin{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}

.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.av-search{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font:400 13px/1 'Noto Sans JP',sans-serif;width:220px}
.av-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.fv-sum{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap}
.fv-si{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;min-width:90px;text-align:center;cursor:pointer;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.fv-si:hover{border-color:var(--accent)}
.fv-si.on{border-color:var(--accent);background:var(--accent-dim)}
.fv-si .n{font-size:26px;font-weight:900;line-height:1.1}
.fv-si .l{font-size:11px;color:var(--text-dim);margin-top:2px}
.toolbar select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font:400 13px/1 'Noto Sans JP',sans-serif;background:var(--surface)}
.toolbar .count{font-size:12px;color:var(--text-dim);margin-left:auto}

table.jobs{width:100%;background:var(--surface);border-collapse:collapse;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
table.jobs th{background:var(--surface3);padding:10px 12px;text-align:left;font-size:12px;font-weight:700;color:var(--text-dim);border-bottom:1px solid var(--border)}
table.jobs td{padding:12px;border-bottom:1px solid var(--border-light);font-size:13px;cursor:pointer}
table.jobs tr:hover td{background:var(--accent-dim)}
table.jobs tr:last-child td{border-bottom:none}
.st-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600}
.st-見積中{background:var(--purple-dim);color:var(--purple)}
.st-受注{background:var(--accent-dim);color:var(--accent)}
.st-製作中{background:var(--orange-dim);color:var(--orange)}
.st-完成{background:var(--green-dim);color:var(--green)}
.st-出荷済{background:var(--surface3);color:var(--text-dim)}
.st-見送り{background:var(--red-dim);color:var(--red)}
.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.num strong{font-weight:700;color:var(--text)}
.mins-hint{color:var(--text-faint);font-size:11px;margin-left:4px}

/* モバイル用カード（PCでは非表示） */
.job-cards{display:none}
.job-card{background:var(--surface);border-radius:12px;padding:14px 16px;border-left:4px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04);cursor:pointer;margin-bottom:10px;transition:.15s}
.job-card:active{background:var(--accent-dim)}
.job-card .jc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.job-card .jc-name{font-weight:700;font-size:15px;line-height:1.4;color:var(--text)}
.job-card .jc-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:8px}
.job-card .jc-tag{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:600}
.job-card .jc-tag.eno{color:var(--accent);background:var(--accent-dim)}
.job-card .jc-tag.dl{color:var(--text-dim);background:var(--surface3)}
.job-card .jc-foot{display:flex;justify-content:space-between;align-items:baseline;padding-top:8px;border-top:1px solid var(--border-light)}
.job-card .jc-foot .jc-mins{font-size:18px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums}
.job-card .jc-foot .jc-mins small{font-size:11px;color:var(--text-faint);font-weight:500;margin-left:2px}
.job-card .jc-foot .jc-ppl{font-size:12px;color:var(--text-dim);font-weight:600}

/* モーダル */
.mo-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;justify-content:center;align-items:flex-start;padding:40px 16px;overflow-y:auto}
.mo-bg.show{display:flex}
.mo{background:var(--surface);border-radius:14px;padding:28px;width:100%;max-width:580px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mo h3{font-size:17px;font-weight:800;margin-bottom:6px}
.mh-sub{font-size:12px;color:var(--text-dim);margin-bottom:18px}
.mo-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;align-items:center}
.mo-foot button{padding:10px 22px;border-radius:8px;font:600 14px/1 'Noto Sans JP',sans-serif;cursor:pointer;border:1px solid var(--border)}
.mo-foot .cancel{background:var(--surface);color:var(--text-dim)}
.mb-total{background:var(--accent-dim);padding:12px 14px;border-radius:8px;margin-bottom:14px}
.mb-total .tt-label{font-size:11px;color:var(--text-dim);font-weight:600}
.mb-total .tt-val{font-size:20px;font-weight:800;color:var(--accent);margin-top:2px}
.mb-total .tt-val small{font-size:12px;color:var(--text-dim);font-weight:500;margin-left:6px}
.mb-list{display:flex;flex-direction:column;gap:8px}
.mb-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--surface2);border:1px solid var(--border-light);border-radius:8px}
.mb-row .mb-name{font-weight:600;color:var(--text)}
.mb-row .mb-mins{font-variant-numeric:tabular-nums;color:var(--text-dim)}
.mb-row .mb-mins strong{color:var(--text);font-weight:700}

.hdr{position:fixed;top:0;left:0;right:0;z-index:200;background:#fb7185;display:flex;align-items:stretch;height:48px;padding:0;gap:0}
.hdr-inner{display:flex;align-items:stretch;width:100%;padding:6px 8px 0 8px;gap:2px}
.nav-link{background:rgba(255,255,255,.04);border:none;color:rgba(74,14,31,.85);font:500 13px/1 'Noto Sans JP',sans-serif;padding:0 14px;border-radius:8px 8px 0 0;cursor:pointer;transition:background .15s,color .15s;text-decoration:none;display:inline-flex;align-items:center;margin-bottom:0;position:relative;white-space:nowrap}
.nav-link:hover{color:#4a0e1f;background:rgba(255,255,255,.1)}
.nav-link.on{background:var(--bg,#f5f6fa);color:#1a1d27;font-weight:700}
.nav-link.on::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--bg,#f5f6fa)}
.home-link{font-weight:700;display:inline-flex;align-items:center}
.hdr-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(74,14,31,.9);padding:0 14px;border-radius:6px;font:500 12px/1 'Noto Sans JP',sans-serif;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;height:32px;align-self:center;margin-left:4px}
.hdr-btn:hover{color:#4a0e1f;border-color:rgba(255,255,255,.5)}
.nav-menu-btn{background:rgba(255,255,255,.08);border:none;color:#4a0e1f;font-size:20px;line-height:1;padding:0 12px;border-radius:6px;cursor:pointer;height:32px;align-self:center;display:none}
.nav-menu-btn:hover{background:rgba(255,255,255,.18)}
.nav-spacer{flex:1}
.nav-right{display:contents}
@media(max-width:768px){
  .nav-spacer{display:none}
  .nav-right{display:contents}
  .nav-menu-btn{display:none}
  .hdr-inner{padding:6px 8px 0 8px;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .hdr-inner::-webkit-scrollbar{display:none}
  .nav-link{flex-shrink:0;font-size:12px;padding:0 11px}
  .hdr-btn{flex-shrink:0;font-size:11px;padding:0 11px;margin-left:8px}
  .hdr::after{content:'';position:absolute;top:0;right:0;width:22px;height:48px;background:linear-gradient(to right,transparent,#fb7185);pointer-events:none;z-index:1}
}


@media (max-width:768px){
  .app{padding:14px 10px}
  .av-search{min-width:auto;width:100%}
  table.jobs{display:none}
  .job-cards{display:block}
}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1d27;color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:500;z-index:400;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
.toast.err{background:#dc2626}
.sub-tabs{display:flex;gap:6px;padding:14px 16px;background:#f5f6fa}
.sub-tab{background:#f0f1f5;border:none;color:var(--text-dim);font:600 13px/1 'Noto Sans JP',sans-serif;padding:8px 16px;border-radius:999px;cursor:pointer;transition:.15s}
.sub-tab:hover{color:var(--text);background:#e2e5f0}
.sub-tab.on{background:#cffafe;color:#155e75}
@media(max-width:768px){
  .sub-tabs{padding:10px 16px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap}
  .sub-tabs::-webkit-scrollbar{display:none}
  .sub-tab{flex-shrink:0;padding:7px 14px;font-size:12px}
  .toast{bottom:16px;width:calc(100% - 32px);max-width:400px;font-size:12px;padding:11px 18px}
}



@media(max-width:768px){
  /* フィルター文字ピル化（管理タブと統一・PCはカードのまま） */
  .fv-sum{display:flex !important;flex-wrap:wrap;gap:6px;margin-bottom:16px}
  .fv-si{display:inline-flex !important;align-items:center;gap:5px;padding:7px 13px !important;min-width:0 !important;border-radius:999px !important;background:#f0f1f5;border:1px solid transparent;box-shadow:none;text-align:left}
  .fv-si .n{font-size:13px !important;font-weight:700;line-height:1;margin:0 !important;order:2}
  .fv-si .l{font-size:12px !important;font-weight:600;line-height:1;margin:0 !important;color:inherit;order:1}
  .fv-si.on{background:var(--accent-dim);border-color:var(--accent)}
}
</style>
</head>

<div class="hdr">
  <div class="hdr-inner">

    <a href="daily.html" class="nav-link">日報</a>

    <div class="nav-spacer"></div>
    <div class="nav-right">
      <a href="index.html" class="nav-link">生産</a>
      <a href="project.html" class="nav-link">企画制作</a><a href="sales.html" class="nav-link">販売</a>
      <a href="labor.html" class="nav-link on">工数</a>
      <a href="inventory.html" class="nav-link">在庫</a>

    </div>

  </div>
</div>
<div class="sub-tabs">

  </div>

<div class="app">
  <div class="av-top">
    <span class="count" id="countLabel"></span>
    <input class="av-search" type="search" id="searchBox" placeholder="検索..." oninput="renderTable()">
  </div>

  <div id="loader" class="loading-overlay"><div class="spin"></div><br>読み込み中...</div>
  <div id="content"></div>
</div>

<!-- 詳細モーダル -->
<div id="detailModal" class="mo-bg" onclick="if(event.target===this)closeDetail()">
  <div class="mo">
    <h3 id="dmTitle"></h3>
    <div class="mh-sub" id="dmSub"></div>
    <div id="dmBody"></div>
    <div class="mo-foot">
      <button class="cancel" onclick="closeDetail()">閉じる</button>
    </div>
  </div>
</div>

<script>
// モバイル：現在地タブを見える位置へ自動スクロール
function centerActiveNav(){
  try{
    if(window.innerWidth>768)return;
    const inner=document.querySelector('.hdr-inner');
    const on=document.querySelector('.hdr-inner .nav-link.on');
    if(inner&&on)on.scrollIntoView({inline:'center',block:'nearest'});
  }catch(e){}
}
window.addEventListener('load',centerActiveNav);

// ===== sessionStorage キャッシュ helper =====
function _getCache(key){
  try{const s=sessionStorage.getItem('seq_'+key);return s?JSON.parse(s):null;}catch(e){return null;}
}
function _setCache(key,data){
  try{sessionStorage.setItem('seq_'+key,JSON.stringify(data));}catch(e){}
}

const API='https://script.google.com/macros/s/AKfycbwD5F1rJcdg7pl1lnVXzyY0vttcO88z-YKUZWG3eLIT0DNMhFZw8jXbJoKW6wCIKEC7/exec';
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let allJobs=[];
let currentView='active';  // 'active' or 'archive'

// ステータスの表示順
// - active（工場ボード）：製作中→完成→受注→見積中→見送り
// - archive（出荷済）：出荷済のみ
const stOrderActive={'完成':1,'製作中':2,'受注':3,'見積中':4,'見送り':5};
const stOrderArchive={'出荷済':1};

function setView(v){
  currentView=v;
  document.querySelectorAll('.sub-tab').forEach(b=>{
    b.classList.toggle('on',b.dataset.view===v);
  });
  // archiveのときはステータスフィルタリセット（出荷済のみ表示なので）
  if(v==='archive')stFilter='';
  renderTable();
}

function fmtMin(min){
  if(!min)return '0分';
  const h=Math.floor(min/60),m=min%60;
  if(h===0)return min+'分';
  return min+'分 <span class="mins-hint">('+h+'時間'+(m?m+'分':'')+')</span>';
}

async function loadData(){
  // キャッシュから即復元
  const cached=_getCache('labor');
  if(cached&&cached.jobs){
    allJobs=cached.jobs;
    $('loader').classList.add('hidden');
    renderTable();
  }
  // 裏で最新取得
  try{
    const r=await fetch(API+'?dept=labor&action=read');
    const j=await r.json();
    if(j.success){
      allJobs=j.data||[];
    }else{
      allJobs=[];
    }
  }catch(e){
    allJobs=[];
  }
  $('loader').classList.add('hidden');
  _setCache('labor',{jobs:allJobs});
  renderTable();
}

// アクティブステータス（フィルタチップに出すもの）
const ACTIVE_ST=['見積中','受注','製作中','完成'];
let stFilter='';  // 空=すべて

function setStFilter(v){
  stFilter=v;
  renderTable();
}

function stColorVar(s){
  return{'見積中':'--purple','受注':'--blue','製作中':'--orange','完成':'--green','見送り':'--gray','出荷済':'--accent'}[s]||'--text';
}

function renderTable(){
  const kw=$('searchBox').value.trim().toLowerCase();
  const isArchive=currentView==='archive';
  // フィルタ前リストでカウント計算
  const allActive=allJobs.filter(j=>j.status!=='出荷済');
  const cnt={};ACTIVE_ST.forEach(s=>cnt[s]=0);
  allActive.forEach(j=>{if(cnt[j.status]!==undefined)cnt[j.status]++});
  const total=allActive.length;

  let list=allJobs.filter(j=>{
    // ビューによる振り分け
    if(isArchive){
      if(j.status!=='出荷済')return false;
    } else {
      if(j.status==='出荷済')return false;
      if(stFilter&&j.status!==stFilter)return false;
    }
    if(kw){
      const target=(j.project+' '+j.order_no+' '+j.estimate_no).toLowerCase();
      if(!target.includes(kw))return false;
    }
    return true;
  });
  // ソート：ビューごとに異なる順序 → 納期（新しい順＝直近が上、空欄は後ろ）
  const stOrder=isArchive?stOrderArchive:stOrderActive;
  list.sort((a,b)=>{
    const so=(stOrder[a.status]||99)-(stOrder[b.status]||99);
    if(so)return so;
    const ad=a.deadline||'';
    const bd=b.deadline||'';
    if(!ad&&!bd)return 0;
    if(!ad)return 1;
    if(!bd)return -1;
    return bd.localeCompare(ad);  // 降順
  });

  $('countLabel').textContent=list.length+'件';

  // フィルタチップHTML（アーカイブビューでは出さない）
  let chipHtml='';
  if(!isArchive){
    chipHtml='<div class="fv-sum">';
    chipHtml+=`<div class="fv-si${stFilter===''?' on':''}" onclick="setStFilter('')"><div class="n">${total}</div><div class="l">すべて</div></div>`;
    ACTIVE_ST.forEach(s=>{
      chipHtml+=`<div class="fv-si${stFilter===s?' on':''}" onclick="setStFilter('${s}')"><div class="n" style="color:var(${stColorVar(s)})">${cnt[s]||0}</div><div class="l">${s}</div></div>`;
    });
    chipHtml+='</div>';
  }

  if(!list.length){
    $('content').innerHTML=chipHtml+'<div class="empty-msg">該当する案件がありません</div>';
    return;
  }

  let h=chipHtml+'<table class="jobs"><thead><tr>';
  h+='<th>見積番号</th><th>受注番号</th><th>案件名</th><th>ステータス</th><th>納期</th><th class="num">延べ工数</th><th class="num">人数</th>';
  h+='</tr></thead><tbody>';
  list.forEach(j=>{
    h+=`<tr onclick="showDetail('${esc(j.id)}')">
      <td>${esc(j.estimate_no||'')}</td>
      <td>${esc(j.order_no||'')}</td>
      <td>${esc(j.project||'')}</td>
      <td><span class="st-badge st-${esc(j.status)}">${esc(j.status)}</span></td>
      <td>${esc(j.deadline||'')}</td>
      <td class="num"><strong>${fmtMin(j.total_minutes)}</strong></td>
      <td class="num">${j.people_count||0}人</td>
    </tr>`;
  });
  h+='</tbody></table>';

  // モバイル用カード（同じlistから生成、CSSで出し分け）
  h+='<div class="job-cards">';
  list.forEach(j=>{
    const no=j.order_no||j.estimate_no||'';
    h+=`<div class="job-card" onclick="showDetail('${esc(j.id)}')">
      <div class="jc-top">
        <div class="jc-name">${esc(j.project||'(案件名なし)')}</div>
        <span class="st-badge st-${esc(j.status)}">${esc(j.status)}</span>
      </div>
      <div class="jc-meta">
        ${no?`<span class="jc-tag eno">#${esc(no)}</span>`:''}
        ${j.deadline?`<span class="jc-tag dl">納期 ${esc(j.deadline)}</span>`:''}
      </div>
      <div class="jc-foot">
        <span class="jc-mins">${fmtMin(j.total_minutes)}<small>延べ工数</small></span>
        <span class="jc-ppl">${j.people_count||0}人</span>
      </div>
    </div>`;
  });
  h+='</div>';

  $('content').innerHTML=h;
}

function showDetail(id){
  const job=allJobs.find(x=>String(x.id)===String(id));
  if(!job)return;
  const no=job.order_no||job.estimate_no;
  $('dmTitle').textContent=(no?'#'+no+' ':'')+job.project;
  $('dmSub').innerHTML=`<span class="st-badge st-${esc(job.status)}">${esc(job.status)}</span>${job.deadline?' 　納期 '+esc(job.deadline):''}`;
  let h=`<div class="mb-total">
    <div class="tt-label">延べ工数</div>
    <div class="tt-val">${fmtMin(job.total_minutes)}<small>${job.people_count||0}人が関与</small></div>
  </div>`;
  if(job.by_employee&&job.by_employee.length){
    h+='<div class="mb-list">';
    job.by_employee.forEach(e=>{
      h+=`<div class="mb-row">
        <span class="mb-name">${esc(e.name)}</span>
        <span class="mb-mins">${fmtMin(e.minutes)}</span>
      </div>`;
    });
    h+='</div>';
  }else{
    h+='<div class="empty-msg">工数の記録はまだありません</div>';
  }
  $('dmBody').innerHTML=h;
  $('detailModal').classList.add('show');
}
function closeDetail(){$('detailModal').classList.remove('show')}

loadData();
// 自動更新：5分間隔、タブが見えてる時だけ、前回が走り切ってから
let _bgBusy=false;
setInterval(()=>{
  if(document.visibilityState!=='visible')return;
  if(_bgBusy)return;
  _bgBusy=true;
  Promise.resolve(loadData()).finally(()=>{_bgBusy=false});
},5*60*1000);

// 「↻ 更新」ボタン共通：連打防止＋進行表示
async function safeRefresh(btn, fn){
  if(!btn || btn.disabled) return;
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '↻ 更新中...';
  try{
    await Promise.resolve(fn());
    btn.innerHTML = '✓ 完了';
  }catch(e){
    btn.innerHTML = '⚠ 失敗';
  }finally{
    setTimeout(()=>{ btn.innerHTML = orig; btn.disabled = false; }, 1000);
  }
}

</script>
<div id="toast" class="toast"></div>
