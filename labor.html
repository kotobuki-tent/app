<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>工数管理 – 工程管理</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c2185b">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23c2185b'/><text x='16' y='23' text-anchor='middle' font-family='sans-serif' font-weight='900' font-size='18' fill='white'>工</text></svg>">
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(e=>console.warn('SW登録失敗:',e));
  });
}
</script>
<style>
:root{
  --bg:#f5f6fa;--surface:#fff;--surface2:#fafbfc;--surface3:#f0f1f5;
  --text:#1a1d27;--text-dim:#5a6270;--text-faint:#8a92a0;
  --border:#e0e2e8;--border-light:#ecedf0;
  --accent:#3366ff;--accent-dim:rgba(51,102,255,.1);
  --green:#2a9d5a;--green-dim:rgba(42,157,90,.1);
  --orange:#f59e0b;--orange-dim:rgba(245,158,11,.1);
  --red:#dc2626;--red-dim:rgba(220,38,38,.1);
  --purple:#8b5cf6;--purple-dim:rgba(139,92,246,.1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font:400 14px/1.5 'Noto Sans JP',-apple-system,sans-serif;color:var(--text);background:var(--bg);min-height:100vh;padding-top:48px}
.app{padding:24px}
.loading{display:flex;align-items:center;justify-content:center;gap:12px;padding:40px;color:var(--text-dim)}
.spin{width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}

.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toolbar input[type="search"]{padding:9px 12px;border:1px solid var(--border);border-radius:8px;font:400 13px/1 'Noto Sans JP',sans-serif;background:var(--surface);min-width:260px}
.toolbar select{padding:9px 12px;border:1px solid var(--border);border-radius:8px;font:400 13px/1 'Noto Sans JP',sans-serif;background:var(--surface)}
.toolbar .count{font-size:12px;color:var(--text-dim);margin-left:auto}

table.jobs{width:100%;background:var(--surface);border-collapse:collapse;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
table.jobs th{background:var(--surface3);padding:10px 12px;text-align:left;font-size:12px;font-weight:700;color:var(--text-dim);border-bottom:1px solid var(--border)}
table.jobs td{padding:12px;border-bottom:1px solid var(--border-light);font-size:13px;cursor:pointer}
table.jobs tr:hover td{background:var(--accent-dim)}
table.jobs tr:last-child td{border-bottom:none}
.st-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600}
.st-見積中{background:var(--purple-dim);color:var(--purple)}
.st-受注{background:var(--accent-dim);color:var(--accent)}
.st-製作中{background:var(--orange-dim);color:var(--orange)}
.st-完成{background:var(--green-dim);color:var(--green)}
.st-出荷済{background:var(--surface3);color:var(--text-dim)}
.st-見送り{background:var(--red-dim);color:var(--red)}
.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.num strong{font-weight:700;color:var(--text)}
.mins-hint{color:var(--text-faint);font-size:11px;margin-left:4px}
.no-data{text-align:center;color:var(--text-faint);padding:40px}

/* モーダル */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px}
.modal-bg.hidden{display:none}
.modal{background:var(--surface);border-radius:12px;max-width:500px;width:100%;max-height:85vh;overflow:auto}
.modal-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.modal-head h2{font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px}
.modal-head .mh-sub{font-size:12px;color:var(--text-dim)}
.modal-close{background:none;border:none;font-size:22px;color:var(--text-dim);cursor:pointer;line-height:1;padding:0 4px}
.modal-body{padding:18px 20px}
.mb-total{background:var(--accent-dim);padding:12px 14px;border-radius:8px;margin-bottom:14px}
.mb-total .tt-label{font-size:11px;color:var(--text-dim);font-weight:600}
.mb-total .tt-val{font-size:20px;font-weight:800;color:var(--accent);margin-top:2px}
.mb-total .tt-val small{font-size:12px;color:var(--text-dim);font-weight:500;margin-left:6px}
.mb-list{display:flex;flex-direction:column;gap:8px}
.mb-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--surface2);border:1px solid var(--border-light);border-radius:8px}
.mb-row .mb-name{font-weight:600;color:var(--text)}
.mb-row .mb-mins{font-variant-numeric:tabular-nums;color:var(--text-dim)}
.mb-row .mb-mins strong{color:var(--text);font-weight:700}

.hdr{position:fixed;top:0;left:0;right:0;z-index:200;background:#c2185b;display:flex;align-items:stretch;height:48px;padding:0;gap:0}
.hdr-inner{display:flex;align-items:stretch;width:100%;padding:6px 8px 0 8px;gap:2px}
.nav-link{background:rgba(255,255,255,.04);border:none;color:rgba(255,255,255,.55);font:500 13px/1 'Noto Sans JP',sans-serif;padding:0 14px;border-radius:8px 8px 0 0;cursor:pointer;transition:background .15s,color .15s;text-decoration:none;display:inline-flex;align-items:center;margin-bottom:0;position:relative;white-space:nowrap}
.nav-link:hover{color:#fff;background:rgba(255,255,255,.1)}
.nav-link.on{background:var(--bg,#f5f6fa);color:#1a1d27;font-weight:700}
.nav-link.on::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--bg,#f5f6fa)}
.home-link{font-weight:700}
.hdr-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.75);padding:0 14px;border-radius:6px;font:500 12px/1 'Noto Sans JP',sans-serif;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;height:32px;align-self:center;margin-left:4px}
.hdr-btn:hover{color:#fff;border-color:rgba(255,255,255,.5)}
.nav-menu-btn{background:rgba(255,255,255,.08);border:none;color:#fff;font-size:20px;line-height:1;padding:0 12px;border-radius:6px;cursor:pointer;height:32px;align-self:center;display:none}
.nav-menu-btn:hover{background:rgba(255,255,255,.18)}
.home-link{display:inline-flex;align-items:center}
.nav-spacer{flex:1}
.nav-right{display:contents}
@media(max-width:768px){
  .nav-right{display:none;position:fixed;top:48px;right:10px;background:#c2185b;border-radius:10px;padding:6px;flex-direction:column;gap:2px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:999;min-width:160px}
  .nav-right.open{display:flex}
  .nav-right .nav-link{padding:10px 14px;border-radius:6px;font-size:14px;text-align:left;background:transparent;color:rgba(255,255,255,.8)}
  .nav-right .nav-link.on{background:var(--bg,#f5f6fa);color:#1a1d27}
  .nav-right .nav-link.on::after{display:none}
  .nav-menu-btn{display:inline-flex;align-items:center;justify-content:center}
  .nav-spacer{flex:1}
  .hdr{padding:0}
  .hdr-inner{padding:6px 8px 0 8px;overflow-x:auto;scrollbar-width:none}
  .hdr-inner::-webkit-scrollbar{display:none}
  .nav-link{flex-shrink:0;font-size:12px;padding:0 10px}
}

@media (max-width:768px){
  .hdr::-webkit-scrollbar{display:none}
  .hdr h1{font-size:15px;flex-shrink:0}
  .nav-link,.hdr-btn{flex-shrink:0;white-space:nowrap;font-size:12px;padding:6px 10px}
  .app{padding:14px 10px}
  .toolbar input[type="search"]{min-width:auto;width:100%}
  table.jobs{display:block;overflow-x:auto;white-space:nowrap}
}

.sub-tabs{display:flex;gap:6px;margin-bottom:14px}
.sub-tab{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);font:500 12px/1 'Noto Sans JP',sans-serif;padding:7px 14px;border-radius:8px;cursor:pointer}
.sub-tab:hover{color:var(--text);border-color:var(--accent)}
.sub-tab.on{color:#fff;background:var(--accent);border-color:var(--accent)}

@media(max-width:768px){
  .nav-right{display:none;position:fixed;top:48px;right:10px;background:#c2185b;border-radius:10px;padding:6px;flex-direction:column;gap:2px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:999;min-width:160px}
  .nav-right.open{display:flex}
  .nav-right .nav-link{padding:10px 14px;border-radius:6px;font-size:14px;text-align:left}
  .nav-menu-btn{display:inline-flex;align-items:center;justify-content:center}
  .nav-spacer{flex:1}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-inner">
    <a href="portal.html" class="nav-link home-link"><svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14" style="vertical-align:-2px;margin-right:4px"><path d="M12 3L3 11h2v9h5v-6h4v6h5v-9h2L12 3z"/></svg>HOME</a>
    <a href="daily.html" class="nav-link">日報</a>
    <a href="overtime.html" class="nav-link">時間外</a>
    <div class="nav-spacer"></div>
    <div class="nav-right">
      <a href="index.html" class="nav-link">生産部</a>
      <a href="project.html" class="nav-link">企画制作部</a>
      <a href="labor.html" class="nav-link on">工数管理</a>
      <a href="inventory.html" class="nav-link">在庫管理</a>
      <a href="vehicle.html" class="nav-link">車両管理</a>
    </div>
    <button class="nav-menu-btn" onclick="toggleNavMenu()" aria-label="メニュー">≡</button>
    <button class="hdr-btn" onclick="safeRefresh(this, loadData)">↻ 更新</button>
  </div>
</div>
<div class="app">
  <div class="sub-tabs">
    <button class="sub-tab on" data-view="active" onclick="setView('active')">工場ボード</button>
    <button class="sub-tab" data-view="archive" onclick="setView('archive')">出荷済</button>
  </div>
  <div class="toolbar">
    <input type="search" id="searchBox" placeholder="案件名・見積/受注番号で検索" oninput="renderTable()">
    <select id="stFilter" onchange="renderTable()">
      <option value="">全ステータス</option>
      <option value="見積中">見積中</option>
      <option value="受注">受注</option>
      <option value="製作中">製作中</option>
      <option value="完成">完成</option>
      <option value="見送り">見送り</option>
    </select>
    <span class="count" id="countLabel"></span>
  </div>

  <div id="loader" class="loading"><div class="spin"></div><div>読み込み中...</div></div>
  <div id="content"></div>
</div>

<!-- 詳細モーダル -->
<div id="detailModal" class="modal-bg hidden" onclick="if(event.target===this)closeDetail()">
  <div class="modal">
    <div class="modal-head">
      <div>
        <h2 id="dmTitle"></h2>
        <div class="mh-sub" id="dmSub"></div>
      </div>
      <button class="modal-close" onclick="closeDetail()">×</button>
    </div>
    <div class="modal-body" id="dmBody"></div>
  </div>
</div>

<script>
// モバイル時のみ nav-right を body 直下に移動（祖先のoverflow影響回避）
(function(){
  let originalParent=null, originalNextSibling=null;
  function syncNavRight(){
    const nr=document.querySelector('.nav-right');
    if(!nr)return;
    const isMobile=window.matchMedia('(max-width:768px)').matches;
    if(isMobile){
      if(nr.parentElement!==document.body){
        originalParent=nr.parentElement;
        originalNextSibling=nr.nextSibling;
        document.body.appendChild(nr);
      }
    } else {
      if(nr.parentElement===document.body&&originalParent){
        if(originalNextSibling&&originalNextSibling.parentElement===originalParent){
          originalParent.insertBefore(nr,originalNextSibling);
        } else {
          originalParent.appendChild(nr);
        }
      }
    }
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',syncNavRight);
  }else{
    syncNavRight();
  }
  window.addEventListener('resize',syncNavRight);
})();
function toggleNavMenu(){
  const el=document.querySelector('.nav-right');
  if(el)el.classList.toggle('open');
}
document.addEventListener('click',function(e){
  const btn=e.target.closest('.nav-menu-btn');
  const menu=e.target.closest('.nav-right');
  if(!btn&&!menu){
    const nr=document.querySelector('.nav-right');
    if(nr)nr.classList.remove('open');
  }
});

// ===== sessionStorage キャッシュ helper =====
function _getCache(key){
  try{const s=sessionStorage.getItem('seq_'+key);return s?JSON.parse(s):null;}catch(e){return null;}
}
function _setCache(key,data){
  try{sessionStorage.setItem('seq_'+key,JSON.stringify(data));}catch(e){}
}

const API='https://script.google.com/macros/s/AKfycbwD5F1rJcdg7pl1lnVXzyY0vttcO88z-YKUZWG3eLIT0DNMhFZw8jXbJoKW6wCIKEC7/exec';
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let allJobs=[];
let currentView='active';  // 'active' or 'archive'

// ステータスの表示順
// - active（工場ボード）：製作中→完成→受注→見積中→見送り
// - archive（出荷済）：出荷済のみ
const stOrderActive={'完成':1,'製作中':2,'受注':3,'見積中':4,'見送り':5};
const stOrderArchive={'出荷済':1};

function setView(v){
  currentView=v;
  document.querySelectorAll('.sub-tab').forEach(b=>{
    b.classList.toggle('on',b.dataset.view===v);
  });
  // archiveのときはステータスフィルタ無効化（出荷済のみなので）
  const sf=$('stFilter');
  if(v==='archive'){
    sf.value='';
    sf.disabled=true;
  } else {
    sf.disabled=false;
  }
  renderTable();
}

function fmtMin(min){
  if(!min)return '0分';
  const h=Math.floor(min/60),m=min%60;
  if(h===0)return min+'分';
  return min+'分 <span class="mins-hint">('+h+'時間'+(m?m+'分':'')+')</span>';
}

async function loadData(){
  // キャッシュから即復元
  const cached=_getCache('labor');
  if(cached&&cached.jobs){
    allJobs=cached.jobs;
    renderTable();
  }else{
    $('loader').classList.remove('hidden');
    $('content').innerHTML='';
  }
  // 裏で最新取得
  try{
    const r=await fetch(API+'?dept=labor&action=read');
    const j=await r.json();
    if(j.success){
      allJobs=j.data||[];
    }else{
      allJobs=[];
    }
  }catch(e){
    allJobs=[];
  }
  $('loader').classList.add('hidden');
  _setCache('labor',{jobs:allJobs});
  renderTable();
}

function renderTable(){
  const kw=$('searchBox').value.trim().toLowerCase();
  const stFilter=$('stFilter').value;
  const isArchive=currentView==='archive';
  let list=allJobs.filter(j=>{
    // ビューによる振り分け
    if(isArchive){
      if(j.status!=='出荷済')return false;
    } else {
      if(j.status==='出荷済')return false;
      if(stFilter&&j.status!==stFilter)return false;
    }
    if(kw){
      const target=(j.project+' '+j.order_no+' '+j.estimate_no).toLowerCase();
      if(!target.includes(kw))return false;
    }
    return true;
  });
  // ソート：ビューごとに異なる順序 → 納期（新しい順＝直近が上、空欄は後ろ）
  const stOrder=isArchive?stOrderArchive:stOrderActive;
  list.sort((a,b)=>{
    const so=(stOrder[a.status]||99)-(stOrder[b.status]||99);
    if(so)return so;
    const ad=a.deadline||'';
    const bd=b.deadline||'';
    if(!ad&&!bd)return 0;
    if(!ad)return 1;
    if(!bd)return -1;
    return bd.localeCompare(ad);  // 降順
  });

  $('countLabel').textContent=list.length+'件';

  if(!list.length){
    $('content').innerHTML='<div class="no-data">該当する案件がありません</div>';
    return;
  }

  let h='<table class="jobs"><thead><tr>';
  h+='<th>見積番号</th><th>受注番号</th><th>案件名</th><th>ステータス</th><th>納期</th><th class="num">延べ工数</th><th class="num">人数</th>';
  h+='</tr></thead><tbody>';
  list.forEach(j=>{
    h+=`<tr onclick="showDetail('${esc(j.id)}')">
      <td>${esc(j.estimate_no||'')}</td>
      <td>${esc(j.order_no||'')}</td>
      <td>${esc(j.project||'')}</td>
      <td><span class="st-badge st-${esc(j.status)}">${esc(j.status)}</span></td>
      <td>${esc(j.deadline||'')}</td>
      <td class="num"><strong>${fmtMin(j.total_minutes)}</strong></td>
      <td class="num">${j.people_count||0}人</td>
    </tr>`;
  });
  h+='</tbody></table>';
  $('content').innerHTML=h;
}

function showDetail(id){
  const job=allJobs.find(x=>String(x.id)===String(id));
  if(!job)return;
  const no=job.order_no||job.estimate_no;
  $('dmTitle').textContent=(no?'#'+no+' ':'')+job.project;
  $('dmSub').innerHTML=`<span class="st-badge st-${esc(job.status)}">${esc(job.status)}</span>${job.deadline?' 　納期 '+esc(job.deadline):''}`;
  let h=`<div class="mb-total">
    <div class="tt-label">延べ工数</div>
    <div class="tt-val">${fmtMin(job.total_minutes)}<small>${job.people_count||0}人が関与</small></div>
  </div>`;
  if(job.by_employee&&job.by_employee.length){
    h+='<div class="mb-list">';
    job.by_employee.forEach(e=>{
      h+=`<div class="mb-row">
        <span class="mb-name">${esc(e.name)}</span>
        <span class="mb-mins">${fmtMin(e.minutes)}</span>
      </div>`;
    });
    h+='</div>';
  }else{
    h+='<div class="no-data">工数の記録はまだありません</div>';
  }
  $('dmBody').innerHTML=h;
  $('detailModal').classList.remove('hidden');
}
function closeDetail(){$('detailModal').classList.add('hidden')}

loadData();
// 自動更新：5分間隔、タブが見えてる時だけ、前回が走り切ってから
let _bgBusy=false;
setInterval(()=>{
  if(document.visibilityState!=='visible')return;
  if(_bgBusy)return;
  _bgBusy=true;
  Promise.resolve(loadData()).finally(()=>{_bgBusy=false});
},5*60*1000);

// 「↻ 更新」ボタン共通：連打防止＋進行表示
async function safeRefresh(btn, fn){
  if(!btn || btn.disabled) return;
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '↻ 更新中...';
  try{
    await Promise.resolve(fn());
    btn.innerHTML = '✓ 完了';
  }catch(e){
    btn.innerHTML = '⚠ 失敗';
  }finally{
    setTimeout(()=>{ btn.innerHTML = orig; btn.disabled = false; }, 1000);
  }
}

</script>
</body>
</html>
