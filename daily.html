<html lang="ja">
<head>
<meta charset="UTF-8">

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>日</text></svg>">
<style>
:root{
  --bg:#f5f6fa;--surface:#fff;--surface2:#fafbfc;--surface3:#f0f1f5;
  --text:#1a1d27;--text-dim:#5a6270;--text-faint:#8a92a0;
  --border:#e0e2e8;--border-light:#ecedf0;
  --accent:#3366ff;--accent-dim:rgba(51,102,255,.1);
  --green:#2a9d5a;--green-dim:rgba(42,157,90,.1);
  --purple:#8b5cf6;--purple-dim:rgba(139,92,246,.1);
  --orange:#f59e0b;--orange-dim:rgba(245,158,11,.1);
  --red:#dc2626;--red-dim:rgba(220,38,38,.1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font:400 14px/1.5 'Noto Sans JP',-apple-system,sans-serif;color:var(--text);background:var(--bg);min-height:100vh;padding-top:48px}
.app{padding:24px}
.sub-tabs{display:flex;gap:8px;margin-bottom:20px}
.sub-tab{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);font:500 14px/1 'Noto Sans JP',sans-serif;padding:10px 18px;border-radius:8px;cursor:pointer}
.sub-tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.loading{display:flex;align-items:center;justify-content:center;gap:12px;padding:40px;color:var(--text-dim)}
.spin{width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}

.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card h2{font-size:16px;font-weight:800;margin-bottom:14px;color:var(--text)}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}

.row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.row.full{display:block}
.field{flex:1;min-width:200px;display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;font-weight:600;color:var(--text-dim)}
.field input,.field select,.field textarea{padding:10px 12px;border:1px solid var(--border);border-radius:8px;font:400 14px/1.4 'Noto Sans JP',sans-serif;background:var(--surface2);width:100%}
.field textarea{min-height:60px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}

/* 日付表示 */
.today-date{font-size:18px;font-weight:700;color:var(--text)}
.today-hint{font-size:12px;color:var(--text-dim);margin-top:2px}

/* 日報エントリ */
.entries-wrap{margin-top:16px}
.entry-row{display:grid;grid-template-columns:2fr 2fr 1fr auto;gap:10px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;align-items:start}
.entry-row .entry-field{display:flex;flex-direction:column;gap:4px}
.entry-row .entry-field label{font-size:10px;color:var(--text-faint);font-weight:600}
.entry-row .entry-field select,.entry-row .entry-field input{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font:400 13px/1.3 'Noto Sans JP',sans-serif;background:#fff}
.entry-row .entry-rm{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:4px 8px;align-self:center}
.entry-row .entry-rm:hover{opacity:.7}
.entry-add-btn{background:var(--surface2);border:1px dashed var(--border);color:var(--text-dim);font:500 13px/1 'Noto Sans JP',sans-serif;padding:14px;border-radius:8px;cursor:pointer;width:100%;margin-top:4px}
.entry-add-btn:hover{border-color:var(--accent);color:var(--accent)}

/* 入力フォーム（展開式） */
.add-form{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:12px}
.add-form.hidden{display:none}
.af-field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.af-field label{font-size:11px;color:var(--text-faint);font-weight:600}
.af-field input,.af-field select{padding:10px 12px;border:1px solid var(--border);border-radius:8px;font:400 14px/1.3 'Noto Sans JP',sans-serif;background:#fff;width:100%}
.af-field input:focus,.af-field select:focus{outline:none;border-color:var(--accent)}
.af-row{display:flex;gap:10px}
.af-row .af-field{flex:1;margin-bottom:10px}
.af-btns{display:flex;gap:8px;margin-top:6px}
.af-cancel{flex:1;background:#fff;border:1px solid var(--border);color:var(--text-dim);padding:11px;border-radius:8px;font:500 14px/1 'Noto Sans JP',sans-serif;cursor:pointer}
.af-save{flex:2;background:var(--accent);color:#fff;border:none;padding:11px;border-radius:8px;font:600 14px/1 'Noto Sans JP',sans-serif;cursor:pointer}
.af-save:hover{opacity:.9}

/* 保存済エントリ */
.saved-entries{margin-top:4px}
.saved-entries h3{font-size:13px;font-weight:700;color:var(--text-dim);margin-bottom:10px}
.saved-entry{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--surface2);border:1px solid var(--border-light);border-radius:10px;margin-bottom:8px;gap:10px}
.saved-entry .se-main{flex:1;min-width:0}
.saved-entry .se-proj{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.saved-entry .se-meta{font-size:11px;color:var(--text-dim);margin-top:2px}
.saved-entry .se-action{font-size:14px;color:var(--accent);font-weight:600}
.saved-entry .se-note{font-size:12px;color:var(--text-dim);margin-top:2px;font-style:italic}
.saved-entry .se-del{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:4px 10px;border-radius:4px;white-space:nowrap;line-height:1}
.saved-entry .se-del:hover{background:var(--red-dim)}
.saved-entry .se-actions{display:flex;gap:6px;flex-shrink:0}
.saved-entry .act-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:6px;font:500 12px/1 'Noto Sans JP',sans-serif;cursor:pointer;white-space:nowrap}
.saved-entry .act-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.saved-entry .act-btn.del{color:var(--red)}
.saved-entry .act-btn.del:hover{background:var(--red);color:#fff;border-color:var(--red)}

.save-btn{background:var(--accent);color:#fff;border:none;padding:11px 24px;border-radius:8px;font:600 14px/1 'Noto Sans JP',sans-serif;cursor:pointer;margin-top:8px}
.save-btn:hover{opacity:.9}
.save-btn:disabled{background:var(--border);cursor:not-allowed}

/* みんなの日報 */
.date-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.date-nav button{background:var(--surface);border:1px solid var(--border);padding:8px 14px;border-radius:8px;font:500 13px/1 'Noto Sans JP',sans-serif;cursor:pointer}
.date-nav button:hover{border-color:var(--accent)}
.date-nav .date-label{font-size:16px;font-weight:700;margin:0 6px}
.date-nav input[type="date"]{padding:8px 10px;border:1px solid var(--border);border-radius:8px;font:400 13px/1 'Noto Sans JP',sans-serif;background:var(--surface)}

.member-group{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden}
.status-section{padding:14px 16px;margin-bottom:10px}
.status-section.status-notwritten{border-left:4px solid var(--red)}
.status-section.status-absent{border-left:4px solid var(--text-dim);background:var(--surface2)}
.status-list{display:flex;flex-direction:column;gap:6px}
.status-item{display:flex;align-items:center;gap:12px;padding:8px 12px;background:var(--surface2);border:1px solid var(--border-light);border-radius:8px}
.status-item .si-name{font-weight:600;font-size:13px;color:var(--text)}
.status-item .si-dept{font-size:11px;color:var(--text-dim);flex:1}
.status-section.status-absent .status-item{background:transparent}
.member-group h3{font-size:15px;font-weight:700;color:var(--text);margin:0;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border-light)}
.member-group .mb-count{font-size:11px;color:var(--text-faint);font-weight:500;margin-left:8px}
.member-entries{padding:4px 14px 8px 14px}
.member-entry{display:flex;gap:14px;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:13px;align-items:flex-start}
.member-entry:last-child{border-bottom:none}
.member-entry .me-proj{flex:2;font-weight:600;color:var(--text)}
.member-entry .me-action{flex:1;color:var(--accent);font-weight:600}
.member-entry .me-note{flex:2;color:var(--text-dim);font-size:12px;font-style:italic}
.empty-msg{text-align:center;padding:40px 20px;color:var(--text-faint);font-size:13px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1d27;color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:500;z-index:400;opacity:0;transition:.3s}
.toast.show{opacity:1}
.toast.err{background:var(--red)}

/* スマホ対応 */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;background:#1e2130;display:flex;align-items:stretch;height:48px;padding:0;gap:0}
.hdr-inner{display:flex;align-items:stretch;width:100%;padding:6px 8px 0 8px;gap:2px}
.nav-link{background:rgba(255,255,255,.04);border:none;color:rgba(255,255,255,.55);font:500 13px/1 'Noto Sans JP',sans-serif;padding:0 14px;border-radius:8px 8px 0 0;cursor:pointer;transition:background .15s,color .15s;text-decoration:none;display:inline-flex;align-items:center;margin-bottom:0;position:relative;white-space:nowrap}
.nav-link:hover{color:#fff;background:rgba(255,255,255,.1)}
.nav-link.on{background:var(--bg,#f5f6fa);color:#1a1d27;font-weight:700}
.nav-link.on::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--bg,#f5f6fa)}
.home-link{font-weight:700}
.hdr-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.75);padding:0 14px;border-radius:6px;font:500 12px/1 'Noto Sans JP',sans-serif;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;height:32px;align-self:center;margin-left:4px}
.hdr-btn:hover{color:#fff;border-color:rgba(255,255,255,.5)}
.nav-menu-btn{background:rgba(255,255,255,.08);border:none;color:#fff;font-size:20px;line-height:1;padding:0 12px;border-radius:6px;cursor:pointer;height:32px;align-self:center;display:none}
.nav-menu-btn:hover{background:rgba(255,255,255,.18)}
.home-link{display:inline-flex;align-items:center}
.nav-spacer{flex:1}
.nav-right{display:contents}
@media(max-width:768px){
  .nav-right{display:none;position:fixed;top:48px;right:10px;background:#1e2130;border-radius:10px;padding:6px;flex-direction:column;gap:2px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:999;min-width:160px}
  .nav-right.open{display:flex}
  .nav-right .nav-link{padding:10px 14px;border-radius:6px;font-size:14px;text-align:left;background:transparent;color:rgba(255,255,255,.8)}
  .nav-right .nav-link.on{background:var(--bg,#f5f6fa);color:#1a1d27}
  .nav-right .nav-link.on::after{display:none}
  .nav-menu-btn{display:inline-flex;align-items:center;justify-content:center}
  .nav-spacer{flex:1}
  .hdr{padding:0}
  .hdr-inner{padding:6px 8px 0 8px;overflow-x:auto;scrollbar-width:none}
  .hdr-inner::-webkit-scrollbar{display:none}
  .nav-link{flex-shrink:0;font-size:12px;padding:0 10px}
}

@media (max-width:768px){
  html{font-size:14px}
  .hdr::-webkit-scrollbar{display:none}
  .hdr h1{font-size:15px;margin-right:6px;flex-shrink:0;white-space:nowrap}
  .nav-link{padding:7px 10px;font-size:12px;flex-shrink:0;white-space:nowrap}
  .hdr-btn{padding:6px 10px;font-size:11px;flex-shrink:0;white-space:nowrap}
  .app{padding:14px 10px}
  .card{padding:14px;border-radius:10px}
  .card h2{font-size:15px}
  .sub-tab{font-size:13px;padding:9px 14px}
  .entry-row{grid-template-columns:1fr;gap:8px;padding:10px}
  .entry-row .entry-rm{align-self:flex-end}
  .member-entry{flex-direction:column;gap:4px}
  .member-entry .me-proj,.member-entry .me-action,.member-entry .me-note{flex:none}
  .date-nav{gap:6px}
  .date-nav button{padding:7px 10px;font-size:12px}
  .date-nav .date-label{font-size:14px}
}

@media(max-width:768px){
  .nav-right{display:none;position:fixed;top:48px;right:10px;background:#1e2130;border-radius:10px;padding:6px;flex-direction:column;gap:2px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:999;min-width:160px}
  .nav-right.open{display:flex}
  .nav-right .nav-link{padding:10px 14px;border-radius:6px;font-size:14px;text-align:left}
  .nav-menu-btn{display:inline-flex;align-items:center;justify-content:center}
  .nav-spacer{flex:1}
}
</style>

<script>
// モバイル時のみ nav-right を body 直下に移動（祖先のoverflow影響回避）
(function(){
  let originalParent=null, originalNextSibling=null;
  function syncNavRight(){
    const nr=document.querySelector('.nav-right');
    if(!nr)return;
    const isMobile=window.matchMedia('(max-width:768px)').matches;
    if(isMobile){
      if(nr.parentElement!==document.body){
        originalParent=nr.parentElement;
        originalNextSibling=nr.nextSibling;
        document.body.appendChild(nr);
      }
    } else {
      if(nr.parentElement===document.body&&originalParent){
        if(originalNextSibling&&originalNextSibling.parentElement===originalParent){
          originalParent.insertBefore(nr,originalNextSibling);
        } else {
          originalParent.appendChild(nr);
        }
      }
    }
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',syncNavRight);
  }else{
    syncNavRight();
  }
  window.addEventListener('resize',syncNavRight);
})();
function toggleNavMenu(){
  const el=document.querySelector('.nav-right');
  if(el)el.classList.toggle('open');
}
document.addEventListener('click',function(e){
  const btn=e.target.closest('.nav-menu-btn');
  const menu=e.target.closest('.nav-right');
  if(!btn&&!menu){
    const nr=document.querySelector('.nav-right');
    if(nr)nr.classList.remove('open');
  }
});

function toast(msg,err){const t=$('toast');t.textContent=msg;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',2500)}
function fireAndForget(body){fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)})}

async function loadStaff(){

async function loadReports(){

async function loadAbsenceList(date){

function getWhoName(){const w=getWho();const s=staffList.find(x=>String(x.employee_no)===String(w));return s?s.name:''}

function buildAfProjOptions(){
  const sel=$('afProj');
  let h='<option value="">-- 案件を選ぶ --</option>';
  h+='<option value="other">その他(自由記述)</option>';
  // 選択中の氏名の部署を取得
  const w=getWho();
  const me=staffList.find(s=>String(s.employee_no)===String(w));
  const myDept=me?me.dept:'';
  
  const prodGroup=()=>{
    let s='<optgroup label="生産部">';
    prodProjects.forEach(p=>{s+=`<option value="prod:${esc(p.id)}">${esc(p.order_no?'#'+p.order_no+' ':'')}${esc(p.project)}</option>`});
    s+='</optgroup>';
    return s;
  };
  const projGroup=()=>{
    let s='<optgroup label="企画制作部">';
    projProjects.forEach(p=>{s+=`<option value="proj:${esc(p.id)}">${esc(p.order_no?'#'+p.order_no+' ':'')}${esc(p.project)}</option>`});
    s+='</optgroup>';
    return s;
  };
  // 自部署を上に
  if(myDept==='企画制作部'){
    h+=projGroup()+prodGroup();
  } else {
    // 生産部 or その他 → 生産部を上（従来順）
    h+=prodGroup()+projGroup();
  }
  sel.innerHTML=h;
}

// 作業マスタ
const WORK_PRODUCTION=['裁断','溶着','縫製','製作','検査','出荷','印刷','図面','修理'];
const WORK_PROJECT=['設営','撤去','施工','メンテナンス','準備','下見','積み込み','運搬'];
const WORK_COMMON=['事務','打ち合わせ','清掃','車両運行'];

function buildAfWorkOptions(projType){
  const sel=$('afWork');
  // 案件未選択時はプルダウン無効化
  if(!projType){
    sel.innerHTML='<option value="">-- まず案件を選んでください --</option>';
    sel.disabled=true;
    return;
  }
  sel.disabled=false;
  let h='<option value="">-- 作業を選ぶ --</option>';
  h+='<option value="__other__">その他（自由記述）</option>';
  if(projType==='prod'){
    h+='<optgroup label="生産部作業">';
    WORK_PRODUCTION.forEach(w=>h+=`<option value="${esc(w)}">${esc(w)}</option>`);
    h+='</optgroup>';
    h+='<optgroup label="共通">';
    WORK_COMMON.forEach(w=>h+=`<option value="${esc(w)}">${esc(w)}</option>`);
    h+='</optgroup>';
    h+='<optgroup label="企画制作部作業">';
    WORK_PROJECT.forEach(w=>h+=`<option value="${esc(w)}">${esc(w)}</option>`);
    h+='</optgroup>';
  } else if(projType==='proj'){
    h+='<optgroup label="企画制作部作業">';
    WORK_PROJECT.forEach(w=>h+=`<option value="${esc(w)}">${esc(w)}</option>`);
    h+='</optgroup>';
    h+='<optgroup label="共通">';
    WORK_COMMON.forEach(w=>h+=`<option value="${esc(w)}">${esc(w)}</option>`);
    h+='</optgroup>';
    h+='<optgroup label="生産部作業">';
    WORK_PRODUCTION.forEach(w=>h+=`<option value="${esc(w)}">${esc(w)}</option>`);
    h+='</optgroup>';
  } else {
    // その他案件：全作業フラット表示
    [...WORK_PRODUCTION,...WORK_PROJECT,...WORK_COMMON].forEach(w=>h+=`<option value="${esc(w)}">${esc(w)}</option>`);
  }
  sel.innerHTML=h;
}

function onAfProjChange(){
  const wrap=$('afProjCustomWrap');
  const projVal=$('afProj').value;
  if(projVal==='other'){
    wrap.classList.remove('hidden');

let editingId=null;  // 編集中のentry id（null=新規追加モード）
function openAddForm(auto){
  const w=getWho();

function closeAddForm(){
  editingId=null;

function editEntry(id){
  const entry=allReports.find(e=>String(e.id)===String(id));
  if(!entry){toast('記録が見つかりません',true);return}
  editingId=id;
  $('addForm').classList.remove('hidden');
  $('openAddBtn').classList.add('hidden');
  // 保存ボタンのラベルを「保存」に変更
  const saveBtn=document.querySelector('.af-save');
  if(saveBtn)saveBtn.textContent='保存';
  // 案件復元
  if(entry.project_type==='other'){
    $('afProj').value='other';
    $('afProjCustomWrap').classList.remove('hidden');
    $('afProjCustom').value=entry.project_name||'';
    buildAfWorkOptions('other');
  } else {
    const prefix=entry.project_type==='production'?'prod':'proj';
    $('afProj').value=`${prefix}:${entry.project_id}`;
    $('afProjCustomWrap').classList.add('hidden');
    $('afProjCustom').value='';
    buildAfWorkOptions(prefix);
  }
  // 作業内容復元
  const work=entry.work||entry.action||'';
  const sel=$('afWork');
  // プルダウン内に一致するoptionがあれば選択、なければ「その他」扱い
  const hasMatch=Array.from(sel.options).some(o=>o.value===work);
  if(hasMatch){
    sel.value=work;
    $('afWorkCustomWrap').classList.add('hidden');
    $('afWorkCustom').value='';
  } else {
    sel.value='__other__';
    $('afWorkCustomWrap').classList.remove('hidden');
    $('afWorkCustom').value=work;
  }
  $('afMinutes').value=entry.minutes||'';
}
function addOneEntry(){
  const w=getWho();
  if(!w){toast('氏名を選んでください',true);return}
  const projVal=$('afProj').value;
  let work=$('afWork').value;
  const minutesStr=$('afMinutes').value.trim();
  const minutes=parseInt(minutesStr,10);
  if(!projVal){toast('案件を選んでください',true);return}
  if(!work){toast('作業内容を選んでください',true);return}
  // その他（自由記述）なら入力テキストを使う
  if(work==='__other__'){
    const customWork=$('afWorkCustom').value.trim();
    if(!customWork){toast('作業内容を入力してください',true);return}
    work=customWork;
  }
  if(!minutesStr||isNaN(minutes)||minutes<=0){toast('時間（分）を入力してください',true);return}
  let body;
  if(projVal==='other'){
    const customName=$('afProjCustom').value.trim();
    if(!customName){toast('案件名を入力してください',true);return}
    body={
      dept:'daily',action:'save',
      date:dateStr(writeDate),
      employee_no:w,
      project_type:'other',
      project_id:'other',
      project_name:customName,
      work:work,
      minutes:minutes,
      note:''
    };
  } else {
    const [type,id]=projVal.split(':');
    const list=type==='prod'?prodProjects:projProjects;
    const pr=list.find(x=>String(x.id)===String(id));
    body={
      dept:'daily',action:'save',
      date:dateStr(writeDate),
      employee_no:w,
      project_type:type==='prod'?'production':'project',
      project_id:id,
      project_name:pr?pr.project:'',
      work:work,
      minutes:minutes,
      note:''
    };
  }
  // 編集モードか新規追加モードかで分岐
  if(editingId){
    // 編集モード：既存のidを使って更新
    body.id=editingId;
    // 楽観的更新：allReportsの該当エントリを差し替え
    const idx=allReports.findIndex(e=>String(e.id)===String(editingId));
    if(idx>=0){
      allReports[idx]={...allReports[idx],...body};
    }
    fireAndForget(body);
    toast('更新しました');
  } else {
    // 新規追加モード
    allReports.push({...body,id:'tmp_'+Date.now()});
    fireAndForget(body);
    toast('追加しました');
  }
  closeAddForm();
  renderSavedEntries();
  // 2.5秒後にバックグラウンドで再取得（tmp_IDを実IDに置換）
  setTimeout(async()=>{
    await loadReports();
    renderSavedEntries();
    if(curView==='view')renderViewContent();
  },2500);
}
function renderSavedEntries(){
  const el=$('savedEntries');
  const w=getWho();
  if(!w){el.innerHTML='';return}
  const entries=getMyEntries();
  const isToday=dateStr(writeDate)===dateStr(today);
  const dateLabel=isToday?'今日':'この日';
  if(!entries.length){
    el.innerHTML=`<h3>${dateLabel}の記録</h3><div class="empty-msg" style="padding:20px">まだ${dateLabel}の記録はありません</div>`;
    return;
  }
  let h=`<h3>${dateLabel}の記録（${entries.length}件）</h3>`;
  entries.forEach(e=>{
    const mins=parseInt(e.minutes,10)||0;
    const minsLabel=mins?`<span style="color:var(--text-dim);font-size:12px;margin-left:8px">${mins}分</span>`:'';
    const isTmp=String(e.id).startsWith('tmp_');
    const actions=isTmp
      ? '<span style="color:var(--text-faint);font-size:11px">保存中...</span>'
      : `<button class="act-btn" onclick="editEntry('${esc(e.id)}')">編集</button> <button class="act-btn del" onclick="delEntry('${esc(e.id)}')">削除</button>`;
    h+=`<div class="saved-entry">
      <div class="se-main">
        <div class="se-proj">${esc(e.project_name||'(案件不明)')}</div>
        <div class="se-action">${esc(e.work||e.action||'')}${minsLabel}</div>
      </div>
      <div class="se-actions">${actions}</div>
    </div>`;
  });
  el.innerHTML=h;
}
function delEntry(id){
  if(!confirm('この記録を削除しますか？'))return;
  // 楽観的更新：allReports から削除
  allReports=allReports.filter(x=>String(x.id)!==String(id));
  fireAndForget({dept:'daily',action:'delete',id:id});
  toast('削除しました');
  renderSavedEntries();
}

function renderView(){
  $('viewDate').value=dateStr(viewingDate);
  const d=viewingDate;
  $('viewDateLabel').textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${dow[d.getDay()]}）`;

  renderViewContent();

}
function viewDateMove(n){viewingDate.setDate(viewingDate.getDate()+n);renderView()}
function viewDateToday(){viewingDate=new Date();viewingDate.setHours(0,0,0,0);renderView()}
function loadViewDate(){const v=$('viewDate').value;if(!v)return;viewingDate=new Date(v+'T00:00:00');renderView()}
function renderViewContent(){
  const el=$('viewContent');
  const reports=getDateReports();
  // 社員別にまとめる
  const byEmp={};
  reports.forEach(r=>{
    const e=String(r.employee_no||'');
    if(!byEmp[e])byEmp[e]=[];
    byEmp[e].push(r);
  });
  // 欠勤者のemployee_no集合
  const absenceEmpSet=new Set(absenceList.map(a=>String(a.employee_no)));
  // 未記入判定：staffList (in_daily=TRUE) のうち、reports にも absence にもない人
  const writtenSet=new Set(Object.keys(byEmp));
  const notWritten=staffList.filter(s=>{
    const no=String(s.employee_no);
    return !writtenSet.has(no)&&!absenceEmpSet.has(no);
  });
  // 社員順（staffListの順）で表示
  const empOrder=staffList.map(s=>String(s.employee_no));
  Object.keys(byEmp).forEach(e=>{if(!empOrder.includes(e))empOrder.push(e)});
  const me=getWho();
  // 表示中の日付が土日祝かどうか
  const viewIsOffDay=isOffDay(viewingDate);
  let h='';
  // === 未記入セクション（土日祝は表示しない） ===
  if(notWritten.length>0&&!viewIsOffDay){
    h+=`<div class="card status-section status-notwritten">
      <h3 style="margin:0 0 10px 0;color:var(--red);font-size:15px;display:flex;align-items:center;gap:8px">
        <span>未記入</span>
        <span style="background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px">${notWritten.length}人</span>
        <span style="color:var(--text-faint);font-size:11px;font-weight:400">（50音順）</span>
      </h3>
      <div class="status-list">`;
    notWritten.forEach(s=>{
      h+=`<div class="status-item">
        <span class="si-name">${esc(s.name)}</span>
        <span class="si-dept">${esc(s.dept||'')}</span>
        <button class="act-btn" onclick="markAbsent('${esc(s.employee_no)}','${esc(s.name)}')">欠勤にする</button>
      </div>`;
    });
    h+=`</div></div>`;
  }
  // === 休みセクション ===
  if(absenceList.length>0){
    h+=`<div class="card status-section status-absent">
      <h3 style="margin:0 0 10px 0;color:var(--text-dim);font-size:15px;display:flex;align-items:center;gap:8px">
        <span>休み</span>
        <span style="background:var(--text-dim);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px">${absenceList.length}人</span>
      </h3>
      <div class="status-list">`;
    absenceList.forEach(a=>{
      const s=staffList.find(x=>String(x.employee_no)===String(a.employee_no));
      const name=s?s.name:('社員'+a.employee_no);
      const dept=s?s.dept:'';
      h+=`<div class="status-item">
        <span class="si-name">${esc(name)}</span>
        <span class="si-dept">${esc(dept)}</span>
        <button class="act-btn" onclick="unmarkAbsent('${esc(a.id)}')">取消</button>
      </div>`;
    });
    h+=`</div></div>`;
  }
  // === 日報データがない＆未記入も欠勤もない場合 ===
  if(!reports.length&&notWritten.length===0&&absenceList.length===0){
    const msg=viewIsOffDay?'この日は休日のため、出勤した人だけが記録します':'この日の日報はまだ登録されていません';
    el.innerHTML=`<div class="card"><div class="empty-msg">${msg}</div></div>`;
    return;
  }
  // 土日祝で出勤者がいない場合（reports は0件、未記入はスキップされてる）
  if(viewIsOffDay&&!reports.length&&absenceList.length===0){
    el.innerHTML='<div class="card"><div class="empty-msg">この日は休日のため、出勤した人だけが記録します</div></div>';
    return;
  }
  // === 日報一覧 ===
  empOrder.forEach(empNo=>{
    const entries=byEmp[empNo];
    if(!entries||!entries.length)return;
    const st=staffList.find(s=>String(s.employee_no)===String(empNo));
    const name=st?st.name:('社員'+empNo);
    const totalMins=entries.reduce((sum,e)=>sum+(parseInt(e.minutes,10)||0),0);
    const totalLabel=totalMins?`<span style="color:var(--text-dim);font-weight:500;margin-left:8px">合計 ${totalMins}分</span>`:'';
    const isMe=String(empNo)===String(me);
    h+=`<div class="member-group"><h3>${esc(name)}${isMe?' <span style="color:var(--accent);font-size:11px;font-weight:500;margin-left:4px">（自分）</span>':''}<span class="mb-count">${entries.length}件</span>${totalLabel}</h3><div class="member-entries">`;
    entries.forEach(e=>{
      const mins=parseInt(e.minutes,10)||0;
      const minsLabel=mins?`<span style="color:var(--text-faint);font-size:11px;margin-left:6px">${mins}分</span>`:'';
      const isTmp=String(e.id).startsWith('tmp_');
      const editable=isMe&&!isTmp;
      const editBtn=editable?`<button class="act-btn" onclick="gotoEditFromView('${esc(e.id)}','${esc(e.date||'')}')" style="margin-top:6px">編集</button>`:'';
      h+=`<div class="member-entry">
        <div class="me-proj">${esc(e.project_name||'(案件不明)')}</div>
        <div class="me-action">${esc(e.work||e.action||'')}${minsLabel}</div>
        <div class="me-note">${esc(e.note||'')}</div>
        ${editBtn}
      </div>`;
    });
    h+='</div></div>';
  });
  el.innerHTML=h;
}

// 欠勤マーク
async function markAbsent(empNo,name){
  if(!confirm(`${name}さんを休み（欠勤）にしますか？`))return;
  const date=dateStr(viewingDate);
  const tmpId='abs_tmp_'+Date.now();
  // 楽観的更新
  absenceList.push({id:tmpId,date:date,employee_no:empNo});
  renderViewContent();
  fireAndForget({dept:'daily',action:'save_absence',date:date,employee_no:empNo});
  toast('休みに設定しました');
  // 2秒後に最新取得
  setTimeout(async()=>{await loadAbsenceList(date);renderViewContent();},2500);
}
// 欠勤取消
async function unmarkAbsent(absId){
  if(!confirm('休み設定を取り消しますか？'))return;
  // 楽観的更新
  absenceList=absenceList.filter(a=>String(a.id)!==String(absId));
  renderViewContent();
  if(!String(absId).startsWith('abs_tmp_')){
    fireAndForget({dept:'daily',action:'delete_absence',id:absId});
  }
  toast('取消しました');
  // 2秒後に最新取得
  const date=dateStr(viewingDate);
  setTimeout(async()=>{await loadAbsenceList(date);renderViewContent();},2500);
}

// みんなの日報から自分のエントリを編集する時、自分で書くタブに切り替える
function gotoEditFromView(id,dateStr2){
  // writeDateをそのエントリの日付に変更
  if(dateStr2){
    const d=new Date(dateStr2+'T00:00:00');
    // 過去3日より古いと編集不可（writeDateの制限）
    const minDate=new Date(today);
    minDate.setDate(minDate.getDate()-7);
    if(d<minDate){
      toast('古すぎる記録は編集できません（過去7日まで）',true);
      return;
    }
    writeDate=d;
    writeDate.setHours(0,0,0,0);
  }
  // タブ切り替え
  curView='write';
  $('dailyTabs').querySelectorAll('.sub-tab').forEach(t=>{
    t.classList.toggle('on',t.dataset.view==='write');
  });
  render();
  // 編集モードで開く
  setTimeout(()=>editEntry(id),100);
}

// タブ切替
$('dailyTabs').addEventListener('click',e=>{
  const t=e.target.closest('.sub-tab');if(!t)return;
  $('dailyTabs').querySelectorAll('.sub-tab').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');
  curView=t.dataset.view;
  render();
});

loadAll();
// 自動更新：5分間隔、タブが見えてる時だけ、前回が走り切ってから
let _bgBusy=false;
setInterval(()=>{
  if(document.visibilityState!=='visible')return;
  if(_bgBusy)return;
  _bgBusy=true;
  Promise.resolve(bgRefresh()).finally(()=>{_bgBusy=false});
},5*60*1000);
</script>
