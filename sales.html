<style>
@import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap');
:root{
  --bg:#f5f6fa;--surface:#fff;--surface2:#fafbfc;--surface3:#f0f1f5;
  --text:#1a1d27;--text-dim:#5a6270;--text-faint:#8a92a0;
  --border:#e0e2e8;--border-light:#ecedf0;
  --accent:#db2777;--accent-dim:rgba(219,39,119,.1);
  --green:#2a9d5a;--green-dim:rgba(42,157,90,.1);
  --orange:#f59e0b;--orange-dim:rgba(245,158,11,.1);
  --red:#dc2626;--red-dim:rgba(220,38,38,.1);
  --purple:#8b5cf6;--purple-dim:rgba(139,92,246,.1);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,.1);
  --teal:#0d9488;--teal-dim:rgba(13,148,136,.1);
  --cyan:#0891b2;--cyan-dim:rgba(8,145,178,.1);
  --gray:#6b7280;--gray-dim:rgba(107,114,128,.1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font:400 14px/1.5 'Noto Sans JP',-apple-system,sans-serif;color:var(--text);background:var(--bg);min-height:100vh;padding-top:48px}
.empty-msg{text-align:center;padding:40px 20px;color:var(--text-faint);font-size:13px}
.app{padding:16px}
.hidden{display:none!important}

.loading{text-align:center;padding:80px 20px;color:var(--text-dim);font-size:14px}
.loading .spin{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* === 一覧ビュー（生産部 factory-view 相当） === */
.factory-view{padding:16px}
.fv-date{font-size:14px;color:var(--text-dim);margin-bottom:14px}
.fv-sum{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap}
.fv-si{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;min-width:90px;text-align:center;cursor:pointer;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.fv-si:hover{border-color:var(--accent)}
.fv-si.on{border-color:var(--accent);background:var(--accent-dim)}
.fv-si .n{font-size:26px;font-weight:900;line-height:1.1}
.fv-si .l{font-size:11px;color:var(--text-dim);margin-top:2px}
.fv-grp{margin-bottom:28px}
.fv-grp-hd{font-size:13px;font-weight:700;color:var(--text-dim);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.fv-grp-hd::after{content:'';flex:1;height:1px;background:var(--border)}
.fv-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.fv-card{background:var(--surface);border-radius:12px;padding:16px;border-left:4px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04);cursor:pointer;transition:.15s}
.fv-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.fv-card.s-見積中{border-left-color:var(--purple)}
.fv-card.s-受注{border-left-color:var(--blue)}
.fv-card.s-発注済{border-left-color:var(--orange)}
.fv-card.s-入荷済{border-left-color:var(--green)}
.fv-card.s-納品済{border-left-color:var(--accent)}
.fv-card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px}
.fv-card .pname{font-weight:600;font-size:15px;line-height:1.4;flex:1;word-break:break-word}
.fv-card .client{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;word-break:break-word}
.fv-card .badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0}
.fv-card .badge.s-見積中{color:var(--purple);background:var(--purple-dim)}
.fv-card .badge.s-受注{color:var(--blue);background:var(--blue-dim)}
.fv-card .badge.s-発注済{color:var(--orange);background:var(--orange-dim)}
.fv-card .badge.s-入荷済{color:var(--green);background:var(--green-dim)}
.fv-card .badge.s-納品済{color:var(--accent);background:var(--accent-dim)}
.fv-card .meta{font-size:12px;color:var(--text-dim);display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:6px}
.fv-card .tag{font-size:11px;padding:2px 7px;border-radius:5px;font-weight:600}
.fv-card .tag.loc{color:var(--cyan);background:var(--cyan-dim)}
.fv-card .tag.eno{color:var(--accent);background:var(--accent-dim)}
.fv-card .tag.person{color:var(--green);background:var(--green-dim)}
.fv-card .assignee{font-size:12px;color:var(--text-dim);margin:4px 0 2px}
.fv-card .dl{font-size:13px;color:var(--text-dim);margin-top:4px}
.fv-card .sub-info{font-size:12px;color:var(--green);background:var(--green-dim);padding:4px 8px;border-radius:6px;margin-top:6px;display:inline-block;font-weight:600;font-variant-numeric:tabular-nums}
.fv-card .note{font-size:11px;color:var(--text-faint);margin-top:6px;line-height:1.5;word-break:break-word}

/* === 管理ビュー === */
.admin-view{padding:16px}
.av-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.av-add{background:var(--accent);color:#fff;border:none;padding:9px 18px;border-radius:8px;font:600 13px/1 'Noto Sans JP',sans-serif;cursor:pointer}
.av-add:hover{opacity:.85}
.av-search{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font:400 13px/1 'Noto Sans JP',sans-serif;width:220px}
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px;background:var(--surface)}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
table.tbl th{background:var(--surface2);font-weight:600;text-align:left;padding:10px 12px;white-space:nowrap;cursor:pointer;user-select:none}
table.tbl th:hover{color:var(--accent)}
table.tbl th .arrow{font-size:10px;margin-left:4px;color:var(--text-faint)}
table.tbl td{padding:10px 12px;border-top:1px solid var(--surface3);white-space:nowrap}
table.tbl tr:hover td{background:rgba(219,39,119,.03)}
.act-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;padding:2px 6px}
.act-btn.del{color:var(--red)}
.act-btn:hover{text-decoration:underline}
.st-mini{padding:4px 8px;border:1px solid var(--border);border-radius:6px;font:400 13px/1 'Noto Sans JP',sans-serif;background:var(--surface2);cursor:pointer}

.adm-filter{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.adm-filter .ft{background:#f0f1f5;border:none;color:var(--text-dim);font:600 12px/1 'Noto Sans JP',sans-serif;padding:7px 13px;border-radius:999px;cursor:pointer;transition:.15s}
.adm-filter .ft:hover{color:var(--text);background:#e2e5f0}
.adm-filter .ft.on{background:#fce7f3;color:#9d174d}


/* === モーダル（生産部準拠） === */
.mo-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;justify-content:center;align-items:flex-start;padding:40px 16px;overflow-y:auto}
.mo-bg.show{display:flex}
.mo{background:var(--surface);border-radius:14px;padding:28px;width:100%;max-width:580px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mo h2{font-size:18px;font-weight:900;margin-bottom:20px}
.mo-row{display:flex;gap:14px;margin-bottom:14px}
.mo-row.full{display:block;margin-bottom:14px}
.mo-field{flex:1;display:flex;flex-direction:column;gap:5px}
.mo-field label{font-size:12px;font-weight:600;color:var(--text-dim)}
.mo-field input,.mo-field select,.mo-field textarea{padding:10px 12px;border:1px solid var(--border);border-radius:8px;font:400 14px/1.4 'Noto Sans JP',sans-serif;background:var(--surface2);width:100%}
.mo-field textarea{min-height:70px;resize:vertical}
.mo-field input:focus,.mo-field select:focus,.mo-field textarea:focus{outline:none;border-color:var(--accent)}
.mo-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;align-items:center}
.mo-foot button{padding:10px 22px;border-radius:8px;font:600 14px/1 'Noto Sans JP',sans-serif;cursor:pointer;border:1px solid var(--border)}
.mo-foot .cancel{background:var(--surface);color:var(--text-dim)}
.mo-foot .save{background:var(--accent);color:#fff;border-color:var(--accent)}
.mo-foot .save:hover{opacity:.85}

/* 閲覧モーダル用 view-row */
.view-row{display:flex;gap:16px;margin-bottom:10px;font-size:13px}
.view-row .view-label{font-weight:600;color:var(--text-dim);min-width:80px;flex-shrink:0}
.view-row .view-val{color:var(--text);word-break:break-word}
.st-change{margin-top:18px;padding-top:16px;border-top:2px solid var(--surface3)}
.st-change-label{font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:10px}
.st-change-btns{display:flex;gap:8px;flex-wrap:wrap}
.st-btn{padding:10px 16px;border-radius:8px;font:600 13px/1 'Noto Sans JP',sans-serif;cursor:pointer;border:2px solid var(--border);background:var(--surface);color:var(--text-dim);transition:.15s}
.st-btn:hover{border-color:var(--accent);color:var(--accent)}
.st-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);cursor:default}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1d27;color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:500;z-index:400;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
.toast.err{background:#dc2626}

/* ヘッダー（全HTML統一） */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;background:#fb7185;display:flex;align-items:stretch;height:48px;padding:0;gap:0}
.hdr-inner{display:flex;align-items:stretch;width:100%;padding:6px 8px 0 8px;gap:2px}
.nav-link{background:rgba(255,255,255,.04);border:none;color:rgba(74,14,31,.85);font:500 13px/1 'Noto Sans JP',sans-serif;padding:0 14px;border-radius:8px 8px 0 0;cursor:pointer;transition:background .15s,color .15s;text-decoration:none;display:inline-flex;align-items:center;margin-bottom:0;position:relative;white-space:nowrap}
.nav-link:hover{color:#4a0e1f;background:rgba(255,255,255,.1)}
.nav-link.on{background:var(--bg,#f5f6fa);color:#1a1d27;font-weight:700}
.nav-link.on::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--bg,#f5f6fa)}
.home-link{font-weight:700;display:inline-flex;align-items:center}
.hdr-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(74,14,31,.9);padding:0 14px;border-radius:6px;font:500 12px/1 'Noto Sans JP',sans-serif;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;height:32px;align-self:center;margin-left:4px}
.hdr-btn:hover{color:#4a0e1f;border-color:rgba(255,255,255,.5)}
.nav-menu-btn{background:rgba(255,255,255,.08);border:none;color:#4a0e1f;font-size:20px;line-height:1;padding:0 12px;border-radius:6px;cursor:pointer;height:32px;align-self:center;display:none}
.nav-menu-btn:hover{background:rgba(255,255,255,.18)}
.nav-spacer{flex:1}
.nav-right{display:contents}
@media(max-width:768px){
  .nav-right{display:none;position:fixed;top:48px;right:10px;background:#fb7185;border-radius:10px;padding:6px;flex-direction:column;gap:2px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:999;min-width:160px}
  .nav-right.open{display:flex}
  .nav-right .nav-link{padding:10px 14px;border-radius:6px;font-size:14px;text-align:left;background:transparent;color:rgba(74,14,31,.85)}
  .nav-right .nav-link.on{background:var(--bg,#f5f6fa);color:#1a1d27}
  .nav-right .nav-link.on::after{display:none}
  .nav-menu-btn{display:inline-flex;align-items:center;justify-content:center}
  .nav-spacer{flex:1}
  .hdr-inner{padding:6px 8px 0 8px;overflow-x:auto;scrollbar-width:none}
  .hdr-inner::-webkit-scrollbar{display:none}
  .nav-link{flex-shrink:0;font-size:12px;padding:0 10px}
  .hdr-btn{flex-shrink:0;font-size:11px;padding:0 10px}
}

@media (max-width:768px){
  .app{padding:14px 10px}
  .factory-view,.admin-view{padding:12px 10px}
  .fv-cards{grid-template-columns:1fr;gap:10px}
  .fv-card{padding:14px 13px}
  .fv-card .pname{font-size:15px;line-height:1.35}
  .fv-card .top{gap:8px}
  .fv-card .meta{font-size:11px;gap:5px}
  .fv-card .tag{font-size:10px;padding:2px 6px}
  .av-top{flex-direction:column;align-items:stretch;gap:8px}
  .av-search{width:100%}
  .av-add{padding:11px 18px;font-size:13px}
  .mo-row{flex-direction:column;gap:0;margin-bottom:0}
  .mo-row .mo-field{margin-bottom:14px}
  .mo-foot{flex-direction:column-reverse;gap:8px;align-items:stretch}
  .mo-foot button{width:100%;padding:13px;min-height:46px;font-size:14px}
  .view-row{flex-direction:column;gap:2px;margin-bottom:10px}
  .view-row .view-label{min-width:0;font-size:11px}
  .view-row .view-val{font-size:14px}
  .st-change-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .st-btn{padding:12px 8px;font-size:13px;min-height:46px}
}

/* サブタブ */
.sub-tabs{display:flex;gap:6px;padding:14px 16px;background:#f5f6fa}
.sub-tab{background:#f0f1f5;border:none;color:var(--text-dim);font:600 13px/1 'Noto Sans JP',sans-serif;padding:8px 16px;border-radius:999px;cursor:pointer;transition:.15s}
.sub-tab:hover{color:var(--text);background:#e2e5f0}
.sub-tab.on{background:#fce7f3;color:#9d174d}
@media(max-width:768px){
  .sub-tabs{padding:10px 16px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap}
  .sub-tabs::-webkit-scrollbar{display:none}
  .sub-tab{flex-shrink:0;padding:7px 14px;font-size:12px}
  .toast{bottom:16px;width:calc(100% - 32px);max-width:400px;font-size:12px;padding:11px 18px}
}
@media(max-width:768px){
  }
</style>

<script>
// ===== nav-right モバイル時 body 直下に移動 =====
(function(){
  let originalParent=null, originalNextSibling=null;
  function syncNavRight(){
    const nr=document.querySelector('.nav-right');
    if(!nr)return;
    const isMobile=window.matchMedia('(max-width:768px)').matches;
    if(isMobile){
      if(nr.parentElement!==document.body){
        originalParent=nr.parentElement;
        originalNextSibling=nr.nextSibling;
        document.body.appendChild(nr);
      }
    } else {
      if(nr.parentElement===document.body&&originalParent){
        if(originalNextSibling&&originalNextSibling.parentElement===originalParent){
          originalParent.insertBefore(nr,originalNextSibling);
        } else {
          originalParent.appendChild(nr);
        }
      }
    }
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',syncNavRight);
  }else{
    syncNavRight();
  }
  window.addEventListener('resize',syncNavRight);
})();
function toggleNavMenu(){
  const el=document.querySelector('.nav-right');
  if(el)el.classList.toggle('open');
}
document.addEventListener('click',function(e){
  const btn=e.target.closest('.nav-menu-btn');
  const menu=e.target.closest('.nav-right');
  if(!btn&&!menu){
    const nr=document.querySelector('.nav-right');
    if(nr)nr.classList.remove('open');
  }
});

// ===== sessionStorage キャッシュ =====
function _getCache(key){
  try{const s=sessionStorage.getItem('seq_'+key);return s?JSON.parse(s):null;}catch(e){return null;}
}
function _setCache(key,data){
  try{sessionStorage.setItem('seq_'+key,JSON.stringify(data));}catch(e){}
}

const API='https://script.google.com/macros/s/AKfycbwD5F1rJcdg7pl1lnVXzyY0vttcO88z-YKUZWG3eLIT0DNMhFZw8jXbJoKW6wCIKEC7/exec';
const DEPT='sales';
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let allEntries=[];
let currentView='board';
let boardFilter=null;
let adminStatusFilter=null;
let adminSearch='';
let archiveSearch='';
let adminSort={col:'created_at',asc:false};
let archiveSort={col:'created_at',asc:false};

const ACTIVE_ST=['見積中','受注','発注済','入荷済','納品済'];
const ARCHIVE_ST=['完了','見送り'];
const ALL_ST=[...ACTIVE_ST,...ARCHIVE_ST];

async function apiGet(params){
  const qs=new URLSearchParams({dept:DEPT,...params}).toString();
  const r=await fetch(API+'?'+qs);
  return r.json();
}
async function apiPost(body){
  fetch(API,{method:'POST',mode:'no-cors',body:JSON.stringify({dept:DEPT,...body})});
  return{success:true};
}

function setView(v){
  currentView=v;
  document.querySelectorAll('.sub-tab').forEach(b=>{
    b.classList.toggle('on',b.dataset.view===v);
  });
  $('boardView').classList.toggle('hidden',v!=='board');
  $('archiveView').classList.toggle('hidden',v!=='archive');
  $('adminView').classList.toggle('hidden',v!=='admin');
  render();
}

function fmtDate(d){
  if(!d)return'';
  if(typeof d==='string'){
    if(/^\d{4}-\d{2}-\d{2}/.test(d))return d.slice(0,10);
    d=new Date(d);
  }
  if(!(d instanceof Date)||isNaN(d))return'';
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+dd;
}
function fmtDateJP(s){
  const d=fmtDate(s);if(!d)return'';
  const [y,m,dd]=d.split('-');
  const dow=['日','月','火','水','木','金','土'];
  const dt=new Date(y,parseInt(m,10)-1,dd);
  return `${parseInt(m,10)}/${parseInt(dd,10)}（${dow[dt.getDay()]}）`;
}
function fmtAmount(v){
  if(v===''||v===null||v===undefined)return'';
  const n=Number(v);if(isNaN(n))return'';
  return '¥'+n.toLocaleString();
}

async function loadData(){
  const cached=_getCache('sales');
  if(cached&&cached.entries){
    allEntries=cached.entries;
    render();
  }else{
    $('loader').classList.remove('hidden');
  }
  try{
    const j=await apiGet({action:'read'});
    if(j.success){
      allEntries=j.data||[];
    }
  }catch(e){
    console.warn('load error',e);
  }
  $('loader').classList.add('hidden');
  _setCache('sales',{entries:allEntries});
  render();
  refreshDatalists();
}

function refreshDatalists(){
  // 得意先と仕入先のサジェスト候補（過去入力から）
  const cust=[...new Set(allEntries.map(e=>String(e.client||'').trim()).filter(Boolean))].sort();
  const supp=[...new Set(allEntries.map(e=>String(e.supplier||'').trim()).filter(Boolean))].sort();
  $('customerList').innerHTML=cust.map(c=>`<option value="${esc(c)}">`).join('');
  $('supplierList').innerHTML=supp.map(s=>`<option value="${esc(s)}">`).join('');
}

function render(){
  if(currentView==='board')renderBoard();
  else if(currentView==='archive')renderArchive();
  else if(currentView==='admin')renderAdmin();
}

// ===== 一覧（ボード） =====
function renderBoard(){
  const el=$('boardView');
  const items=allEntries.filter(e=>ACTIVE_ST.includes(String(e.status||'').trim()));
  const today=new Date();
  const dow=['日','月','火','水','木','金','土'];
  const dateStr=`${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日（${dow[today.getDay()]}）`;
  const cnt={};ACTIVE_ST.forEach(s=>cnt[s]=0);
  items.forEach(e=>{if(cnt[e.status]!==undefined)cnt[e.status]++});
  const total=items.length;
  const filtered=boardFilter?items.filter(e=>e.status===boardFilter):items;
  let h=`<div class="fv-date">${dateStr}</div>`;
  h+='<div class="fv-sum">';
  h+=`<div class="fv-si${boardFilter===null?' on':''}" onclick="setBoardFilter(null)"><div class="n">${total}</div><div class="l">すべて</div></div>`;
  ACTIVE_ST.forEach(s=>{
    h+=`<div class="fv-si${boardFilter===s?' on':''}" onclick="setBoardFilter('${s}')"><div class="n" style="color:var(${stColorVar(s)})">${cnt[s]||0}</div><div class="l">${s}</div></div>`;
  });
  h+='</div>';
  if(filtered.length===0){
    h+='<div class="empty-msg">該当する案件はありません</div>';
    el.innerHTML=h;
    return;
  }
  ACTIVE_ST.forEach(st=>{
    const grp=filtered.filter(e=>e.status===st);
    if(grp.length===0)return;
    grp.sort((a,b)=>String(b.created_at||'').localeCompare(String(a.created_at||'')));
    h+=`<div class="fv-grp"><div class="fv-grp-hd">${st}　${grp.length}件</div><div class="fv-cards">`;
    grp.forEach(d=>{h+=renderCard(d)});
    h+='</div></div>';
  });
  el.innerHTML=h;
}

function stColorVar(s){
  return{'見積中':'--purple','受注':'--blue','発注済':'--orange','入荷済':'--green','納品済':'--accent','完了':'--gray','見送り':'--red'}[s]||'--text';
}

function renderCard(d){
  const st=String(d.status||'見積中');
  let h=`<div class="fv-card s-${esc(st)}" onclick="openView('${esc(d.id)}')">`;
  h+='<div class="top">';
  h+=`<div class="pname">${esc(d.project||'―')}</div>`;
  h+=`<span class="badge s-${esc(st)}">${esc(st)}</span>`;
  h+='</div>';
  if(d.client){
    h+=`<div class="assignee">得意先: <span style="font-size:13px;font-weight:600;color:var(--text)">${esc(d.client)}</span></div>`;
  }
  if(d.our_person){
    h+=`<div class="assignee">担当: <span class="tag person">${esc(d.our_person)}</span></div>`;
  }
  const tags=[];
  if(d.order_no)tags.push(`<span class="tag eno">${esc(d.order_no)}</span>`);
  if(d.supplier)tags.push(`<span class="tag loc">${esc(d.supplier)}</span>`);
  if(tags.length){
    h+=`<div class="meta">${tags.join(' ')}</div>`;
  }
  let dlLine='';
  if(d.created_at)dlLine+=`受付: ${fmtDateJP(d.created_at)}`;
  if(d.deadline){
    if(dlLine)dlLine+='　/　';
    dlLine+=`納期: ${fmtDateJP(d.deadline)}`;
  }
  if(dlLine)h+=`<div class="dl">${dlLine}</div>`;
  if(d.amount!==''&&d.amount!=null&&!isNaN(Number(d.amount))&&Number(d.amount)>0){
    h+=`<div class="sub-info">${fmtAmount(d.amount)}</div>`;
  }
  if(d.notes){
    const nt=String(d.notes);
    h+=`<div class="note">${esc(nt.length>60?nt.slice(0,60)+'…':nt)}</div>`;
  }
  h+='</div>';
  return h;
}

function setBoardFilter(v){
  boardFilter=v;
  renderBoard();
}

// ===== 管理ビュー =====
function renderAdmin(){
  const el=$('adminView');
  let items=allEntries.slice();
  const kw=adminSearch.trim().toLowerCase();
  if(adminStatusFilter){
    items=items.filter(e=>e.status===adminStatusFilter);
  }
  if(kw){
    items=items.filter(e=>{
      const blob=(String(e.client||'')+' '+String(e.project||'')+' '+String(e.supplier||'')+' '+String(e.notes||'')+' '+String(e.our_person||'')+' '+String(e.person||'')+' '+String(e.order_no||'')+' '+String(e.estimate_no||'')).toLowerCase();
      return blob.includes(kw);
    });
  }
  const stCnt={};ALL_ST.forEach(s=>stCnt[s]=0);
  allEntries.forEach(e=>{if(stCnt[e.status]!==undefined)stCnt[e.status]++});
  items.sort((a,b)=>{
    let va=a[adminSort.col],vb=b[adminSort.col];
    const ea=va==null||va==='',eb=vb==null||vb==='';
    if(ea&&eb)return 0;if(ea)return 1;if(eb)return-1;
    if(adminSort.col==='created_at'||adminSort.col==='updated_at'||adminSort.col==='deadline'){
      va=String(va);vb=String(vb);
      return adminSort.asc?va.localeCompare(vb):vb.localeCompare(va);
    }
    if(adminSort.col==='amount'){
      const na=Number(va)||0,nb=Number(vb)||0;
      return adminSort.asc?na-nb:nb-na;
    }
    if(adminSort.col==='status'){
      const oa=ALL_ST.indexOf(va),ob=ALL_ST.indexOf(vb);
      return adminSort.asc?oa-ob:ob-oa;
    }
    va=String(va).toLowerCase();vb=String(vb).toLowerCase();
    return va<vb?(adminSort.asc?-1:1):va>vb?(adminSort.asc?1:-1):0;
  });
  const cols=[
    {key:'project',label:'物件名'},
    {key:'our_person',label:'担当者'},
    {key:'estimate_no',label:'見積番号'},
    {key:'order_no',label:'受注番号'},
    {key:'client',label:'得意先'},
    {key:'person',label:'窓口'},
    {key:'supplier',label:'仕入先'},
    {key:'amount',label:'金額'},
    {key:'deadline',label:'納期'},
    {key:'status',label:'ステータス'}
  ];
  const ftBtn=(label,val)=>{
    const on=adminStatusFilter===val?' on':'';
    const cnt=val?stCnt[val]||0:allEntries.length;
    return `<button class="ft${on}" data-st="${val||''}">${label} (${cnt})</button>`;
  };
  let h=`<div class="av-top"><button class="av-add" onclick="openMo()">+ 新規登録</button><input class="av-search" placeholder="検索..." oninput="adminSearch=this.value;renderAdmin()" value="${esc(adminSearch)}"></div>`;
  h+=`<div class="adm-filter">${ftBtn('すべて',null)}`;
  ACTIVE_ST.forEach(s=>{h+=ftBtn(s,s)});
  h+='</div>';
  h+='<div class="tbl-wrap"><table class="tbl"><thead><tr>';
  cols.forEach(c=>{
    const a=adminSort.col===c.key?(adminSort.asc?'▲':'▼'):'';
    h+=`<th data-col="${c.key}">${c.label}<span class="arrow">${a}</span></th>`;
  });
  h+='<th>伝票</th><th>操作</th></tr></thead><tbody>';
  if(items.length===0){
    h+='<tr><td colspan="'+(cols.length+2)+'" class="empty-msg">該当する案件はありません</td></tr>';
  }else{
    items.forEach(d=>{
      h+='<tr>';
      cols.forEach(c=>{
        let v=d[c.key]||'';
        if(c.key==='status'){
          h+=`<td><select class="st-mini" onchange="changeStatus('${esc(d.id)}',this.value)">`;
          ALL_ST.forEach(o=>{h+=`<option${v===o?' selected':''}>${o}</option>`});
          h+='</select></td>';
        }else if(c.key==='deadline'){
          h+=`<td>${fmtDateJP(v)}</td>`;
        }else if(c.key==='amount'){
          h+=`<td style="text-align:right;font-variant-numeric:tabular-nums">${fmtAmount(v)}</td>`;
        }else{
          h+=`<td>${esc(v)}</td>`;
        }
      });
      const chk=String(d.invoiced||'').toUpperCase()==='TRUE';
      h+=`<td style="text-align:center"><input type="checkbox" ${chk?'checked':''} onchange="toggleInvoiced('${esc(d.id)}',this.checked)" style="width:18px;height:18px;cursor:pointer"></td>`;
      h+=`<td><button class="act-btn" onclick="openMo('${esc(d.id)}')">編集</button> <button class="act-btn del" onclick="delEntry('${esc(d.id)}')">削除</button></td>`;
      h+='</tr>';
    });
  }
  h+='</tbody></table></div>';
  el.innerHTML=h;
  el.querySelectorAll('th[data-col]').forEach(th=>{
    th.onclick=()=>{
      const c=th.dataset.col;
      if(adminSort.col===c)adminSort.asc=!adminSort.asc;
      else{adminSort.col=c;adminSort.asc=true}
      renderAdmin();
    };
  });
  el.querySelectorAll('[data-st]').forEach(btn=>{
    btn.onclick=()=>{
      const v=btn.dataset.st;
      adminStatusFilter=v||null;
      renderAdmin();
    };
  });
}

// ===== 案件詳細モーダル（閲覧専用） =====
function vr(label,val){return`<div class="view-row"><div class="view-label">${label}</div><div class="view-val">${esc(val||'')}</div></div>`;}
function openView(id){
  const d=allEntries.find(x=>String(x.id)===String(id));
  if(!d)return;
  let h='';
  h+=vr('物件名',d.project);
  if(d.our_person)h+=vr('担当者',d.our_person);
  if(d.estimate_no)h+=vr('見積番号',d.estimate_no);
  if(d.order_no)h+=vr('受注番号',d.order_no);
  if(d.client)h+=vr('得意先',d.client);
  if(d.person)h+=vr('窓口',d.person);
  if(d.supplier)h+=vr('仕入先',d.supplier);
  if(d.amount!==''&&d.amount!=null&&!isNaN(Number(d.amount))&&Number(d.amount)>0){
    h+=vr('金額',fmtAmount(d.amount));
  }
  h+=vr('受付日',fmtDateJP(d.created_at)||'―');
  if(d.deadline)h+=vr('納期',fmtDateJP(d.deadline));
  if(d.notes)h+=vr('備考',d.notes);
  // ステータス変更ボタン
  h+='<div class="st-change"><div class="st-change-label">ステータス変更</div><div class="st-change-btns">';
  ACTIVE_ST.forEach(s=>{

  });
  h+='</div></div>';
  $('viewContent').innerHTML=h;
  $('viewContent').querySelectorAll('.st-btn').forEach(btn=>{
    btn.onclick=()=>{
      const newSt=btn.dataset.st;
      if(d.status===newSt)return;
      changeStatus(id,newSt);
      openView(id); // 再描画してボタン状態更新
    };
  });
  $('viewBg').classList.add('show');
}
function closeView(){$('viewBg').classList.remove('show');}
document.getElementById('viewBg').addEventListener('click',function(e){
  if(e.target===this)closeView();
});

// ===== 編集モーダル =====
function openMo(id){
  const isEdit=!!id;
  let e={};
  if(isEdit){
    e=allEntries.find(x=>String(x.id)===String(id))||{};
  }
  $('moTitle').textContent=isEdit?'案件編集':'案件登録';
  $('f_id').value=isEdit?e.id:'';
  $('f_project').value=isEdit?(e.project||''):'';
  $('f_our_person').value=isEdit?(e.our_person||''):'';
  $('f_estimate_no').value=isEdit?(e.estimate_no||''):'';
  $('f_order_no').value=isEdit?(e.order_no||''):'';
  $('f_client').value=isEdit?(e.client||''):'';
  $('f_person').value=isEdit?(e.person||''):'';
  $('f_supplier').value=isEdit?(e.supplier||''):'';
  $('f_amount').value=isEdit?(e.amount===''||e.amount==null?'':e.amount):'';
  $('f_created_at').value=isEdit?fmtDate(e.created_at):fmtDate(new Date());
  $('f_deadline').value=isEdit?fmtDate(e.deadline):'';
  $('f_status').value=isEdit?(e.status||'見積中'):'見積中';
  $('f_notes').value=isEdit?(e.notes||''):'';
  refreshDatalists();
  $('moBg').classList.add('show');
}
function closeMo(){$('moBg').classList.remove('show');}
document.getElementById('moBg').addEventListener('click',function(e){
  if(e.target===this)closeMo();
});

function saveEntry(){
  const id=$('f_id').value;
  const payload={
    project:$('f_project').value.trim(),
    our_person:$('f_our_person').value.trim(),
    estimate_no:$('f_estimate_no').value.trim(),
    order_no:$('f_order_no').value.trim(),
    client:$('f_client').value.trim(),
    person:$('f_person').value.trim(),
    supplier:$('f_supplier').value.trim(),
    amount:$('f_amount').value,
    created_at:$('f_created_at').value,
    deadline:$('f_deadline').value,
    status:$('f_status').value,
    notes:$('f_notes').value
  };
  if(!payload.project){toast('物件名は必須');$('f_project').focus();return;}
  if(!payload.created_at){toast('受付日は必須');return;}
  const today=fmtDate(new Date());
  if(id){
    const idx=allEntries.findIndex(x=>String(x.id)===String(id));
    if(idx>=0){
      allEntries[idx]={...allEntries[idx],...payload,id,updated_at:today};
    }
    apiPost({action:'save',id,...payload});
    toast('更新しました');
  }else{
    const tempId='s_'+Date.now();
    allEntries.push({id:tempId,...payload,updated_at:today});
    apiPost({action:'save',...payload});
    toast('登録しました');
    setTimeout(()=>{ loadData(); }, 1500);
  }
  _setCache('sales',{entries:allEntries});
  closeMo();
  render();
  refreshDatalists();
}

function changeStatus(id,newSt){
  const idx=allEntries.findIndex(x=>String(x.id)===String(id));
  if(idx<0)return;
  const today=fmtDate(new Date());
  allEntries[idx]={...allEntries[idx],status:newSt,updated_at:today};
  _setCache('sales',{entries:allEntries});
  apiPost({action:'save',id,status:newSt});
  render();
  toast('ステータスを更新しました');
}

function toggleInvoiced(id,checked){
  const idx=allEntries.findIndex(x=>String(x.id)===String(id));
  if(idx<0)return;
  allEntries[idx].invoiced=checked?'TRUE':'FALSE';
  _setCache('sales',{entries:allEntries});
  apiPost({action:'save',id,invoiced:allEntries[idx].invoiced});
}

function delEntry(id){
  const e=allEntries.find(x=>String(x.id)===String(id));
  if(!e)return;
  if(!confirm('この案件を削除しますか？\n'+(e.client||'')+' / '+(e.project||'')))return;
  allEntries=allEntries.filter(x=>String(x.id)!==String(id));
  _setCache('sales',{entries:allEntries});
  apiPost({action:'delete',id});
  render();
  refreshDatalists();
  toast('削除しました');
}


setView('board');
loadData();

let _bgBusy=false;
setInterval(()=>{
  if(document.visibilityState!=='visible')return;
  if(_bgBusy)return;
  _bgBusy=true;
  Promise.resolve(loadData()).finally(()=>{_bgBusy=false});
},5*60*1000);

async function safeRefresh(btn, fn){
  if(!btn || btn.disabled) return;
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '↻ 更新中...';
  try{
    await Promise.resolve(fn());
    btn.innerHTML = '✓ 完了';
  }catch(e){
    btn.innerHTML = '⚠ 失敗';
  }finally{
    setTimeout(()=>{ btn.innerHTML = orig; btn.disabled = false; }, 1000);
  }
}
function toast(msg,err){const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.className='toast show'+(err?' err':'');clearTimeout(t._tm);t._tm=setTimeout(()=>t.className='toast',2500);}
</script>
