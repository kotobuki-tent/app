<style>
@import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap');
:root{
  --bg:#f5f6fa;--surface:#fff;--surface2:#fafbfc;--surface3:#f0f1f5;
  --text:#1a1d27;--text-dim:#5a6270;--text-faint:#8a92a0;
  --border:#e0e2e8;--border-light:#ecedf0;
  --accent:#db2777;--accent-dim:rgba(219,39,119,.1);
  --green:#2a9d5a;--green-dim:rgba(42,157,90,.1);
  --orange:#f59e0b;--orange-dim:rgba(245,158,11,.1);
  --red:#dc2626;--red-dim:rgba(220,38,38,.1);
  --purple:#8b5cf6;--purple-dim:rgba(139,92,246,.1);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,.1);
  --teal:#0d9488;--teal-dim:rgba(13,148,136,.1);
  --gray:#6b7280;--gray-dim:rgba(107,114,128,.1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font:400 14px/1.5 'Noto Sans JP',-apple-system,sans-serif;color:var(--text);background:var(--bg);min-height:100vh;padding-top:48px}
.app{padding:24px}
.loading{display:flex;align-items:center;justify-content:center;gap:12px;padding:40px;color:var(--text-dim)}
.spin{width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}

.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toolbar input[type="search"]{padding:9px 12px;border:1px solid var(--border);border-radius:8px;font:400 13px/1 'Noto Sans JP',sans-serif;background:var(--surface);min-width:260px}
.toolbar select{padding:9px 12px;border:1px solid var(--border);border-radius:8px;font:400 13px/1 'Noto Sans JP',sans-serif;background:var(--surface)}
.toolbar .count{font-size:12px;color:var(--text-dim);margin-left:auto}

table.jobs{width:100%;background:var(--surface);border-collapse:collapse;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
table.jobs th{background:var(--surface3);padding:10px 12px;text-align:left;font-size:12px;font-weight:700;color:var(--text-dim);border-bottom:1px solid var(--border);white-space:nowrap}
table.jobs td{padding:12px;border-bottom:1px solid var(--border-light);font-size:13px;cursor:pointer;vertical-align:top}
table.jobs tr:hover td{background:var(--accent-dim)}
table.jobs tr:last-child td{border-bottom:none}
table.jobs td.item-cell{font-weight:600;max-width:340px;white-space:normal;word-break:break-word}
table.jobs td.cust-cell{color:var(--text-dim);white-space:nowrap}
table.jobs td.note-cell{color:var(--text-faint);font-size:12px;max-width:240px;white-space:normal;word-break:break-word}
table.jobs td.num-cell{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;color:var(--text-dim)}
table.jobs td.date-cell{white-space:nowrap;color:var(--text-dim);font-size:12px}

.st-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap}
.st-見積中{background:var(--purple-dim);color:var(--purple)}
.st-受注{background:var(--blue-dim);color:var(--blue)}
.st-発注済{background:var(--orange-dim);color:var(--orange)}
.st-入荷待ち{background:var(--teal-dim);color:var(--teal)}
.st-入荷済{background:var(--green-dim);color:var(--green)}
.st-納品済{background:var(--accent-dim);color:var(--accent)}
.st-完了{background:var(--surface3);color:var(--text-dim)}
.st-見送り{background:var(--red-dim);color:var(--red)}

.no-data{text-align:center;color:var(--text-faint);padding:40px;background:var(--surface);border:1px solid var(--border);border-radius:10px}

/* === 新規フォーム === */
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:22px;max-width:560px}
.form-card h2{font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:5px}
.field label .req{color:var(--accent);margin-left:3px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font:400 13px/1.4 'Noto Sans JP',sans-serif;background:var(--surface)}
.field textarea{resize:vertical;min-height:64px;line-height:1.5}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
.field-row{display:flex;gap:10px}
.field-row .field{flex:1}
.form-actions{display:flex;gap:10px;margin-top:18px}
.btn-save{background:var(--accent);color:#fff;border:none;padding:11px 22px;border-radius:8px;font:600 13px/1 'Noto Sans JP',sans-serif;cursor:pointer;transition:.15s}
.btn-save:hover{filter:brightness(.92)}
.btn-save:disabled{opacity:.5;cursor:not-allowed}
.btn-reset{background:var(--surface3);color:var(--text-dim);border:none;padding:11px 18px;border-radius:8px;font:500 13px/1 'Noto Sans JP',sans-serif;cursor:pointer}
.btn-reset:hover{background:var(--border-light)}

/* === モーダル === */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px}
.modal-bg.hidden{display:none}
.modal{background:var(--surface);border-radius:12px;max-width:560px;width:100%;max-height:90vh;overflow:auto}
.modal-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.modal-head h2{font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px}
.modal-head .mh-sub{font-size:12px;color:var(--text-dim)}
.modal-close{background:none;border:none;font-size:22px;color:var(--text-dim);cursor:pointer;line-height:1;padding:0 4px}
.modal-body{padding:18px 20px}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;background:var(--surface2)}
.btn-del{background:var(--red-dim);color:var(--red);border:1px solid transparent;padding:9px 16px;border-radius:8px;font:500 13px/1 'Noto Sans JP',sans-serif;cursor:pointer;margin-right:auto}
.btn-del:hover{background:var(--red);color:#fff}

/* ステータス変更ボタン群（モーダル内） */
.st-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.st-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:8px 4px;border-radius:6px;font:600 12px/1.3 'Noto Sans JP',sans-serif;cursor:pointer;transition:.15s}
.st-btn:hover{border-color:var(--accent);color:var(--accent)}
.st-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* トースト */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1d27;color:#fff;padding:11px 20px;border-radius:8px;font-size:13px;z-index:1000;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}

/* ヘッダー（全HTML統一） */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;background:#fb7185;display:flex;align-items:stretch;height:48px;padding:0;gap:0}
.hdr-inner{display:flex;align-items:stretch;width:100%;padding:6px 8px 0 8px;gap:2px}
.nav-link{background:rgba(255,255,255,.04);border:none;color:rgba(74,14,31,.85);font:500 13px/1 'Noto Sans JP',sans-serif;padding:0 14px;border-radius:8px 8px 0 0;cursor:pointer;transition:background .15s,color .15s;text-decoration:none;display:inline-flex;align-items:center;margin-bottom:0;position:relative;white-space:nowrap}
.nav-link:hover{color:#4a0e1f;background:rgba(255,255,255,.1)}
.nav-link.on{background:var(--bg,#f5f6fa);color:#1a1d27;font-weight:700}
.nav-link.on::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--bg,#f5f6fa)}
.home-link{font-weight:700}
.hdr-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(74,14,31,.9);padding:0 14px;border-radius:6px;font:500 12px/1 'Noto Sans JP',sans-serif;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;height:32px;align-self:center;margin-left:4px}
.hdr-btn:hover{color:#4a0e1f;border-color:rgba(255,255,255,.5)}
.nav-menu-btn{background:rgba(255,255,255,.08);border:none;color:#4a0e1f;font-size:20px;line-height:1;padding:0 12px;border-radius:6px;cursor:pointer;height:32px;align-self:center;display:none}
.nav-menu-btn:hover{background:rgba(255,255,255,.18)}
.home-link{display:inline-flex;align-items:center}
.nav-spacer{flex:1}
.nav-right{display:contents}
@media(max-width:768px){
  .nav-right{display:none;position:fixed;top:48px;right:10px;background:#fb7185;border-radius:10px;padding:6px;flex-direction:column;gap:2px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:999;min-width:160px}
  .nav-right.open{display:flex}
  .nav-right .nav-link{padding:10px 14px;border-radius:6px;font-size:14px;text-align:left;background:transparent;color:rgba(74,14,31,.85)}
  .nav-right .nav-link.on{background:var(--bg,#f5f6fa);color:#1a1d27}
  .nav-right .nav-link.on::after{display:none}
  .nav-menu-btn{display:inline-flex;align-items:center;justify-content:center}
  .nav-spacer{flex:1}
  .hdr{padding:0}
  .hdr-inner{padding:6px 8px 0 8px;overflow-x:auto;scrollbar-width:none}
  .hdr-inner::-webkit-scrollbar{display:none}
  .nav-link{flex-shrink:0;font-size:12px;padding:0 10px}
}

@media (max-width:768px){
  .hdr::-webkit-scrollbar{display:none}
  .hdr h1{font-size:15px;flex-shrink:0}
  .nav-link,.hdr-btn{flex-shrink:0;white-space:nowrap;font-size:12px;padding:6px 10px}
  .app{padding:14px 10px}
  .toolbar input[type="search"]{min-width:auto;width:100%}
  table.jobs{display:block;overflow-x:auto;white-space:nowrap}
  .st-grid{grid-template-columns:repeat(3,1fr)}
  .field-row{flex-direction:column;gap:0}
}

/* サブタブ（全HTML統一） */
.sub-tabs{display:flex;gap:6px;padding:14px 24px;margin:-24px -24px 16px;background:#f5f6fa}
.sub-tab{background:#f0f1f5;border:none;color:var(--text-dim);font:600 13px/1 'Noto Sans JP',sans-serif;padding:8px 16px;border-radius:999px;cursor:pointer;transition:.15s}
.sub-tab:hover{color:var(--text);background:#e2e5f0}
.sub-tab.on{background:#fce7f3;color:#9d174d}
@media(max-width:768px){.sub-tab{padding:7px 14px;font-size:12px}}
</style>

<script>
// ===== nav-right モバイル時 body 直下に移動 =====
(function(){
  let originalParent=null, originalNextSibling=null;
  function syncNavRight(){
    const nr=document.querySelector('.nav-right');
    if(!nr)return;
    const isMobile=window.matchMedia('(max-width:768px)').matches;
    if(isMobile){
      if(nr.parentElement!==document.body){
        originalParent=nr.parentElement;
        originalNextSibling=nr.nextSibling;
        document.body.appendChild(nr);
      }
    } else {
      if(nr.parentElement===document.body&&originalParent){
        if(originalNextSibling&&originalNextSibling.parentElement===originalParent){
          originalParent.insertBefore(nr,originalNextSibling);
        } else {
          originalParent.appendChild(nr);
        }
      }
    }
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',syncNavRight);
  }else{
    syncNavRight();
  }
  window.addEventListener('resize',syncNavRight);
})();
function toggleNavMenu(){
  const el=document.querySelector('.nav-right');
  if(el)el.classList.toggle('open');
}
document.addEventListener('click',function(e){
  const btn=e.target.closest('.nav-menu-btn');
  const menu=e.target.closest('.nav-right');
  if(!btn&&!menu){
    const nr=document.querySelector('.nav-right');
    if(nr)nr.classList.remove('open');
  }
});

// ===== sessionStorage キャッシュ =====
function _getCache(key){
  try{const s=sessionStorage.getItem('seq_'+key);return s?JSON.parse(s):null;}catch(e){return null;}
}
function _setCache(key,data){
  try{sessionStorage.setItem('seq_'+key,JSON.stringify(data));}catch(e){}
}

const API='https://script.google.com/macros/s/AKfycbwD5F1rJcdg7pl1lnVXzyY0vttcO88z-YKUZWG3eLIT0DNMhFZw8jXbJoKW6wCIKEC7/exec';
const DEPT='sales';
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let allEntries=[];
let currentView='active';   // active / new / archive / admin
let selectedId=null;
let editStatus='';

// 表示順：アクション優先度（次に動かす番が上）
const stOrderActive={'入荷済':1,'納品済':2,'入荷待ち':3,'発注済':4,'受注':5,'見積中':6};
const stOrderArchive={'完了':1,'見送り':2};

async function apiGet(params){
  const qs=new URLSearchParams({dept:DEPT,...params}).toString();
  const r=await fetch(API+'?'+qs);
  return r.json();
}
async function apiPost(body){
  fetch(API,{method:'POST',mode:'no-cors',body:JSON.stringify({dept:DEPT,...body})});
  return{success:true};
}

function setView(v){
  currentView=v;
  document.querySelectorAll('.sub-tab').forEach(b=>{
    b.classList.toggle('on',b.dataset.view===v);
  });
  // 表示エリア切り替え
  if(v==='new'){
    $('listArea').classList.add('hidden');
    $('newArea').classList.remove('hidden');
    // 受付日に今日をセット
    if(!$('f_created_at').value){
      $('f_created_at').value=fmtDate(new Date());
    }
    refreshDatalists();
  } else {
    $('listArea').classList.remove('hidden');
    $('newArea').classList.add('hidden');
    const sf=$('stFilter');
    if(v==='active'){
      sf.disabled=false;
      // active時にarchive用ステータスが選ばれてたらクリア
      if(sf.value==='完了'||sf.value==='見送り')sf.value='';
    } else if(v==='archive'){
      sf.disabled=false;
      if(['見積中','受注','発注済','入荷待ち','入荷済','納品済'].includes(sf.value))sf.value='';
    } else {
      sf.disabled=false;
    }
    renderTable();
  }
}

function fmtDate(d){
  if(!d)return'';
  if(typeof d==='string'){
    if(/^\d{4}-\d{2}-\d{2}/.test(d))return d.slice(0,10);
    d=new Date(d);
  }
  if(!(d instanceof Date)||isNaN(d))return'';
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+dd;
}
function fmtDateJP(s){
  const d=fmtDate(s);if(!d)return'―';
  const [y,m,dd]=d.split('-');return parseInt(m,10)+'/'+parseInt(dd,10);
}
function fmtAmount(v){
  if(v===''||v===null||v===undefined)return'';
  const n=Number(v);if(isNaN(n))return'';
  return '¥'+n.toLocaleString();
}

async function loadData(){
  // キャッシュから即復元
  const cached=_getCache('sales');
  if(cached&&cached.entries){
    allEntries=cached.entries;
    renderTable();
  }else{
    $('loader').classList.remove('hidden');
    $('content').innerHTML='';
  }
  try{
    const j=await apiGet({action:'read'});
    if(j.success){
      allEntries=j.data||[];
    }
  }catch(e){
    console.warn('load error',e);
  }
  $('loader').classList.add('hidden');
  _setCache('sales',{entries:allEntries});
  renderTable();
  refreshDatalists();
}

function refreshDatalists(){
  // 客先・仕入先のサジェスト候補を過去入力から自動生成
  const cust=[...new Set(allEntries.map(e=>String(e.customer||'').trim()).filter(Boolean))].sort();
  const supp=[...new Set(allEntries.map(e=>String(e.supplier||'').trim()).filter(Boolean))].sort();
  $('customerList').innerHTML=cust.map(c=>`<option value="${esc(c)}">`).join('');
  $('supplierList').innerHTML=supp.map(s=>`<option value="${esc(s)}">`).join('');
}

function renderTable(){
  const kw=$('searchBox').value.trim().toLowerCase();
  const stFilter=$('stFilter').value;
  const v=currentView;
  let list=allEntries.filter(e=>{
    const st=String(e.status||'').trim();
    if(v==='active' && (st==='完了'||st==='見送り'))return false;
    if(v==='archive' && !(st==='完了'||st==='見送り'))return false;
    // admin は全件
    if(stFilter && st!==stFilter)return false;
    if(kw){
      const blob=(String(e.customer||'')+' '+String(e.item||'')+' '+String(e.supplier||'')+' '+String(e.note||'')+' '+String(e.staff||'')).toLowerCase();
      if(!blob.includes(kw))return false;
    }
    return true;
  });
  // ソート：ステータス順 → 受付日新しい順
  const order=v==='archive'?stOrderArchive:(v==='admin'?{...stOrderActive,'完了':99,'見送り':100}:stOrderActive);
  list.sort((a,b)=>{
    const oa=order[a.status]||999,ob=order[b.status]||999;
    if(oa!==ob)return oa-ob;
    return String(b.created_at||'').localeCompare(String(a.created_at||''));
  });
  $('count').textContent=list.length+'件';
  if(list.length===0){
    $('content').innerHTML='<div class="no-data">該当する案件はありません</div>';
    return;
  }
  let html='<table class="jobs"><thead><tr>';
  html+='<th>受付</th><th>客先</th><th>品名</th><th>ステータス</th><th>仕入先</th><th>金額</th><th>担当</th><th>メモ</th>';
  html+='</tr></thead><tbody>';
  list.forEach(e=>{
    html+=`<tr onclick="showDetail('${esc(e.id)}')">`;
    html+=`<td class="date-cell">${fmtDateJP(e.created_at)}</td>`;
    html+=`<td class="cust-cell">${esc(e.customer||'―')}</td>`;
    html+=`<td class="item-cell">${esc(e.item||'―')}</td>`;
    html+=`<td><span class="st-badge st-${esc(e.status||'見積中')}">${esc(e.status||'見積中')}</span></td>`;
    html+=`<td class="cust-cell">${esc(e.supplier||'')}</td>`;
    html+=`<td class="num-cell">${fmtAmount(e.amount)}</td>`;
    html+=`<td class="cust-cell">${esc(e.staff||'')}</td>`;
    html+=`<td class="note-cell">${esc(e.note||'')}</td>`;
    html+='</tr>';
  });
  html+='</tbody></table>';
  $('content').innerHTML=html;
}

function showDetail(id){
  const e=allEntries.find(x=>String(x.id)===String(id));
  if(!e)return;
  selectedId=String(id);
  editStatus=String(e.status||'見積中');
  $('d_item').textContent=e.item||'―';
  $('d_customer').textContent=(e.customer||'―')+'　/　受付 '+fmtDateJP(e.created_at);
  const sts=['見積中','受注','発注済','入荷待ち','入荷済','納品済','完了','見送り'];
  let html='<div style="font-size:12px;color:var(--text-dim);font-weight:600;margin-bottom:8px">ステータス</div>';
  html+='<div class="st-grid">';
  sts.forEach(s=>{
    html+=`<button type="button" class="st-btn ${s===editStatus?'on':''}" data-st="${s}" onclick="setEditStatus('${s}')">${s}</button>`;
  });
  html+='</div>';
  html+='<div class="field"><label>受付日</label><input type="date" id="d_created_at" value="'+fmtDate(e.created_at)+'"></div>';
  html+='<div class="field"><label>客先</label><input type="text" id="d_cust_in" list="customerList" value="'+esc(e.customer||'')+'"></div>';
  html+='<div class="field"><label>品名</label><input type="text" id="d_item_in" value="'+esc(e.item||'')+'"></div>';
  html+='<div class="field-row">';
  html+='<div class="field"><label>仕入先</label><input type="text" id="d_supp_in" list="supplierList" value="'+esc(e.supplier||'')+'"></div>';
  html+='<div class="field"><label>金額</label><input type="number" id="d_amt_in" value="'+(e.amount===''||e.amount==null?'':e.amount)+'"></div>';
  html+='</div>';
  html+='<div class="field"><label>担当</label><select id="d_staff_in">';
  ['','社長','事務員'].forEach(s=>{html+=`<option value="${s}"${(e.staff||'')===s?' selected':''}>${s||'未指定'}</option>`;});
  html+='</select></div>';
  html+='<div class="field"><label>メモ</label><textarea id="d_note_in">'+esc(e.note||'')+'</textarea></div>';
  html+='<div style="font-size:11px;color:var(--text-faint);margin-top:6px">最終更新: '+fmtDateJP(e.updated_at)+'　/ ID: '+esc(e.id)+'</div>';
  $('d_body').innerHTML=html;
  refreshDatalists();
  $('detailModal').classList.remove('hidden');
}
function setEditStatus(s){
  editStatus=s;
  document.querySelectorAll('.st-btn').forEach(b=>{
    b.classList.toggle('on',b.dataset.st===s);
  });
}
function closeDetail(){
  $('detailModal').classList.add('hidden');
  selectedId=null;
}

function saveEdit(){
  if(!selectedId)return;
  const idx=allEntries.findIndex(x=>String(x.id)===selectedId);
  if(idx<0)return;
  const payload={
    id:selectedId,
    created_at:$('d_created_at').value,
    customer:$('d_cust_in').value.trim(),
    item:$('d_item_in').value.trim(),
    status:editStatus,
    supplier:$('d_supp_in').value.trim(),
    amount:$('d_amt_in').value,
    staff:$('d_staff_in').value,
    note:$('d_note_in').value
  };
  if(!payload.customer||!payload.item){toast('客先と品名は必須');return;}
  // 楽観的更新
  allEntries[idx]={...allEntries[idx],...payload,updated_at:fmtDate(new Date())};
  _setCache('sales',{entries:allEntries});
  apiPost({action:'save',...payload});
  closeDetail();
  renderTable();
  refreshDatalists();
  toast('更新しました');
}

function deleteEntry(){
  if(!selectedId)return;
  const e=allEntries.find(x=>String(x.id)===selectedId);
  if(!e)return;
  if(!confirm('この案件を削除しますか？\n'+(e.customer||'')+' / '+(e.item||'')))return;
  allEntries=allEntries.filter(x=>String(x.id)!==selectedId);
  _setCache('sales',{entries:allEntries});
  apiPost({action:'delete',id:selectedId});
  closeDetail();
  renderTable();
  refreshDatalists();
  toast('削除しました');
}

function saveNew(){
  const payload={
    created_at:$('f_created_at').value,
    customer:$('f_customer').value.trim(),
    item:$('f_item').value.trim(),
    status:$('f_status').value,
    supplier:$('f_supplier').value.trim(),
    amount:$('f_amount').value,
    staff:$('f_staff').value,
    note:$('f_note').value
  };
  if(!payload.created_at){toast('受付日は必須');return;}
  if(!payload.customer){toast('客先は必須');$('f_customer').focus();return;}
  if(!payload.item){toast('品名は必須');$('f_item').focus();return;}
  // 楽観的に仮IDで追加
  const tempId='s_'+Date.now();
  const today=fmtDate(new Date());
  const newEntry={id:tempId,...payload,updated_at:today};
  allEntries.push(newEntry);
  _setCache('sales',{entries:allEntries});
  apiPost({action:'save',...payload}); // id無しなら新規（GAS側で採番）
  toast('登録しました');
  resetForm();
  // 一覧に戻す
  setView('active');
  // 直後に最新取得（GAS採番のIDを反映）
  setTimeout(()=>{ loadData(); }, 1500);
}

function resetForm(){
  $('f_customer').value='';
  $('f_item').value='';
  $('f_supplier').value='';
  $('f_amount').value='';
  $('f_staff').value='';
  $('f_note').value='';
  $('f_status').value='受注';
  $('f_created_at').value=fmtDate(new Date());
}

function toast(msg){
  const t=$('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(t._tm);
  t._tm=setTimeout(()=>t.classList.remove('show'),2000);
}

loadData();
// 自動更新：5分間隔、タブが見えてる時だけ、前回が走り切ってから
let _bgBusy=false;
setInterval(()=>{
  if(document.visibilityState!=='visible')return;
  if(_bgBusy)return;
  _bgBusy=true;
  Promise.resolve(loadData()).finally(()=>{_bgBusy=false});
},5*60*1000);

// 「↻ 更新」ボタン共通：連打防止＋進行表示
async function safeRefresh(btn, fn){
  if(!btn || btn.disabled) return;
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '↻ 更新中...';
  try{
    await Promise.resolve(fn());
    btn.innerHTML = '✓ 完了';
  }catch(e){
    btn.innerHTML = '⚠ 失敗';
  }finally{
    setTimeout(()=>{ btn.innerHTML = orig; btn.disabled = false; }, 1000);
  }
}
</script>
