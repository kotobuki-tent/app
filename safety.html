<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>安全点検 – 業務管理</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='56' fill='%231f2c38'/><text x='90' y='134' text-anchor='middle' font-family='serif' font-weight='900' font-size='100' fill='%23ffffff'>安</text></svg>">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='10' fill='%231f2c38'/><text x='16' y='24' text-anchor='middle' font-family='serif' font-weight='900' font-size='20' fill='%23ffffff'>安</text></svg>">
<meta name="theme-color" content="#1f2c38">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{font-family:'Noto Sans JP',sans-serif;background:#eef1f3;color:#1a2228;min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;display:flex;flex-direction:column}
.hdr{background:#1f2c38;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.hdr h1{font-size:19px;font-weight:900;color:#fff;letter-spacing:.08em}
.hdr .today{font:700 15px/1 'Noto Sans JP';color:rgba(255,255,255,.8)}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:28px 22px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;width:100%;max-width:1080px}
.card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px 22px;border-radius:22px;text-decoration:none;color:#fff;box-shadow:0 6px 18px rgba(0,0,0,.12);transition:.12s;min-height:220px}
.card:active{transform:scale(.98)}
.card:hover{box-shadow:0 10px 26px rgba(0,0,0,.18)}
.card .ic{font-family:serif;font-weight:900;font-size:72px;line-height:1;width:108px;height:108px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.16);border-radius:26px}
.card .ttl{font-size:22px;font-weight:800;letter-spacing:.02em;text-align:center}
.card .sub{font-size:13.5px;font-weight:500;opacity:.85;text-align:center}
.foot{text-align:center;color:#9aa7b0;font-size:12px;padding:16px}
</style>
</head>
<body>
<div class="hdr">
  <h1>安全点検</h1>
  <span class="today" id="today"></span>
</div>
<div class="wrap"><div class="grid" id="grid"></div></div>
<div class="foot">寿テント 安全点検</div>
<script>
// ここに1行足すだけでメニューが増える
const TOOLS=[
  { ic:'検', title:'アルコールチェック',        sub:'運転前・運転後の酒気帯び確認', href:'alcohol.html',  grad:['#46b0b3','#3aa3a6'] },
  { ic:'点', title:'フォークリフト始業前点検',  sub:'機体ごとの始業前チェック',     href:'forklift.html', grad:['#4a6e8a','#416079'] }
];
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
document.getElementById('grid').innerHTML=TOOLS.map(t=>
  `<a class="card" href="${esc(t.href)}" style="background:linear-gradient(150deg,${t.grad[0]},${t.grad[1]})">
     <div class="ic">${esc(t.ic)}</div>
     <div class="ttl">${esc(t.title)}</div>
     <div class="sub">${esc(t.sub)}</div>
   </a>`).join('');
const d=new Date();
document.getElementById('today').textContent=d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
</script>
</body>
</html>
