<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務管理 SPA（試作）</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='10' fill='%23fb7185'/><text x='16' y='24' text-anchor='middle' font-family='serif' font-weight='900' font-size='18' fill='%23fff'>寿</text></svg>">
<meta name="theme-color" content="#fb7185">
<style>
@import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f6fa;--surface:#fff;--surface2:#fafbfc;--surface3:#f0f1f5;
  --border:#d8dbe3;--border-light:#ecedf0;
  --text:#1a1d27;--text-dim:#5a6270;--text-faint:#8a92a0;
  --accent:#3b82f6;--accent-dim:rgba(59,111,216,.1);
  --red:#dc2626;--red-dim:rgba(220,38,38,.1);
  --orange:#f59e0b;--orange-dim:rgba(245,158,11,.1);
  --green:#2a9d5a;--green-dim:rgba(42,157,90,.1);
  --purple:#8b5cf6;--purple-dim:rgba(139,92,246,.1);
  --cyan:#0891b2;--cyan-dim:rgba(8,145,178,.1);
}
html{font-size:15px;scrollbar-gutter:stable;-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-top:48px}
.empty-msg{text-align:center;padding:40px 20px;color:var(--text-faint);font-size:13px}

/* ===== サブタブ行（共通） ===== */
.sub-tabs{display:flex;gap:6px;padding:14px 16px;background:#f5f6fa;align-items:center}
.subtab-date{display:inline-flex;align-items:center;height:29px;font-size:14px;line-height:1;color:var(--text-dim);font-weight:500;margin-right:10px;white-space:nowrap}
.subtab-search{margin-left:auto;padding:7px 14px;border:1px solid var(--border);border-radius:999px;font:400 13px/1 'Noto Sans JP',sans-serif;width:200px;appearance:none;-webkit-appearance:none;background:var(--surface);flex-shrink:0}
.sub-tab{background:#f0f1f5;border:none;color:var(--text-dim);font:600 13px/1 'Noto Sans JP',sans-serif;padding:8px 16px;border-radius:999px;cursor:pointer;transition:.15s;min-width:123px;text-align:center}
.sub-tab:hover{color:var(--text);background:#e2e5f0}
.sub-tab.on{background:#dbeafe;color:#1e40af}
@media(max-width:768px){
  .sub-tabs{padding:10px 16px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap}
  .sub-tabs::-webkit-scrollbar{display:none}
  .sub-tab{flex-shrink:0;padding:7px 14px;font-size:12px}
  .toast{bottom:16px;width:calc(100% - 32px);max-width:400px;font-size:12px;padding:11px 18px}
  .subtab-date{display:none}
  .subtab-search{display:none}
}
.hidden{display:none!important}

/* ===== ローディング（共通・1個） ===== */
.loading-overlay{position:fixed;inset:48px 0 0 0;background:rgba(255,255,255,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;color:var(--text-dim);font-size:14px;backdrop-filter:blur(2px)}
.loading-overlay .spin{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
.loading{text-align:center;padding:80px 20px;color:var(--text-dim);font-size:14px}
.loading .spin{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== モーダル枠（共通） ===== */
.mo-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;justify-content:center;align-items:flex-start;padding:40px 16px;overflow-y:auto}
.mo-bg.show{display:flex}
.mo{background:var(--surface);border-radius:14px;padding:28px;width:100%;max-width:580px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mo h2{font-size:18px;font-weight:900;margin-bottom:20px}
.mo-row{display:flex;gap:14px;margin-bottom:14px}
.mo-row.full{display:block;margin-bottom:14px}
.mo-field{flex:1;display:flex;flex-direction:column;gap:5px}
.mo-field label{font-size:12px;font-weight:600;color:var(--text-dim)}
.mo-field input,.mo-field select,.mo-field textarea{padding:10px 12px;border:1px solid var(--border);border-radius:8px;font:400 14px/1.4 'Noto Sans JP',sans-serif;background:var(--surface2);width:100%}
.mo-field textarea{min-height:70px;resize:vertical}
.mo-field input:focus,.mo-field select:focus,.mo-field textarea:focus{outline:none;border-color:var(--accent)}
.mo-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.mo-foot button{padding:10px 22px;border-radius:8px;font:600 14px/1 'Noto Sans JP',sans-serif;cursor:pointer;border:1px solid var(--border)}
.mo-foot .cancel{background:var(--surface);color:var(--text-dim)}
.mo-foot .save{background:var(--accent);color:#fff;border-color:var(--accent)}
.mo-foot .save:hover{opacity:.85}

/* ===== テーブル（共通） ===== */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px;background:var(--surface)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--surface2);font-weight:600;text-align:left;padding:10px 12px;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--accent)}
th .arrow{font-size:10px;margin-left:4px;color:var(--text-faint)}
td{padding:10px 12px;border-top:1px solid var(--surface3);white-space:nowrap}
tr:hover td{background:rgba(59,111,216,.03)}
.act-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;padding:2px 6px}
.act-btn.del{color:var(--red)}
.act-btn:hover{text-decoration:underline}

/* ===== 詳細行（共通・vr が生成） ===== */
.view-row{display:flex;gap:16px;margin-bottom:10px;font-size:13px}
.view-row .view-label{font-weight:600;color:var(--text-dim);min-width:80px;flex-shrink:0}
.view-row .view-val{color:var(--text)}

/* ===== トースト（共通・1個） ===== */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1d27;color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:500;z-index:400;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
.toast.err{background:#dc2626}

/* ===== ヘッダー（アプリ間ナビ・共通） ===== */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;background:#fb7185;display:flex;align-items:stretch;height:48px;padding:0;gap:0}
.hdr-inner{display:flex;align-items:stretch;width:100%;padding:6px 8px 0 8px;gap:2px}
.nav-link{background:rgba(255,255,255,.04);border:none;color:rgba(74,14,31,.85);font:500 13px/1 'Noto Sans JP',sans-serif;padding:0 14px;border-radius:8px 8px 0 0;cursor:pointer;transition:background .15s,color .15s;text-decoration:none;display:inline-flex;align-items:center;margin-bottom:0;position:relative;white-space:nowrap}
.nav-link:hover{color:#4a0e1f;background:rgba(255,255,255,.1)}
.nav-link.on{background:var(--bg,#f5f6fa);color:#1a1d27;font-weight:700}
.nav-link.on::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--bg,#f5f6fa)}
.home-link{font-weight:700;display:inline-flex;align-items:center}
.hdr-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(74,14,31,.9);padding:0 14px;border-radius:6px;font:500 12px/1 'Noto Sans JP',sans-serif;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;height:32px;align-self:center;margin-left:4px}
.hdr-btn:hover{color:#4a0e1f;border-color:rgba(255,255,255,.5)}
.nav-spacer{flex:1}
.nav-right{display:contents}
@media(max-width:768px){
  .nav-spacer{display:none}
  .nav-right{display:contents}
  .hdr-inner{padding:6px 8px 0 8px;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .hdr-inner::-webkit-scrollbar{display:none}
  .nav-link{flex-shrink:0;font-size:12px;padding:0 11px}
  .hdr-btn{flex-shrink:0;font-size:11px;padding:0 11px;margin-left:8px}
  .hdr::after{content:'';position:absolute;top:0;right:0;width:22px;height:48px;background:linear-gradient(to right,transparent,#fb7185);pointer-events:none;z-index:1}
}
@media (max-width:768px){
  html{font-size:14px}
}



/* ===== 生産固有CSS（カード/フィルター/STAFF/slog/ステータス変更/ファイル） ===== */
.factory-view{padding:16px}
.fv-date{display:none}
.fv-sum{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;align-items:center}
.fv-si{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;min-width:90px;text-align:center;cursor:pointer;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.fv-si:hover{border-color:var(--accent)}
.fv-si.on{border-color:var(--accent);background:var(--accent-dim)}
.fv-si .n{font-size:26px;font-weight:900;line-height:1.1}
.fv-si .l{font-size:11px;color:var(--text-dim);margin-top:2px}
.fv-grp{margin-bottom:28px}
.fv-grp-hd{font-size:13px;font-weight:700;color:var(--text-dim);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.fv-grp-hd::after{content:'';flex:1;height:1px;background:var(--border)}
.fv-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.fv-card{background:var(--surface);border-radius:12px;padding:16px;border-left:4px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04);cursor:pointer;transition:.15s}
.fv-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.fv-card.urgent{border-left-color:var(--red)}
.fv-card.thisweek{border-left-color:var(--orange)}
.fv-card.twoweeks{border-left-color:var(--accent)}
.fv-card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.fv-card .pname{font-weight:600;font-size:15px}
.fv-card .badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;white-space:nowrap}
.fv-card .badge.urgent{color:var(--red);background:var(--red-dim)}
.fv-card .badge.thisweek{color:var(--orange);background:var(--orange-dim)}
.fv-card .badge.twoweeks{color:var(--accent);background:var(--accent-dim)}
.fv-card .meta{font-size:12px;color:var(--text-dim);display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:6px}
.fv-card .tag{font-size:11px;padding:2px 7px;border-radius:5px;font-weight:600}
.fv-card .tag.loc{color:var(--cyan);background:var(--cyan-dim)}
.fv-card .tag.st{color:var(--purple);background:var(--purple-dim)}
.fv-card .tag.eno{color:var(--accent);background:var(--accent-dim)}
.fv-card .tag.person{color:var(--green);background:var(--green-dim)}
.fv-card .assignee{font-size:12px;color:var(--text-dim);margin:4px 0 2px}
.fv-card .dl{font-size:13px;color:var(--text-dim);margin-top:4px}
.fv-card .sub-info{font-size:12px;color:var(--green);background:var(--green-dim);padding:4px 8px;border-radius:6px;margin-top:6px;display:inline-block}
.admin-view{padding:16px}
.av-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}
/* 管理タブ フィルター（全アプリ統一） */
.adm-filter{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.adm-filter .ft{background:#f0f1f5;border:1px solid transparent;color:var(--text-dim);font:600 12px/1 'Noto Sans JP',sans-serif;padding:7px 13px;border-radius:999px;cursor:pointer;transition:.15s}
.adm-filter .ft:hover{color:var(--text);background:#e2e5f0}
.adm-filter .ft.on{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
.av-add{background:var(--accent);color:#fff;border:none;padding:9px 18px;border-radius:8px;font:600 13px/1 'Noto Sans JP',sans-serif;cursor:pointer}
.av-add:hover{opacity:.85}
.av-search{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font:400 13px/1 'Noto Sans JP',sans-serif;width:220px;appearance:none;-webkit-appearance:none;background:var(--surface)}

.files-section{margin-top:20px;border-top:2px solid var(--surface3);padding-top:16px}
.files-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.files-hd span{font-size:14px;font-weight:700}
.files-add-btn{font-size:12px;background:var(--accent);color:#fff;border:none;padding:5px 14px;border-radius:6px;cursor:pointer;font-weight:600}
.files-add-btn:hover{opacity:.85}
.file-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface2);border-radius:8px;margin-bottom:6px;font-size:12px;cursor:pointer;transition:.15s}
.file-item:hover{background:var(--surface3)}
.file-item .f-icon{width:32px;height:32px;border-radius:6px;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0}
.file-item .f-name{flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item .f-date{color:var(--text-faint);font-size:11px;flex-shrink:0}
.file-item .f-unlink{background:none;border:none;color:var(--red);cursor:pointer;font-size:11px;padding:2px 6px;flex-shrink:0}
.fp-item{display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid var(--surface3);cursor:pointer;transition:.15s}
.fp-item:hover{background:var(--accent-dim)}
.fp-item.already{opacity:.4;pointer-events:none}
.fp-item .fp-icon{width:36px;height:36px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:var(--text-dim);flex-shrink:0}
.fp-item .fp-name{flex:1;font-size:13px;font-weight:500}
.fp-item .fp-meta{font-size:11px;color:var(--text-faint)}
.st-change{margin-top:18px;padding-top:16px;border-top:2px solid var(--surface3)}
.st-change-label{font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:10px}
.st-change-btns{display:flex;gap:8px;flex-wrap:wrap}
.st-btn{padding:10px 20px;border-radius:8px;font:600 14px/1 'Noto Sans JP',sans-serif;cursor:pointer;border:2px solid var(--border);background:var(--surface);color:var(--text-dim);transition:.15s}
.st-btn:hover{border-color:var(--accent);color:var(--accent)}
.st-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);cursor:default}

/* 折りたたみ式ステータス変更（誤タップ防止） */
.st-toggle{display:flex;align-items:center;justify-content:space-between;width:100%;padding:13px 16px;border-radius:10px;border:2px solid var(--border);background:var(--surface);cursor:pointer;font:600 14px/1 'Noto Sans JP',sans-serif;color:var(--text);transition:.15s}
.st-toggle:hover{border-color:var(--accent)}
.st-toggle .st-cur{display:flex;align-items:center;gap:8px}
.st-toggle .st-cur-badge{display:inline-block;padding:3px 12px;border-radius:6px;font-size:13px;font-weight:700;background:var(--accent);color:#fff}
.st-toggle .st-caret{color:var(--text-faint);font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:5px}
.st-toggle .st-arrow{display:inline-block;font-size:11px;transition:transform .2s}
.st-toggle.open .st-arrow{transform:rotate(180deg)}
.st-opts{display:none;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.st-opts.open{display:grid}
.st-opt{padding:13px 16px;border-radius:8px;font:600 14px/1 'Noto Sans JP',sans-serif;cursor:pointer;border:2px solid var(--border);background:var(--surface);color:var(--text-dim);transition:.15s}
.st-opt:hover{border-color:var(--accent);color:var(--accent)}
.st-opt.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ステータスログボタン */
.slog-btn{background:none;border:1px solid var(--border);color:var(--text-dim);font:500 12px/1 'Noto Sans JP',sans-serif;padding:6px 12px;border-radius:8px;cursor:pointer;position:relative;transition:.15s;white-space:nowrap;flex-shrink:0}
/* 企画はSTAFFボタンが無いので、slogボタンを右寄せ起点に（生産は#prodTabsで無影響） */
#projTabs .slog-btn{margin-left:auto}
.slog-btn:hover{border-color:var(--accent);color:var(--accent)}
.slog-btn .dot{position:absolute;top:-3px;right:-3px;width:10px;height:10px;border-radius:50%;background:var(--red);border:2px solid var(--bg);display:none}
.slog-btn.has-new .dot{display:block}
.slog-item{padding:12px 14px;border-bottom:1px solid var(--surface3);font-size:13px;line-height:1.6;cursor:pointer;transition:.15s}
.slog-item:hover{background:var(--accent-dim)}
.slog-item.sl-del{cursor:default;color:var(--text-dim)}
.slog-item.sl-del:hover{background:transparent}
.slog-item.sl-del .sl-st{color:var(--red)}
.slog-item:last-child{border-bottom:none}
.slog-item .sl-name{font-weight:600;color:var(--text)}
.slog-item .sl-st{font-weight:700;color:var(--accent);margin:0 2px}

/* STAFFボタンと出勤モーダル */
.staff-btn{margin-left:auto;background:none;border:1px solid var(--border);color:var(--text-dim);font:500 12px/1 'Noto Sans JP',sans-serif;padding:6px 12px;border-radius:8px;cursor:pointer;transition:.15s;white-space:nowrap;flex-shrink:0}
.staff-btn+.slog-btn{margin-left:8px}
.slog-btn+.subtab-search{margin-left:8px}
.staff-btn:hover{border-color:var(--accent);color:var(--accent)}
.staff-btn .count{font-weight:700;color:var(--text);margin-left:4px}
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;padding:4px}
.staff-cell{padding:14px 10px;border:2px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text-dim);font:500 14px/1.3 'Noto Sans JP',sans-serif;cursor:pointer;text-align:center;transition:.1s;user-select:none;position:relative}
.staff-cell:hover{border-color:var(--accent)}
.staff-cell.f1{background:#aed581;color:#1b5e20;border-color:#8bc34a;font-weight:700}
.staff-cell.f2{background:#81d4fa;color:#01579b;border-color:#4fc3f7;font-weight:700}
.staff-cell .floor-badge{position:absolute;top:3px;right:6px;font-size:10px;font-weight:700;opacity:.85}
.staff-cell .pos{display:block;font-size:10px;font-weight:400;margin-top:3px;opacity:.75}

/* ===== 生産固有CSS モバイル（#prodAdmin/#prodArchive カード化等） ===== */
@media (max-width:768px){
  html{font-size:14px}
  /* ヘッダー：タイトル縮小、ナビ横スクロール */

  /* サブタブ横スクロール */
  
  /* 工場ボード：padding削減 */
  .factory-view,.admin-view{padding:12px 10px}
  .staff-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px}
  .staff-cell{padding:12px 8px;font-size:13px;min-height:48px}

  /* サマリー：文字ピル化（管理タブのフィルターと統一） */
  .fv-sum{display:none !important}
  .fv-si{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;min-width:0;border-radius:999px;background:#f0f1f5;border:1px solid transparent;box-shadow:none;text-align:left}
  .fv-si .n{font-size:13px;font-weight:700;line-height:1;margin:0;order:2}
  .fv-si .l{font-size:12px;font-weight:600;line-height:1;margin:0;color:inherit;order:1}
  .fv-si.on{background:var(--accent-dim);border-color:var(--accent)}

  /* 工場カード：1列＆内部調整 */
  .fv-cards{grid-template-columns:1fr;gap:10px}
  .fv-card{padding:14px 13px}
  .fv-card .pname{font-size:15px;line-height:1.35}
  .fv-card .top{gap:8px}
  .fv-card .meta{font-size:11px;gap:5px}
  .fv-card .tag{font-size:10px;padding:2px 6px}
  .fv-card .dl{font-size:12px}

  /* 管理ビュー：検索フィールド横幅100% */
  .av-top{flex-direction:column;align-items:stretch;gap:8px}
  .av-search{display:none}
  .av-add{padding:11px 18px;font-size:13px}

  /* === テーブル→カード化（管理ビュー） === */
  #prodAdmin .tbl-wrap{border:none;background:transparent;overflow:visible}
  #prodAdmin table,#prodAdmin thead,#prodAdmin tbody,#prodAdmin tr,#prodAdmin td{display:block;width:100%}
  #prodAdmin thead{display:none}

<script>
/* ========================================================================
   共通ユーティリティ（12個・両アプリで同一確認済みを1セット）
   API dow pad parseD esc vr $ _getCache _setCache fireAndForget toast safeRefresh centerActiveNav
   ======================================================================== */
const API='https://script.google.com/macros/s/AKfycbwD5F1rJcdg7pl1lnVXzyY0vttcO88z-YKUZWG3eLIT0DNMhFZw8jXbJoKW6wCIKEC7/exec';
const dow='日月火水木金土';
const today=new Date();today.setHours(0,0,0,0);
const pad=n=>String(n).padStart(2,'0');
const dateStr=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const dateJP=d=>`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${dow[d.getDay()]}）`;
const parseD=s=>{if(!s)return null;const d=new Date(s+'T00:00:00');return isNaN(d)?null:d};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const vr=(label,val)=>`<div class="view-row"><div class="view-label">${label}</div><div class="view-val">${esc(val||'')}</div></div>`;
const $=id=>document.getElementById(id);
function _getCache(key){
  try{const s=sessionStorage.getItem('seq_'+key);return s?JSON.parse(s):null;}catch(e){return null;}
}
function _setCache(key,data){
  try{sessionStorage.setItem('seq_'+key,JSON.stringify(data));}catch(e){}
}
function fireAndForget(body){fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)})}
function toast(msg,err){const t=$('toast');if(!t)return;t.textContent=msg;t.className='toast show'+(err?' err':'');clearTimeout(t._tm);t._tm=setTimeout(()=>t.className='toast',2500);}
async function safeRefresh(btn, fn){
  if(!btn || btn.disabled) return;
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '↻ 更新中...';
  try{
    await Promise.resolve(fn());
    btn.innerHTML = '✓ 完了';
  }catch(e){
    btn.innerHTML = '⚠ 失敗';
  }finally{
    setTimeout(()=>{ btn.innerHTML = orig; btn.disabled = false; }, 1000);
  }
}

/* ========================================================================
   名前空間（移植フェーズで各アプリの data/view/render/loadAll 等を流し込む）
   骨組み段階ではロード機構の検証用に最小限だけ実装
   ======================================================================== */
const Prod = (function(){
  // ===== 生産の状態（旧グローバル変数→IIFE内ローカルに隔離） =====
  let prodData=[];
  let curProdView='factory';
  let prodSort={col:null,asc:true};
  let prodFilter=null;
  let adminStatusFilter=null;
  let archiveSort={col:'deadline',asc:false};
  let slog=[];
  let slogUnread=0;
  const SLOG_KEY='prod_status_snapshot';
  const SLOG_LIST_KEY='prod_status_log';
  const SLOG_UNREAD_KEY='prod_status_unread';
  let staffList=[];
  let attendance={};
  let currentViewId=null;
  let driveFiles=null;
  // 生産固有ユーティリティ（diffDays のみ固有。today/dateStr/dateJP等は共通土台を使用）
  const diffDays=(a,b)=>Math.round((a-b)/864e5);

  // ===== データ読み込み（loadAll本物化：production+attendanceの2本。driveは遅延取得のまま含めない） =====
  async function loadProd(){try{const r=await fetch(API+'?action=read&dept=production');const j=await r.json();if(j.success){prodData=j.data;detectStatusChanges()}}catch(e){toast('生産部データ取得エラー',true)}}
  async function loadAttendance(){
    try{
      const d=new Date();const todayStr=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      const r=await fetch(API+'?dept=attendance&action=read&date='+todayStr);
      const j=await r.json();
      if(j.success){staffList=j.staff||[];attendance=j.attendance||{}}
    }catch(e){/* 静かに失敗 */}
  }
  async function loadAll(){
    const cached=_getCache('index');
    if(cached){
      if(cached.prod)prodData=cached.prod;
      if(cached.att)attendance=cached.att;
      render();
    }
    await Promise.all([loadProd(),loadAttendance()]);
    _setCache('index',{prod:prodData,att:attendance});
    render();
  }

  // ===== ステータス変更検知 =====
  function detectStatusChanges(){
    const curr={};
    prodData.forEach(d=>{if(d.id&&String(d.id).indexOf('tmp_')!==0)curr[String(d.id)]={status:d.status||'',project:d.project||''}});
    try{slog=JSON.parse(localStorage.getItem(SLOG_LIST_KEY)||'[]')}catch(e){slog=[]}
    try{slogUnread=parseInt(localStorage.getItem(SLOG_UNREAD_KEY)||'0',10)||0}catch(e){slogUnread=0}
    let prev=null;
    try{prev=JSON.parse(localStorage.getItem(SLOG_KEY)||'null')}catch(e){prev=null}
    if(!prev){localStorage.setItem(SLOG_KEY,JSON.stringify(curr));return}
    const newEntries=[];
    Object.keys(curr).forEach(id=>{
      if(!prev[id]){
        newEntries.push({id,project:curr[id].project,from:'',to:'新規登録',ts:Date.now(),isNew:true});
      }else if(prev[id].status!==curr[id].status){
        newEntries.push({id,project:curr[id].project,from:prev[id].status,to:curr[id].status,ts:Date.now()});
      }
    });
    Object.keys(prev).forEach(id=>{
      if(!curr[id]){
        newEntries.push({id,project:prev[id].project,from:prev[id].status,to:'削除',ts:Date.now(),isDel:true});
      }
    });
    if(newEntries.length){
      slog=[...newEntries,...slog].slice(0,20);
      slogUnread=Math.min(slogUnread+newEntries.length,20);
      localStorage.setItem(SLOG_LIST_KEY,JSON.stringify(slog));
      localStorage.setItem(SLOG_UNREAD_KEY,String(slogUnread));
    }
    localStorage.setItem(SLOG_KEY,JSON.stringify(curr));
  }

  function updateSlogBtn(){const b=$('prodSlogBtn');if(b)b.classList.toggle('has-new',slogUnread>0)}

  // ===== ステータスログモーダル（slogList→prodSlogList / slogBg→prodSlogBg リネーム適用） =====
  function openSlog(){
    const el=$('prodSlogList');
    if(!slog.length){
      el.innerHTML='<div class="empty-msg">変更履歴はまだありません</div>';
    }else{
      let h='';
      slog.forEach(e=>{
        const verb=(e.isNew||e.isDel)?'されました':'になりました';
        const cls=e.isDel?' sl-del':'';
        h+=`<div class="slog-item${cls}" data-id="${esc(e.id)}" data-del="${e.isDel?'1':'0'}"><span class="sl-name">${esc(e.project)}</span> が <span class="sl-st">${esc(e.to)}</span> ${verb}</div>`;
      });
      el.innerHTML=h;
      el.querySelectorAll('.slog-item').forEach(it=>{
        if(it.dataset.del==='1')return;
        it.onclick=()=>{closeSlog();viewProd(it.dataset.id)};
      });
    }
    slogUnread=0;
    localStorage.setItem(SLOG_UNREAD_KEY,'0');
    $('prodSlogBg').classList.add('show');
    if(curProdView==='factory')renderFactory();
  }
  function closeSlog(){
    $('prodSlogBg').classList.remove('show');
  }
  function clearSlog(){
    if(!slog.length)return;
    if(!confirm('ログをすべて削除しますか？'))return;
    slog=[];
    slogUnread=0;
    localStorage.setItem(SLOG_LIST_KEY,'[]');
    localStorage.setItem(SLOG_UNREAD_KEY,'0');
    $('prodSlogList').innerHTML='<div class="empty-msg">変更履歴はまだありません</div>';
    if(curProdView==='factory')renderFactory();
  }

  // ===== STAFF（出勤者） =====
  function staffCount(){
    let present=0,total=staffList.length;
    staffList.forEach(s=>{const f=attendance[s.employee_no];if(f==='1F'||f==='2F')present++});
    return{present,total};
  }
  function nextFloor(cur){
    if(cur==='1F')return'2F';
    if(cur==='2F')return'';
    return'1F';
  }
  function floorClass(f){
    if(f==='1F')return' f1';
    if(f==='2F')return' f2';
    return'';
  }
  function floorBadge(f){
    if(f==='1F'||f==='2F')return`<span class="floor-badge">${f}</span>`;
    return'';
  }
  function openStaff(){
    renderStaffGrid();
    $('staffBg').classList.add('show');
  }
  function closeStaff(){$('staffBg').classList.remove('show')}
  function renderStaffGrid(){
    const c=staffCount();
    $('staffCountLabel').textContent=`${c.present}/${c.total}`;
    const el=$('staffGrid');
    if(!staffList.length){el.innerHTML='<div class="empty-msg" style="grid-column:1/-1">STAFFが登録されていません</div>';return}
    let h='';

    });

    el.querySelectorAll('.staff-cell').forEach(cell=>{
      cell.onclick=()=>toggleStaff(cell.dataset.emp);
    });
  }
  function toggleStaff(empNo){
    const cur=attendance[empNo]||'';
    const nxt=nextFloor(cur);
    attendance[empNo]=nxt;
    const cell=$('staffGrid').querySelector(`.staff-cell[data-emp="${empNo}"]`);
    if(cell){
      cell.classList.remove('f1','f2');
      if(nxt==='1F')cell.classList.add('f1');
      else if(nxt==='2F')cell.classList.add('f2');
      const oldBadge=cell.querySelector('.floor-badge');
      if(oldBadge)oldBadge.remove();
      if(nxt){
        const b=document.createElement('span');
        b.className='floor-badge';
        b.textContent=nxt;
        cell.insertBefore(b,cell.firstChild);
      }
    }
    const c=staffCount();
    $('staffCountLabel').textContent=`${c.present}/${c.total}`;
    if(curProdView==='factory')updateStaffBtnCount();
    const d=new Date();const todayStr=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    fireAndForget({dept:'attendance',action:'cycle',employee_no:empNo,date:todayStr});
  }
  function updateStaffBtnCount(){
    const btn=document.querySelector('#prodTabs .staff-btn .count');
    if(btn){const c=staffCount();btn.textContent=`${c.present}/${c.total}`}
  }

  // ===== 描画 =====
  function render(){
    if(curProdView==='factory'){$('prodFactory').classList.remove('hidden');$('prodAdmin').classList.add('hidden');$('prodArchive').classList.add('hidden');renderFactory()}
    else if(curProdView==='admin'){$('prodFactory').classList.add('hidden');$('prodAdmin').classList.remove('hidden');$('prodArchive').classList.add('hidden');renderProdAdmin()}
    else if(curProdView==='archive'){$('prodFactory').classList.add('hidden');$('prodAdmin').classList.add('hidden');$('prodArchive').classList.remove('hidden');renderArchive()}
    updateSlogBtn();updateStaffBtnCount();
  }

  // ===== 工場ボード =====
  function renderFactory(){
    const el=$('prodFactory');
    let items=prodData.filter(d=>!['見積中','見送り','出荷済'].includes(d.status));
    const statusCnt=s=>items.filter(d=>d.status===s).length;
    const secCnt=s=>items.filter(d=>d.section===s).length;
    items.forEach(d=>{const dl=parseD(d.deadline);if(!dl){d._urgN=999;return}const diff=diffDays(dl,today);d._urgN=diff<0?-1:diff<=3?0:diff<=7?1:diff<=14?2:3});
    let filtered=items;
    if(prodFilter){if(['製作中','完成','受注'].includes(prodFilter))filtered=items.filter(d=>d.status===prodFilter);else if(['2F工場','1F工場','出力関係','外注','未定','その他'].includes(prodFilter))filtered=items.filter(d=>d.section===prodFilter);else if(prodFilter==='urgent')filtered=items.filter(d=>d._urgN<=0);else if(prodFilter==='thisweek')filtered=items.filter(d=>d._urgN===1)}
    const si=(f,n,l,color)=>{const on=prodFilter===f?' on':'';return`<div class="fv-si${on}" data-f="${f}" style="${color?'color:'+color:''}"><div class="n">${n}</div><div class="l">${l}</div></div>`};
    let h=`<div class="fv-sum">`;

    h+=si('製作中',statusCnt('製作中'),'製作中','');
    h+=si('完成',statusCnt('完成'),'完成','');
    h+=si('2F工場',secCnt('2F工場'),'2F工場','');
    h+=si('1F工場',secCnt('1F工場'),'1F工場','');
    h+=si('出力関係',secCnt('出力関係'),'出力関係','');
    h+=si('外注',secCnt('外注'),'外注','');
    h+=si('未定',secCnt('未定'),'未定','');
    h+=si('その他',secCnt('その他'),'その他','');
    h+='</div>';
    const groups=[{label:'納期迫る・超過',items:filtered.filter(d=>d._urgN<=0)},{label:'今週中',items:filtered.filter(d=>d._urgN===1)},{label:'2週間以内',items:filtered.filter(d=>d._urgN===2)},{label:'それ以降',items:filtered.filter(d=>d._urgN===3)},{label:'納期未定',items:filtered.filter(d=>d._urgN===999)}];
    groups.forEach(g=>{if(!g.items.length)return;h+=`<div class="fv-grp"><div class="fv-grp-hd">${g.label}　${g.items.length}件</div><div class="fv-cards">`;g.items.forEach(d=>{const dl=parseD(d.deadline);const diff=dl?diffDays(dl,today):null;const cls=d._urgN<=0?'urgent':d._urgN===1?'thisweek':'twoweeks';let badge='';if(d._urgN<=0&&dl)badge=`<span class="badge urgent">${diff<0?Math.abs(diff)+'日超過':'納期迫る'}</span>`;else if(d._urgN===1)badge='<span class="badge thisweek">今週中</span>';else if(d._urgN===2)badge='<span class="badge twoweeks">2週間以内</span>';const dlStr=dl?`${dl.getMonth()+1}/${dl.getDate()}（${dow[dl.getDay()]}）${diff!==null?(diff<0?Math.abs(diff)+'日超過':'あと'+diff+'日'):''}`:'未定';h+=`<div class="fv-card ${cls}" data-id="${d.id}"><div class="top"><span class="pname">${esc(d.project)}</span>${badge}</div>`;if(d.our_person)h+=`<div class="assignee">担当: <span class="tag person">${esc(d.our_person)}</span></div>`;h+=`<div class="meta">${esc(d.client||'')}`;if(d.order_no)h+=` <span class="tag eno">${esc(d.order_no)}</span>`;if(d.section)h+=` <span class="tag loc">${esc(d.section)}</span>`;h+=` <span class="tag st">${esc(d.status)}</span></div><div class="dl">納期: ${dlStr}</div>`;if(d.subcontractor)h+=`<div class="sub-info">外注先: ${esc(d.subcontractor)}</div>`;h+='</div>'});h+='</div></div>'});
    el.innerHTML=h;
    el.querySelectorAll('.fv-si').forEach(s=>{s.onclick=()=>{const f=s.dataset.f;prodFilter=prodFilter===f?null:f;render()}});
    el.querySelectorAll('.fv-card').forEach(c=>{c.onclick=()=>viewProd(c.dataset.id)});
  }
  function factoryFilter(q){q=q.toLowerCase();$('prodFactory').querySelectorAll('.fv-card').forEach(c=>{c.style.display=c.textContent.toLowerCase().includes(q)?'':'none'})}
  function unifiedSearch(q){

      el.style.display=el.textContent.toLowerCase().includes(q)?'':'none';

  // ===== 管理テーブル =====

    });

    h+='<div class="tbl-wrap"><table><thead><tr>';cols.forEach(c=>{const a=prodSort.col===c.key?(prodSort.asc?'▲':'▼'):'';h+=`<th data-col="${c.key}">${c.label}<span class="arrow">${a}</span></th>`});h+='<th>伝票</th><th>操作</th></tr></thead><tbody>';
    items.forEach(d=>{h+='<tr>';cols.forEach(c=>{let v=d[c.key]||'';if(c.key==='status'){const opts=['見積中','受注','製作中','完成','出荷済','見送り'];h+=`<td><select onchange="Prod.changeStatus('${d.id}',this.value)" style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;font:400 13px/1 'Noto Sans JP',sans-serif;background:var(--surface2);cursor:pointer">`;opts.forEach(o=>{h+=`<option${v===o?' selected':''}>${o}</option>`});h+='</select></td>'}else{if(c.key==='deadline'&&v){const dd=parseD(v);v=dd?`${dd.getMonth()+1}/${dd.getDate()}（${dow[dd.getDay()]}）`:v}h+=`<td>${esc(v)}</td>`}});const chk=String(d.invoiced||'').toUpperCase()==='TRUE';h+=`<td style="text-align:center"><input type="checkbox" ${chk?'checked':''} onchange="Prod.toggleInvoiced('${d.id}',this.checked)" style="width:18px;height:18px;cursor:pointer"></td><td><button class="act-btn" onclick="Prod.editProd('${d.id}')">編集</button> <button class="act-btn del" onclick="Prod.delProd('${d.id}')">削除</button></td></tr>`});
    h+='</tbody></table></div>';el.innerHTML=h;
    el.querySelectorAll('th[data-col]').forEach(th=>{th.onclick=()=>{const c=th.dataset.col;if(prodSort.col===c)prodSort.asc=!prodSort.asc;else{prodSort.col=c;prodSort.asc=true}render()}});
    el.querySelectorAll('[data-st]').forEach(btn=>{btn.onclick=()=>{const v=btn.dataset.st;adminStatusFilter=v||null;render()}});

  function viewProj(id){const d=projData.find(x=>String(x.id)===String(id));if(!d)return;const fmtDates=s=>{if(!s)return'';return String(s).split(',').map(x=>{const dd=parseD(x.trim());return dd?`${dd.getMonth()+1}/${dd.getDate()}（${dow[dd.getDay()]}）`:''}).filter(Boolean).join('、')};let h='';h+=vr('物件名',d.project);if(d.our_person)h+=vr('担当者',d.our_person);if(d.estimate_no)h+=vr('見積番号',d.estimate_no);if(d.order_no)h+=vr('受注番号',d.order_no);h+=vr('得意先',d.client);h+=vr('窓口',d.person);if(d.venue)h+=vr('会場',d.venue);if(d.address)h+=vr('住所',d.address);h+='<div class="view-section"><h3>日程</h3>';if(d.date_load_in)h+=vr('搬入',fmtDates(d.date_load_in));if(d.date_setup)h+=vr('設営',fmtDates(d.date_setup));if(d.date_event)h+=vr('本番',fmtDates(d.date_event));if(d.date_teardown)h+=vr('撤去',fmtDates(d.date_teardown));if(d.date_rental_out)h+=vr('貸出',fmtDates(d.date_rental_out));if(d.date_rental_return)h+=vr('返却',fmtDates(d.date_rental_return));h+='</div>';if(d.people_load_in||d.people_setup||d.people_event||d.people_teardown){h+='<div class="view-section"><h3>人数（予定）</h3>';if(d.people_load_in)h+=vr('搬入',d.people_load_in+'人');if(d.people_setup)h+=vr('設営',d.people_setup+'人');if(d.people_event)h+=vr('本番',d.people_event+'人');if(d.people_teardown)h+=vr('撤去',d.people_teardown+'人');h+='</div>'}const hasVh=d.vehicles_load_in||d.vehicles_setup||d.vehicles_event||d.vehicles_teardown||d.vehicles_rental_out||d.vehicles_rental_return;if(hasVh){h+='<div class="view-section"><h3>車両</h3>';if(d.vehicles_load_in)h+=vr('搬入',d.vehicles_load_in);if(d.vehicles_setup)h+=vr('設営',d.vehicles_setup);if(d.vehicles_event)h+=vr('本番',d.vehicles_event);if(d.vehicles_teardown)h+=vr('撤去',d.vehicles_teardown);if(d.vehicles_rental_out)h+=vr('貸出',d.vehicles_rental_out);if(d.vehicles_rental_return)h+=vr('返却',d.vehicles_rental_return);h+='</div>'}if(d.rentals)h+='<div class="view-section"><h3>レンタル品（メモ）</h3><div class="view-row"><div class="view-val">'+esc(d.rentals)+'</div></div></div>';const projRentals=rentalsData.filter(r=>r.client_name===d.project);h+='<div class="rental-add-section"><h3>レンタル品</h3>';if(projRentals.length){projRentals.forEach(r=>{const ds=r.date_start?((new Date(r.date_start+'T00:00:00').getMonth()+1)+'/'+new Date(r.date_start+'T00:00:00').getDate()):'';const de=r.date_end?((new Date(r.date_end+'T00:00:00').getMonth()+1)+'/'+new Date(r.date_end+'T00:00:00').getDate()):'';h+='<div class="rental-existing"><span class="re-info">'+esc(r.category)+' '+esc(r.item_name)+' × '+r.qty+'　'+ds+'〜'+de+'　<span style="font-size:11px;padding:2px 6px;border-radius:4px;background:var(--purple-dim);color:var(--purple)">'+esc(r.status)+'</span></span><button class="re-del" onclick="Proj.deleteProjectRental(\''+r.id+'\')">削除</button></div>'})}else{h+='<div style="font-size:12px;color:var(--text-faint);margin-bottom:6px">まだ登録されていません</div>'}h+='<div id="rentalAddRows"></div><button class="rental-add-btn" onclick="Proj.addRentalRow(\''+esc(d.project)+'\')">＋ レンタル品を追加</button>';h+='<div id="rentalSaveBtnWrap" class="hidden"><button class="rental-save-btn" onclick="Proj.saveProjectRentals(\''+esc(d.project)+'\')">まとめて登録</button></div>';h+='</div>';if(d.notes)h+='<div class="view-section"><h3>備考</h3><div class="view-row"><div class="view-val">'+esc(d.notes)+'</div></div></div>';
    h+='<div class="st-change"><div class="st-change-label">ステータス変更</div>';
    h+=`<button class="st-toggle" id="projStToggle"><span class="st-cur">現在: <span class="st-cur-badge">${esc(d.status||'-')}</span></span><span class="st-caret">変更<span class="st-arrow">▼</span></span></button>`;
    h+='<div class="st-opts" id="projStOpts">';
    ['見積中','受注','準備中','現場中','レンタル中','完了'].forEach(s=>{const on=d.status===s?' on':'';h+=`<button class="st-opt${on}" data-st="${s}">${s}</button>`});
    h+='</div></div>';
    $('projViewContent').innerHTML=h;
    const ptgl=$('projStToggle'),popts=$('projStOpts');
    if(ptgl&&popts)ptgl.onclick=()=>{ptgl.classList.toggle('open');popts.classList.toggle('open')};
    $('projViewContent').querySelectorAll('.st-opt').forEach(btn=>{btn.onclick=()=>{const newSt=btn.dataset.st;if(d.status===newSt){ptgl.classList.remove('open');popts.classList.remove('open');return}d.status=newSt;fireAndForget({dept:'project',action:'save',id:d.id,status:newSt});toast(newSt+'に変更しました');viewProj(id);render()}});
    $('projViewBg').classList.add('show')}

  // ===== モーダル操作 =====
  function openProjMo(d){$('projMoTitle').textContent=d?'現場編集':'現場登録';$('xf_id').value=d?d.id:'';$('xf_project').value=d?d.project:'';$('xf_our_person').value=d?d.our_person||'':'';$('xf_estimate_no').value=d?d.estimate_no||'':'';$('xf_order_no').value=d?d.order_no||'':'';$('xf_client').value=d?d.client||'':'';$('xf_person').value=d?d.person||'':'';$('xf_venue').value=d?d.venue||'':'';$('xf_address').value=d?d.address||'':'';$('xf_status').value=d?d.status||'受注':'受注';['load_in','setup','event','teardown','rental_out','rental_return'].forEach(phase=>{const key='date_'+phase;const el=$('xf_dates_'+phase);el.innerHTML='';const vals=d&&d[key]?String(d[key]).split(',').map(s=>s.trim()).filter(Boolean):[];if(vals.length)vals.forEach(v=>addDateInput('xf_dates_'+phase,v));else addDateInput('xf_dates_'+phase)});$('xf_people_load_in').value=d?d.people_load_in||'':'';$('xf_people_setup').value=d?d.people_setup||'':'';$('xf_people_event').value=d?d.people_event||'':'';$('xf_people_teardown').value=d?d.people_teardown||'':'';$('xf_rentals').value=d?d.rentals||'':'';$('xf_notes').value=d?d.notes||'':'';VH_PHASES.forEach(p=>setVehiclesForPhase(p,d?d['vehicles_'+p]||'':''));$('xf_is_rental').checked=(d&&d.type==='レンタル');applyProjTypeUI();$('projMoBg').classList.add('show')}
  function toggleProjType(){
    const cb=$('xf_is_rental');
    cb.checked=!cb.checked;
    applyProjTypeUI();
  }
  function applyProjTypeUI(){
    const isRental=$('xf_is_rental').checked;
    document.querySelectorAll('#projMoBg .setup-only, #projMoBg .setup-only-hd').forEach(el=>{
      if(isRental)el.classList.add('rental-disabled');
      else el.classList.remove('rental-disabled');
    });
  }
  function closeProjMo(){$('projMoBg').classList.remove('show')}
  function editProj(id){const d=projData.find(x=>x.id===id);if(d)openProjMo(d)}

  // ===== 保存（楽観的更新） =====
  function saveProj(){
    const name=$('xf_project').value.trim();
    if(!name){toast('物件名を入力してください',true);return}
    const editId=$('xf_id').value;
    const isRental=$('xf_is_rental').checked;
    const type=isRental?'レンタル':'現場';
    const body={dept:'project',action:'save',id:editId||undefined,project:name,type:type,our_person:$('xf_our_person').value.trim(),estimate_no:$('xf_estimate_no').value.trim(),order_no:$('xf_order_no').value.trim(),client:$('xf_client').value.trim(),person:$('xf_person').value.trim(),venue:$('xf_venue').value.trim(),address:$('xf_address').value.trim(),status:$('xf_status').value,date_load_in:isRental?'':getDatesFromList('xf_dates_load_in'),date_setup:isRental?'':getDatesFromList('xf_dates_setup'),date_event:isRental?'':getDatesFromList('xf_dates_event'),date_teardown:isRental?'':getDatesFromList('xf_dates_teardown'),date_rental_out:getDatesFromList('xf_dates_rental_out'),date_rental_return:getDatesFromList('xf_dates_rental_return'),people_load_in:isRental?'':$('xf_people_load_in').value,people_setup:isRental?'':$('xf_people_setup').value,people_event:isRental?'':$('xf_people_event').value,people_teardown:isRental?'':$('xf_people_teardown').value,vehicles_load_in:isRental?'':getVehiclesFromPhase('load_in'),vehicles_setup:isRental?'':getVehiclesFromPhase('setup'),vehicles_event:isRental?'':getVehiclesFromPhase('event'),vehicles_teardown:isRental?'':getVehiclesFromPhase('teardown'),vehicles_rental_out:getVehiclesFromPhase('rental_out'),vehicles_rental_return:getVehiclesFromPhase('rental_return'),rentals:$('xf_rentals').value.trim(),notes:$('xf_notes').value.trim()};
    const isNew=!editId;
    if(editId){
      const idx=projData.findIndex(x=>String(x.id)===String(editId));
      if(idx!==-1)projData[idx]={...projData[idx],...body};
    }else{
      body.id='tmp_'+Date.now();
      projData.push(body);
    }
    fireAndForget(body);
    toast('保存しました');
    closeProjMo();
    render();
    if(isNew)setTimeout(loadAll,3000);
  }

  // ===== 削除（楽観的更新） =====
  function delProj(id){
    if(!confirm('この現場を削除しますか？'))return;
    projData=projData.filter(x=>x.id!==id);
    fireAndForget({dept:'project',action:'delete',id:id});
    toast('削除しました');
    render();
  }

  // ===== レンタル品（在庫連携） =====
  function getInvCategories(){const cats=new Set();inventoryItems.forEach(i=>{if(i.category)cats.add(i.category)});return[...cats].sort()}
  function getInvItemsByCat(cat){return inventoryItems.filter(i=>i.category===cat)}
  function addRentalRow(projectName){
    const wrap=$('rentalAddRows');
    const cats=getInvCategories();
    const row=document.createElement('div');row.className='rental-add-row';
    const catSel=document.createElement('select');catSel.className='ra-cat';
    catSel.innerHTML='<option value="">カテゴリ</option>'+cats.map(c=>'<option value="'+c+'">'+c+'</option>').join('');
    const itemSel=document.createElement('select');itemSel.className='ra-item';
    itemSel.innerHTML='<option value="">商品</option>';
    catSel.onchange=()=>{const items=getInvItemsByCat(catSel.value);itemSel.innerHTML='<option value="">商品</option>'+items.map(i=>'<option value="'+esc(String(i.item_name))+'">'+esc(String(i.item_name))+' ('+i.total_qty+')</option>').join('')};
    const qtyInp=document.createElement('input');qtyInp.className='ra-qty';qtyInp.type='number';qtyInp.min='1';qtyInp.value='1';qtyInp.placeholder='数量';
    const startInp=document.createElement('input');startInp.className='ra-date';startInp.type='date';
    const endInp=document.createElement('input');endInp.className='ra-date';endInp.type='date';
    const rmBtn=document.createElement('button');rmBtn.className='ra-rm';rmBtn.textContent='×';rmBtn.onclick=()=>{row.remove();if(!wrap.children.length)$('rentalSaveBtnWrap').classList.add('hidden')};
    row.appendChild(catSel);row.appendChild(itemSel);row.appendChild(qtyInp);row.appendChild(startInp);row.appendChild(endInp);row.appendChild(rmBtn);
    wrap.appendChild(row);
    $('rentalSaveBtnWrap').classList.remove('hidden');
  }
  function saveProjectRentals(projectName){
    const rows=$('rentalAddRows').querySelectorAll('.rental-add-row');
    if(!rows.length){toast('追加する行がありません',true);return}
    const items=[];
    for(const row of rows){
      const cat=row.querySelector('.ra-cat').value;
      const item=row.querySelector('.ra-item').value;
      const qty=row.querySelector('.ra-qty').value;
      const dates=row.querySelectorAll('.ra-date');
      const start=dates[0]?.value||'';
      const end=dates[1]?.value||'';
      if(!cat||!item||!start||!end){toast('カテゴリ・商品・日付を全て入力してください',true);return}
      const rental={category:cat,item_name:item,qty:qty,date_start:start,date_end:end,status:'予約',client_name:projectName,notes:''};
      items.push(rental);
      rentalsData.push({...rental,id:'tmp_'+Date.now()+'_'+Math.random().toString(36).slice(2,6)});
      fireAndForget({dept:'inventory',action:'save_rental',...rental});
    }
    toast(items.length+'件登録しました');
    const d=projData.find(x=>x.project===projectName);
    if(d)viewProj(d.id);
  }
  function deleteProjectRental(id){
    if(!confirm('このレンタル品を削除しますか？'))return;
    rentalsData=rentalsData.filter(x=>x.id!==id);
    fireAndForget({dept:'inventory',action:'delete_rental',id:id});
    toast('削除しました');
    $('projViewBg').classList.remove('show');
  }

  // ===== init（サブタブ切替イベント・車両チェックボックス生成・日付セット） =====
  function init(){
    $('projTabs').addEventListener('click',e=>{const t=e.target.closest('.sub-tab');if(!t)return;$('projTabs').querySelectorAll('.sub-tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');curProjView=t.dataset.view;render()});
    initVehicleChecks();   // モーダル内の車両チェックボックス生成（元コードはトップレベル即時実行→initへ）
    const pc=$('projPcDate');if(pc)pc.textContent=dateJP(today);
    $('projPcSearch').addEventListener('input',e=>unifiedSearch(e.target.value));
  }

  // ===== expose（onclick等から呼ぶ関数＋nav用loadAll/render/init＋ガントsetter） =====
  return {
    loadAll, render, init,
    openSlog, closeSlog, clearSlog,
    openProjMo, closeProjMo, editProj, saveProj, delProj, toggleProjType,
    changeProjStatus, toggleProjInvoiced,
    viewProj, addRentalRow, saveProjectRentals, deleteProjectRental, addDateInput,
    ganttMove, ganttToday, setGanttFilter, setGanttDays,
    unifiedSearch
  };
})();

/* ========================================================================
   App.nav：画面切替＋遅延ロード機構（SPAの心臓部）
   - display切替（hidden付け外し）＝0秒
   - 初回だけ そのアプリの loadAll を呼ぶ（_loaded フラグでガード）
   - 2回目以降は loadAll を呼ばない＝0秒（取得済みデータをメモリ保持）
   - _loaded フラグは App 側で集中管理（IIFE名前空間の内部状態に依存しない）
   - _loading ガード：初回ロード中の連打による二重発火・loader競合を防ぐ
   ======================================================================== */
const App = {
  current:null,
  _loaded:{prod:false, proj:false},
  _loading:{prod:false, proj:false},
  apps(){ return {prod:Prod, proj:Proj}; },
  async nav(name){
    if(this.current===name) return;     // 同じ画面なら何もしない
    // section の display 切替（0秒）
    $('view-prod').classList.toggle('hidden', name!=='prod');
    $('view-proj').classList.toggle('hidden', name!=='proj');
    // ヘッダーナビの .on 切替
    $('navProd').classList.toggle('on', name==='prod');
    $('navProj').classList.toggle('on', name==='proj');
    this.current=name;
    centerActiveNav();

    // 遅延ロード：初回だけ。_loading ガードで二重発火防止
    const app = this.apps()[name];
    if(!this._loaded[name] && !this._loading[name]){
      this._loading[name]=true;
      $('loader').classList.remove('hidden');
      try{
        await app.loadAll();
        this._loaded[name]=true;
      }catch(e){
        toast('データ取得エラー',true);
      }finally{
        this._loading[name]=false;
        // loader競合対策：今表示中の画面がまだロード中でなければ消す
        // （生産ロード中に企画へ切替→生産完了でhideしても、企画がまだ_loading中なら消さない）
        if(!this._loading[this.current]) $('loader').classList.add('hidden');
      }
    }
  },
  // 更新：今表示中のアプリだけ再取得（裏アプリのGASは叩かない＝SEQ-011全停止対策）
  async refreshCurrent(){
    const name=this.current;
    const app=this.apps()[name];
    this._loading[name]=true;
    try{ await app.loadAll(); this._loaded[name]=true; }
    finally{ this._loading[name]=false; }
  }
};

// 更新ボタン配線：今のアプリだけ再ロード
$('refreshBtn').addEventListener('click', function(){
  safeRefresh(this, ()=>App.refreshCurrent());
});

// 自動更新：5分間隔・タブが見えてる時だけ・前回完了後・「今表示中のアプリだけ」
// （裏アプリまで叩くとSEQ-011のGASカスケード再来。表示中のみに限定）
let _bgBusy=false;
setInterval(()=>{
  if(document.visibilityState!=='visible')return;
  if(_bgBusy)return;
  if(!App.current)return;
  _bgBusy=true;
  // 自動更新は loader を出さない（バックグラウンド更新）
  const app=App.apps()[App.current];
  Promise.resolve(app.loadAll()).finally(()=>{_bgBusy=false});
},5*60*1000);

// 初期表示：各アプリの init（イベント配線）→ 生産を開く（初回ロード発火）
window.addEventListener('load', ()=>{
  Prod.init();
  Proj.init();
  App.current=null;
  App.nav('prod');
});
</script>
