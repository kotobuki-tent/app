<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生産部 – 工程管理</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%233b6fd8'/><text x='16' y='23' text-anchor='middle' font-family='sans-serif' font-weight='900' font-size='18' fill='white'>製</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%233b6fd8'/><text x='90' y='125' text-anchor='middle' font-family='sans-serif' font-weight='900' font-size='100' fill='white'>製</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f6f8;--surface:#fff;--surface2:#f0f1f4;--surface3:#e6e8ed;
  --border:#d8dbe3;--border-light:#c8ccd6;
  --text:#1a1d27;--text-dim:#6b7084;--text-faint:#9498ab;
  --accent:#3b6fd8;--accent-dim:rgba(59,111,216,.1);
  --red:#d94040;--red-dim:rgba(217,64,64,.1);
  --orange:#d48a20;--orange-dim:rgba(212,138,32,.1);
  --green:#2a9d5a;--green-dim:rgba(42,157,90,.1);
  --purple:#7c5cbf;--purple-dim:rgba(124,92,191,.1);
  --cyan:#2196a8;--cyan-dim:rgba(33,150,168,.1);
}
html{font-size:15px}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.sub-tabs{display:flex;gap:6px;padding:10px 16px 0;background:var(--bg)}
.sub-tab{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);font:500 12px/1 'Noto Sans JP',sans-serif;padding:7px 14px;border-radius:8px;cursor:pointer}
.sub-tab:hover{color:var(--text);border-color:var(--accent)}
.sub-tab.on{color:#fff;background:var(--accent);border-color:var(--accent)}
.app{padding-top:48px}
.hidden{display:none!important}
.loading{text-align:center;padding:80px 20px;color:var(--text-dim);font-size:14px}
.loading .spin{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;margin-bottom:12px}
@keyframes sp{to{transform:rotate(360deg)}}
.factory-view{padding:16px}
.fv-date{font-size:14px;color:var(--text-dim);margin-bottom:14px}
.fv-sum{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap}
.fv-si{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;min-width:90px;text-align:center;cursor:pointer;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.fv-si:hover{border-color:var(--accent)}
.fv-si.on{border-color:var(--accent);background:var(--accent-dim)}
.fv-si .n{font-size:26px;font-weight:900;line-height:1.1}
.fv-si .l{font-size:11px;color:var(--text-dim);margin-top:2px}
.fv-grp{margin-bottom:28px}
.fv-grp-hd{font-size:13px;font-weight:700;color:var(--text-dim);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.fv-grp-hd::after{content:'';flex:1;height:1px;background:var(--border)}
.fv-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.fv-card{background:var(--surface);border-radius:12px;padding:16px;border-left:4px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04);cursor:pointer;transition:.15s}
.fv-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.fv-card.urgent{border-left-color:var(--red)}
.fv-card.thisweek{border-left-color:var(--orange)}
.fv-card.twoweeks{border-left-color:var(--accent)}
.fv-card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.fv-card .pname{font-weight:700;font-size:15px}
.fv-card .badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;white-space:nowrap}
.fv-card .badge.urgent{color:var(--red);background:var(--red-dim)}
.fv-card .badge.thisweek{color:var(--orange);background:var(--orange-dim)}
.fv-card .badge.twoweeks{color:var(--accent);background:var(--accent-dim)}
.fv-card .meta{font-size:12px;color:var(--text-dim);display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:6px}
.fv-card .tag{font-size:11px;padding:2px 7px;border-radius:5px;font-weight:600}
.fv-card .tag.loc{color:var(--cyan);background:var(--cyan-dim)}
.fv-card .tag.st{color:var(--purple);background:var(--purple-dim)}
.fv-card .tag.eno{color:var(--accent);background:var(--accent-dim)}
.fv-card .tag.person{color:var(--green);background:var(--green-dim)}
.fv-card .assignee{font-size:12px;color:var(--text-dim);margin:4px 0 2px}
.fv-card .dl{font-size:13px;color:var(--text-dim);margin-top:4px}
.fv-card .sub-info{font-size:12px;color:var(--green);background:var(--green-dim);padding:4px 8px;border-radius:6px;margin-top:6px;display:inline-block}
.admin-view{padding:16px}
.av-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.av-add{background:var(--accent);color:#fff;border:none;padding:9px 18px;border-radius:8px;font:600 13px/1 'Noto Sans JP',sans-serif;cursor:pointer}
.av-add:hover{opacity:.85}
.av-search{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font:400 13px/1 'Noto Sans JP',sans-serif;width:220px}
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px;background:var(--surface)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--surface2);font-weight:600;text-align:left;padding:10px 12px;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--accent)}
th .arrow{font-size:10px;margin-left:4px;color:var(--text-faint)}
td{padding:10px 12px;border-top:1px solid var(--surface3);white-space:nowrap}
tr:hover td{background:rgba(59,111,216,.03)}
.act-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;padding:2px 6px}
.act-btn.del{color:var(--red)}
.act-btn:hover{text-decoration:underline}
.mo-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;justify-content:center;align-items:flex-start;padding:40px 16px;overflow-y:auto}
.mo-bg.show{display:flex}
.mo{background:var(--surface);border-radius:14px;padding:28px;width:100%;max-width:580px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mo h2{font-size:18px;font-weight:900;margin-bottom:20px}
.mo-row{display:flex;gap:14px;margin-bottom:14px}
.mo-row.full{display:block;margin-bottom:14px}
.mo-field{flex:1;display:flex;flex-direction:column;gap:5px}
.mo-field label{font-size:12px;font-weight:600;color:var(--text-dim)}
.mo-field input,.mo-field select,.mo-field textarea{padding:10px 12px;border:1px solid var(--border);border-radius:8px;font:400 14px/1.4 'Noto Sans JP',sans-serif;background:var(--surface2);width:100%}
.mo-field textarea{min-height:70px;resize:vertical}
.mo-field input:focus,.mo-field select:focus,.mo-field textarea:focus{outline:none;border-color:var(--accent)}
.mo-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.mo-foot button{padding:10px 22px;border-radius:8px;font:600 14px/1 'Noto Sans JP',sans-serif;cursor:pointer;border:1px solid var(--border)}
.mo-foot .cancel{background:var(--surface);color:var(--text-dim)}
.mo-foot .save{background:var(--accent);color:#fff;border-color:var(--accent)}
.mo-foot .save:hover{opacity:.85}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1d27;color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:500;z-index:400;opacity:0;transition:.3s}
.toast.show{opacity:1}
.toast.err{background:var(--red)}
.view-row{display:flex;gap:16px;margin-bottom:10px;font-size:13px}
.view-row .view-label{font-weight:600;color:var(--text-dim);min-width:80px;flex-shrink:0}
.view-row .view-val{color:var(--text)}
.files-section{margin-top:20px;border-top:2px solid var(--surface3);padding-top:16px}
.files-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.files-hd span{font-size:14px;font-weight:700}
.files-add-btn{font-size:12px;background:var(--accent);color:#fff;border:none;padding:5px 14px;border-radius:6px;cursor:pointer;font-weight:600}
.files-add-btn:hover{opacity:.85}
.file-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface2);border-radius:8px;margin-bottom:6px;font-size:12px;cursor:pointer;transition:.15s}
.file-item:hover{background:var(--surface3)}
.file-item .f-icon{width:32px;height:32px;border-radius:6px;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0}
.file-item .f-name{flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item .f-date{color:var(--text-faint);font-size:11px;flex-shrink:0}
.file-item .f-unlink{background:none;border:none;color:var(--red);cursor:pointer;font-size:11px;padding:2px 6px;flex-shrink:0}
.fp-item{display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid var(--surface3);cursor:pointer;transition:.15s}
.fp-item:hover{background:var(--accent-dim)}
.fp-item.already{opacity:.4;pointer-events:none}
.fp-item .fp-icon{width:36px;height:36px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:var(--text-dim);flex-shrink:0}
.fp-item .fp-name{flex:1;font-size:13px;font-weight:500}
.fp-item .fp-meta{font-size:11px;color:var(--text-faint)}
.files-empty{font-size:12px;color:var(--text-faint);padding:8px 0}
.st-change{margin-top:18px;padding-top:16px;border-top:2px solid var(--surface3)}
.st-change-label{font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:10px}
.st-change-btns{display:flex;gap:8px;flex-wrap:wrap}
.st-btn{padding:10px 20px;border-radius:8px;font:600 14px/1 'Noto Sans JP',sans-serif;cursor:pointer;border:2px solid var(--border);background:var(--surface);color:var(--text-dim);transition:.15s}
.st-btn:hover{border-color:var(--accent);color:var(--accent)}
.st-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);cursor:default}

/* ステータスログボタン */
.slog-btn{background:none;border:1px solid var(--border);color:var(--text-dim);font:500 12px/1 'Noto Sans JP',sans-serif;padding:6px 12px;border-radius:8px;cursor:pointer;position:relative;transition:.15s;white-space:nowrap}
.slog-btn:hover{border-color:var(--accent);color:var(--accent)}
.slog-btn .dot{position:absolute;top:-3px;right:-3px;width:10px;height:10px;border-radius:50%;background:var(--red);border:2px solid var(--bg);display:none}
.slog-btn.has-new .dot{display:block}
.slog-item{padding:12px 14px;border-bottom:1px solid var(--surface3);font-size:13px;line-height:1.6;cursor:pointer;transition:.15s}
.slog-item:hover{background:var(--accent-dim)}
.slog-item.sl-del{cursor:default;color:var(--text-dim)}
.slog-item.sl-del:hover{background:transparent}
.slog-item.sl-del .sl-st{color:var(--red)}
.slog-item:last-child{border-bottom:none}
.slog-item .sl-name{font-weight:600;color:var(--text)}
.slog-item .sl-st{font-weight:700;color:var(--accent);margin:0 2px}
.slog-empty{text-align:center;padding:40px 20px;color:var(--text-faint);font-size:13px}

/* STAFFボタンと出勤モーダル */
.staff-btn{background:none;border:1px solid var(--border);color:var(--text-dim);font:500 12px/1 'Noto Sans JP',sans-serif;padding:6px 12px;border-radius:8px;cursor:pointer;transition:.15s;white-space:nowrap}
.staff-btn:hover{border-color:var(--accent);color:var(--accent)}
.staff-btn .count{font-weight:700;color:var(--text);margin-left:4px}
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;padding:4px}
.staff-cell{padding:14px 10px;border:2px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text-dim);font:500 14px/1.3 'Noto Sans JP',sans-serif;cursor:pointer;text-align:center;transition:.1s;user-select:none;position:relative}
.staff-cell:hover{border-color:var(--accent)}
.staff-cell.f1{background:#aed581;color:#1b5e20;border-color:#8bc34a;font-weight:700}
.staff-cell.f2{background:#81d4fa;color:#01579b;border-color:#4fc3f7;font-weight:700}
.staff-cell .floor-badge{position:absolute;top:3px;right:6px;font-size:10px;font-weight:700;opacity:.85}
.staff-cell .pos{display:block;font-size:10px;font-weight:400;margin-top:3px;opacity:.75}

/* ========== スマホ対応 ========== */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;background:#1e2130;display:flex;align-items:stretch;height:48px;padding:0;gap:0}
.hdr-inner{display:flex;align-items:stretch;width:100%;padding:6px 8px 0 8px;gap:2px}
.nav-link{background:rgba(255,255,255,.04);border:none;color:rgba(255,255,255,.55);font:500 13px/1 'Noto Sans JP',sans-serif;padding:0 14px;border-radius:8px 8px 0 0;cursor:pointer;transition:background .15s,color .15s;text-decoration:none;display:inline-flex;align-items:center;margin-bottom:0;position:relative;white-space:nowrap}
.nav-link:hover{color:#fff;background:rgba(255,255,255,.1)}
.nav-link.on{background:var(--bg,#f5f6fa);color:#1a1d27;font-weight:700}
.nav-link.on::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--bg,#f5f6fa)}
.home-link{font-weight:700}
.hdr-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.75);padding:0 14px;border-radius:6px;font:500 12px/1 'Noto Sans JP',sans-serif;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;height:32px;align-self:center;margin-left:4px}
.hdr-btn:hover{color:#fff;border-color:rgba(255,255,255,.5)}
.nav-menu-btn{background:rgba(255,255,255,.08);border:none;color:#fff;font-size:20px;line-height:1;padding:0 12px;border-radius:6px;cursor:pointer;height:32px;align-self:center;display:none}
.nav-menu-btn:hover{background:rgba(255,255,255,.18)}
.home-link{display:inline-flex;align-items:center}
.nav-spacer{flex:1}
.nav-right{display:contents}
@media(max-width:768px){
  .nav-right{display:none;position:fixed;top:48px;right:10px;background:#1e2130;border-radius:10px;padding:6px;flex-direction:column;gap:2px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:999;min-width:160px}
  .nav-right.open{display:flex}
  .nav-right .nav-link{padding:10px 14px;border-radius:6px;font-size:14px;text-align:left;background:transparent;color:rgba(255,255,255,.8)}
  .nav-right .nav-link.on{background:var(--bg,#f5f6fa);color:#1a1d27}
  .nav-right .nav-link.on::after{display:none}
  .nav-menu-btn{display:inline-flex;align-items:center;justify-content:center}
  .nav-spacer{flex:1}
  .hdr{padding:0}
  .hdr-inner{padding:6px 8px 0 8px;overflow-x:auto;scrollbar-width:none}
  .hdr-inner::-webkit-scrollbar{display:none}
  .nav-link{flex-shrink:0;font-size:12px;padding:0 10px}
}

@media (max-width:768px){
  html{font-size:14px}
  /* ヘッダー：タイトル縮小、ナビ横スクロール */
  .hdr{padding:0 10px;gap:4px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .hdr::-webkit-scrollbar{display:none}
  .hdr h1{font-size:15px;margin-right:6px;flex-shrink:0}
  .nav-link{font-size:12px;padding:8px 10px;flex-shrink:0}
  .hdr-btn{font-size:11px;padding:7px 10px;flex-shrink:0}

  /* サブタブ横スクロール */
  .sub-tabs{padding:10px 10px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap}
  .sub-tabs::-webkit-scrollbar{display:none}
  .sub-tab{flex-shrink:0;padding:9px 14px;font-size:12px;min-height:38px}

  /* 工場ボード：padding削減 */
  .factory-view,.admin-view{padding:12px 10px}
  .fv-date{font-size:13px;margin-bottom:10px}
  .slog-btn{font-size:11px;padding:7px 10px}
  .staff-btn{font-size:11px;padding:7px 10px}
  .staff-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px}
  .staff-cell{padding:12px 8px;font-size:13px;min-height:48px}

  /* サマリー：2〜3列grid化 */
  .fv-sum{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:18px}
  .fv-si{padding:10px 6px;min-width:0}
  .fv-si .n{font-size:22px}
  .fv-si .l{font-size:10px}

  /* 工場カード：1列＆内部調整 */
  .fv-cards{grid-template-columns:1fr;gap:10px}
  .fv-card{padding:14px 13px}
  .fv-card .pname{font-size:15px;line-height:1.35}
  .fv-card .top{gap:8px}
  .fv-card .meta{font-size:11px;gap:5px}
  .fv-card .tag{font-size:10px;padding:2px 6px}
  .fv-card .dl{font-size:12px}

  /* 管理ビュー：検索フィールド横幅100% */
  .av-top{flex-direction:column;align-items:stretch;gap:8px}
  .av-search{width:100%}
  .av-add{padding:11px 18px;font-size:13px}

  /* === テーブル→カード化（管理ビュー） === */
  #prodAdmin .tbl-wrap{border:none;background:transparent;overflow:visible}
  #prodAdmin table,#prodAdmin thead,#prodAdmin tbody,#prodAdmin tr,#prodAdmin td{display:block;width:100%}
  #prodAdmin thead{display:none}
  #prodAdmin tr{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  #prodAdmin tr:hover td{background:transparent}
  #prodAdmin td{padding:5px 0;border:none;white-space:normal;font-size:13px;display:flex;align-items:center;gap:8px}
  #prodAdmin td::before{font-size:11px;font-weight:600;color:var(--text-dim);min-width:72px;flex-shrink:0}
  /* 物件名（1列目）は大きく表示、ラベル非表示 */
  #prodAdmin td:nth-of-type(1){font-size:15px;font-weight:700;padding:2px 0 8px;border-bottom:1px solid var(--surface3);margin-bottom:6px;display:block}
  #prodAdmin td:nth-of-type(1)::before{display:none}
  /* 各列のラベル */
  #prodAdmin td:nth-of-type(2)::before{content:'担当'}
  #prodAdmin td:nth-of-type(3)::before{content:'見積'}
  #prodAdmin td:nth-of-type(4)::before{content:'受注'}
  #prodAdmin td:nth-of-type(5)::before{content:'得意先'}
  #prodAdmin td:nth-of-type(6)::before{content:'窓口'}
  #prodAdmin td:nth-of-type(7)::before{content:'作業場所'}
  #prodAdmin td:nth-of-type(8)::before{content:'納期'}
  #prodAdmin td:nth-of-type(9)::before{content:'ステータス'}
  #prodAdmin td:nth-of-type(10)::before{content:'伝票'}
  #prodAdmin td:nth-of-type(11)::before{content:'操作'}
  /* 空値セルは非表示（::before のみになる場合） */
  #prodAdmin td:empty{display:none}
  /* 操作セル内のボタンはタップしやすく */
  #prodAdmin td .act-btn{padding:8px 12px;font-size:13px;background:var(--surface2);border-radius:6px;margin-right:4px}
  #prodAdmin td .act-btn.del{color:var(--red)}
  /* ステータスselectを大きく */
  #prodAdmin td select{flex:1;padding:8px 10px !important;font-size:13px !important;min-height:38px}

  /* === テーブル→カード化（出荷済ビュー） === */
  #prodArchive .tbl-wrap{border:none;background:transparent;overflow:visible}
  #prodArchive table,#prodArchive thead,#prodArchive tbody,#prodArchive tr,#prodArchive td{display:block;width:100%}
  #prodArchive thead{display:none}
  #prodArchive tr{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  #prodArchive tr:hover td{background:transparent}
  #prodArchive td{padding:5px 0;border:none;white-space:normal;font-size:13px;display:flex;align-items:center;gap:8px}
  #prodArchive td::before{font-size:11px;font-weight:600;color:var(--text-dim);min-width:72px;flex-shrink:0}
  #prodArchive td:nth-of-type(1){font-size:15px;font-weight:700;padding:2px 0 8px;border-bottom:1px solid var(--surface3);margin-bottom:6px;display:block}

<script>
function toggleNavMenu(){
  const el=document.querySelector('.nav-right');
  if(el)el.classList.toggle('open');
}
document.addEventListener('click',function(e){
  const btn=e.target.closest('.nav-menu-btn');

const API='https://script.google.com/macros/s/AKfycbwD5F1rJcdg7pl1lnVXzyY0vttcO88z-YKUZWG3eLIT0DNMhFZw8jXbJoKW6wCIKEC7/exec';
let prodData=[];
let curProdView='factory';
let prodSort={col:null,asc:true};
let prodFilter=null;
let adminStatusFilter=null;
let archiveSort={col:'deadline',asc:false};
// ステータスログ：slog は [{id, project, from, to, ts}]、新しい順、最大20件
// slogUnread は未読バッジ件数（実際は1以上なら赤丸表示）
let slog=[];
let slogUnread=0;
const SLOG_KEY='prod_status_snapshot';
const SLOG_LIST_KEY='prod_status_log';
const SLOG_UNREAD_KEY='prod_status_unread';
// STAFF（出勤者）
let staffList=[];  // [{employee_no, name, dept, position}]
let attendance={}; // {employee_no: true/false}
const $=id=>document.getElementById(id);
const today=new Date();today.setHours(0,0,0,0);
const pad=n=>String(n).padStart(2,'0');
const dateStr=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const dow='日月火水木金土';
const dateJP=d=>`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${dow[d.getDay()]}）`;
const parseD=s=>{if(!s)return null;const d=new Date(s+'T00:00:00');return isNaN(d)?null:d};
const diffDays=(a,b)=>Math.round((a-b)/864e5);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function toast(msg,err){const t=$('toast');t.textContent=msg;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',3000)}
function vr(label,val){return`<div class="view-row"><div class="view-label">${label}</div><div class="view-val">${esc(val||'')}</div></div>`}

// ===== Fire-and-forget (楽観的更新) =====
function fireAndForget(body){fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)})}

// ===== データ読み込み =====
async function loadProd(){try{const r=await fetch(API+'?action=read&dept=production');const j=await r.json();if(j.success){prodData=j.data;detectStatusChanges()}}catch(e){toast('生産部データ取得エラー',true)}}
async function loadAttendance(){
  try{
    const d=new Date();const todayStr=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const r=await fetch(API+'?dept=attendance&action=read&date='+todayStr);
    const j=await r.json();
    if(j.success){staffList=j.staff||[];attendance=j.attendance||{}}
  }catch(e){/* 静かに失敗、STAFFボタンは出るが中身が空になる */}
}
async function loadAll(){$('loader').classList.remove('hidden');await Promise.all([loadProd(),loadAttendance()]);$('loader').classList.add('hidden');render()}
function refreshData(){loadAll()}

// ===== ステータス変更検知 =====
function detectStatusChanges(){
  // 現在の状態スナップショット: { id: {status, project} }
  const curr={};
  prodData.forEach(d=>{if(d.id&&String(d.id).indexOf('tmp_')!==0)curr[String(d.id)]={status:d.status||'',project:d.project||''}});
  // 保存済みの slog（全ログ）と unreadCount を復元
  try{slog=JSON.parse(localStorage.getItem(SLOG_LIST_KEY)||'[]')}catch(e){slog=[]}
  try{slogUnread=parseInt(localStorage.getItem(SLOG_UNREAD_KEY)||'0',10)||0}catch(e){slogUnread=0}
  // 前回のスナップショット
  let prev=null;
  try{prev=JSON.parse(localStorage.getItem(SLOG_KEY)||'null')}catch(e){prev=null}
  // 初回はスナップショットを保存するだけ
  if(!prev){localStorage.setItem(SLOG_KEY,JSON.stringify(curr));return}
  // 差分計算：新規追加、ステータス変更、削除
  const newEntries=[];
  Object.keys(curr).forEach(id=>{
    if(!prev[id]){
      // 新規登録
      newEntries.push({id,project:curr[id].project,from:'',to:'新規登録',ts:Date.now(),isNew:true});
    }else if(prev[id].status!==curr[id].status){
      // ステータス変更
      newEntries.push({id,project:curr[id].project,from:prev[id].status,to:curr[id].status,ts:Date.now()});
    }
  });
  // 削除検出：prev にあって curr にないID
  Object.keys(prev).forEach(id=>{
    if(!curr[id]){
      newEntries.push({id,project:prev[id].project,from:prev[id].status,to:'削除',ts:Date.now(),isDel:true});
    }
  });
  // slog に追加（新しい順、最大20件）
  if(newEntries.length){
    slog=[...newEntries,...slog].slice(0,20);
    slogUnread=Math.min(slogUnread+newEntries.length,20);
    localStorage.setItem(SLOG_LIST_KEY,JSON.stringify(slog));
    localStorage.setItem(SLOG_UNREAD_KEY,String(slogUnread));
  }
  // スナップショット更新
  localStorage.setItem(SLOG_KEY,JSON.stringify(curr));
}

// ===== ステータスログモーダル =====
function openSlog(){
  const el=$('slogList');
  if(!slog.length){
    el.innerHTML='<div class="slog-empty">変更履歴はまだありません</div>';
  }else{
    let h='';
    slog.forEach(e=>{
      const verb=(e.isNew||e.isDel)?'されました':'になりました';
      const cls=e.isDel?' sl-del':'';
      h+=`<div class="slog-item${cls}" data-id="${esc(e.id)}" data-del="${e.isDel?'1':'0'}"><span class="sl-name">${esc(e.project)}</span> が <span class="sl-st">${esc(e.to)}</span> ${verb}</div>`;
    });
    el.innerHTML=h;
    el.querySelectorAll('.slog-item').forEach(it=>{
      if(it.dataset.del==='1')return; // 削除済みはクリック無効
      it.onclick=()=>{closeSlog();viewProd(it.dataset.id)};
    });
  }
  // 開いた時点で既読化（赤丸だけ消す。ログ本体は残す）
  slogUnread=0;
  localStorage.setItem(SLOG_UNREAD_KEY,'0');
  $('slogBg').classList.add('show');
  if(curProdView==='factory')renderFactory();
}
function closeSlog(){
  $('slogBg').classList.remove('show');
}
function clearSlog(){
  if(!slog.length)return;
  if(!confirm('ログをすべて削除しますか？'))return;
  slog=[];
  slogUnread=0;
  localStorage.setItem(SLOG_LIST_KEY,'[]');
  localStorage.setItem(SLOG_UNREAD_KEY,'0');
  // モーダル内容を空表示に更新
  $('slogList').innerHTML='<div class="slog-empty">変更履歴はまだありません</div>';
  if(curProdView==='factory')renderFactory();
}

// ===== STAFF（出勤者）=====
// attendance[empNo] は "1F" | "2F" | "" | undefined
function staffCount(){
  let present=0,total=staffList.length;
  staffList.forEach(s=>{const f=attendance[s.employee_no];if(f==='1F'||f==='2F')present++});
  return{present,total};
}
function nextFloor(cur){
  if(cur==='1F')return'2F';
  if(cur==='2F')return'';
  return'1F';
}
function floorClass(f){
  if(f==='1F')return' f1';
  if(f==='2F')return' f2';
  return'';
}
function floorBadge(f){
  if(f==='1F'||f==='2F')return`<span class="floor-badge">${f}</span>`;
  return'';
}
function openStaff(){
  renderStaffGrid();
  $('staffBg').classList.add('show');
}
function closeStaff(){$('staffBg').classList.remove('show')}
function renderStaffGrid(){
  const c=staffCount();
  $('staffCountLabel').textContent=`${c.present}/${c.total}`;
  const el=$('staffGrid');
  if(!staffList.length){el.innerHTML='<div class="slog-empty" style="grid-column:1/-1">STAFFが登録されていません</div>';return}
  let h='';
  staffList.forEach(s=>{
    const f=attendance[s.employee_no]||'';
    h+=`<div class="staff-cell${floorClass(f)}" data-emp="${esc(s.employee_no)}">${floorBadge(f)}${esc(s.name)}</div>`;
  });
  el.innerHTML=h;
  el.querySelectorAll('.staff-cell').forEach(cell=>{
    cell.onclick=()=>toggleStaff(cell.dataset.emp);
  });
}
function toggleStaff(empNo){
  // ロータリー循環 "" → "1F" → "2F" → ""
  const cur=attendance[empNo]||'';
  const nxt=nextFloor(cur);
  attendance[empNo]=nxt;
  // 該当 cell のclass・バッジを即座に更新
  const cell=$('staffGrid').querySelector(`.staff-cell[data-emp="${empNo}"]`);
  if(cell){
    cell.classList.remove('f1','f2');
    if(nxt==='1F')cell.classList.add('f1');
    else if(nxt==='2F')cell.classList.add('f2');
    // バッジ更新
    const oldBadge=cell.querySelector('.floor-badge');
    if(oldBadge)oldBadge.remove();
    if(nxt){
      const b=document.createElement('span');
      b.className='floor-badge';
      b.textContent=nxt;
      cell.insertBefore(b,cell.firstChild);
    }
  }
  // カウンタ更新
  const c=staffCount();
  $('staffCountLabel').textContent=`${c.present}/${c.total}`;
  if(curProdView==='factory')updateStaffBtnCount();
  // サーバーに投げる
  const d=new Date();const todayStr=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  fireAndForget({dept:'attendance',action:'cycle',employee_no:empNo,date:todayStr});
}
function updateStaffBtnCount(){
  const btn=document.querySelector('.staff-btn .count');
  if(btn){const c=staffCount();btn.textContent=`${c.present}/${c.total}`}
}

// ===== 描画 =====
function render(){
  if(curProdView==='factory'){$('prodFactory').classList.remove('hidden');$('prodAdmin').classList.add('hidden');$('prodArchive').classList.add('hidden');renderFactory()}
  else if(curProdView==='admin'){$('prodFactory').classList.add('hidden');$('prodAdmin').classList.remove('hidden');$('prodArchive').classList.add('hidden');renderProdAdmin()}
  else if(curProdView==='archive'){$('prodFactory').classList.add('hidden');$('prodAdmin').classList.add('hidden');$('prodArchive').classList.remove('hidden');renderArchive()}
}

// ===== 工場ボード =====
function renderFactory(){
  const el=$('prodFactory');
  let items=prodData.filter(d=>!['見積中','見送り','出荷済'].includes(d.status));
  const statusCnt=s=>items.filter(d=>d.status===s).length;
  const secCnt=s=>items.filter(d=>d.section===s).length;
  items.forEach(d=>{const dl=parseD(d.deadline);if(!dl){d._urgN=999;return}const diff=diffDays(dl,today);d._urgN=diff<0?-1:diff<=3?0:diff<=7?1:diff<=14?2:3});
  let filtered=items;
  if(prodFilter){if(['製作中','完成','受注'].includes(prodFilter))filtered=items.filter(d=>d.status===prodFilter);else if(['2F工場','1F工場','出力関係','外注','未定','その他'].includes(prodFilter))filtered=items.filter(d=>d.section===prodFilter);else if(prodFilter==='urgent')filtered=items.filter(d=>d._urgN<=0);else if(prodFilter==='thisweek')filtered=items.filter(d=>d._urgN===1)}
  const si=(f,n,l,color)=>{const on=prodFilter===f?' on':'';return`<div class="fv-si${on}" data-f="${f}" style="${color?'color:'+color:''}"><div class="n">${n}</div><div class="l">${l}</div></div>`};
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px;flex-wrap:wrap"><div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap"><div class="fv-date">${dateJP(today)}</div><button class="slog-btn${slogUnread?' has-new':''}" onclick="openSlog()">ステータスログ<span class="dot"></span></button><button class="staff-btn" onclick="openStaff()">STAFF <span class="count">${staffCount().present}/${staffCount().total}</span></button></div><input class="av-search" placeholder="検索..." oninput="factoryFilter(this.value)"></div><div class="fv-sum">`;
  h+=si('all',items.length,'すべて','');
  h+=si('urgent',items.filter(d=>d._urgN<=0).length,'納期迫る','var(--red)');
  h+=si('thisweek',items.filter(d=>d._urgN===1).length,'今週中','var(--orange)');
  h+=si('製作中',statusCnt('製作中'),'製作中','');
  h+=si('完成',statusCnt('完成'),'完成','');
  h+=si('2F工場',secCnt('2F工場'),'2F工場','');
  h+=si('1F工場',secCnt('1F工場'),'1F工場','');
  h+=si('出力関係',secCnt('出力関係'),'出力関係','');
  h+=si('外注',secCnt('外注'),'外注','');
  h+=si('未定',secCnt('未定'),'未定','');
  h+=si('その他',secCnt('その他'),'その他','');
  h+='</div>';
  const groups=[{label:'納期迫る・超過',items:filtered.filter(d=>d._urgN<=0)},{label:'今週中',items:filtered.filter(d=>d._urgN===1)},{label:'2週間以内',items:filtered.filter(d=>d._urgN===2)},{label:'それ以降',items:filtered.filter(d=>d._urgN===3)},{label:'納期未定',items:filtered.filter(d=>d._urgN===999)}];
  groups.forEach(g=>{if(!g.items.length)return;h+=`<div class="fv-grp"><div class="fv-grp-hd">${g.label}　${g.items.length}件</div><div class="fv-cards">`;g.items.forEach(d=>{const dl=parseD(d.deadline);const diff=dl?diffDays(dl,today):null;const cls=d._urgN<=0?'urgent':d._urgN===1?'thisweek':'twoweeks';let badge='';if(d._urgN<=0&&dl)badge=`<span class="badge urgent">${diff<0?Math.abs(diff)+'日超過':'納期迫る'}</span>`;else if(d._urgN===1)badge='<span class="badge thisweek">今週中</span>';else if(d._urgN===2)badge='<span class="badge twoweeks">2週間以内</span>';const dlStr=dl?`${dl.getMonth()+1}/${dl.getDate()}（${dow[dl.getDay()]}）${diff!==null?(diff<0?Math.abs(diff)+'日超過':'あと'+diff+'日'):''}`:'未定';h+=`<div class="fv-card ${cls}" data-id="${d.id}"><div class="top"><span class="pname">${esc(d.project)}</span>${badge}</div>`;if(d.our_person)h+=`<div class="assignee">担当: <span class="tag person">${esc(d.our_person)}</span></div>`;h+=`<div class="meta">${esc(d.client||'')}`;if(d.order_no)h+=` <span class="tag eno">${esc(d.order_no)}</span>`;if(d.section)h+=` <span class="tag loc">${esc(d.section)}</span>`;h+=` <span class="tag st">${esc(d.status)}</span></div><div class="dl">納期: ${dlStr}</div>`;if(d.subcontractor)h+=`<div class="sub-info">外注先: ${esc(d.subcontractor)}</div>`;h+='</div>'});h+='</div></div>'});
  el.innerHTML=h;
  el.querySelectorAll('.fv-si').forEach(s=>{s.onclick=()=>{const f=s.dataset.f;prodFilter=prodFilter===f?null:f;render()}});
  el.querySelectorAll('.fv-card').forEach(c=>{c.onclick=()=>viewProd(c.dataset.id)});
}
function factoryFilter(q){q=q.toLowerCase();$('prodFactory').querySelectorAll('.fv-card').forEach(c=>{c.style.display=c.textContent.toLowerCase().includes(q)?'':'none'})}

// ===== 管理テーブル =====
function renderProdAdmin(){
  const el=$('prodAdmin');let items=prodData.filter(d=>d.status!=='出荷済');
  const STATUS_ORDER={'見積中':0,'受注':1,'製作中':2,'完成':3,'出荷済':4};
  // ステータス別件数（フィルター前）
  const allCount=items.length;
  const stCounts={};items.forEach(d=>{const s=d.status||'未設定';stCounts[s]=(stCounts[s]||0)+1});
  // フィルター適用
  if(adminStatusFilter)items=items.filter(d=>d.status===adminStatusFilter);
  if(prodSort.col)items.sort((a,b)=>{
    let va=a[prodSort.col],vb=b[prodSort.col];
    const ea=va==null||va==='',eb=vb==null||vb==='';
    if(ea&&eb)return 0;if(ea)return 1;if(eb)return-1;
    if(prodSort.col==='deadline'){const da=parseD(va),db=parseD(vb);if(da&&db)return prodSort.asc?da-db:db-da;if(!da)return 1;if(!db)return-1}
    if(prodSort.col==='status'){const sa=STATUS_ORDER[va]??99,sb=STATUS_ORDER[vb]??99;return prodSort.asc?sa-sb:sb-sa}
    va=String(va).toLowerCase();vb=String(vb).toLowerCase();return va<vb?(prodSort.asc?-1:1):va>vb?(prodSort.asc?1:-1):0
  });
  const cols=[{key:'project',label:'物件名'},{key:'our_person',label:'担当者'},{key:'estimate_no',label:'見積番号'},{key:'order_no',label:'受注番号'},{key:'client',label:'得意先'},{key:'person',label:'窓口'},{key:'section',label:'作業場所'},{key:'deadline',label:'納期'},{key:'status',label:'ステータス'}];
  // フィルターボタン
  const stBtn=(label,val)=>{const on=adminStatusFilter===val?' on':'';const cnt=val?stCounts[val]||0:allCount;return`<button class="sub-tab${on}" data-st="${val||''}">${label} (${cnt})</button>`};
  let h=`<div class="av-top"><button class="av-add" onclick="openProdMo()">+ 新規登録</button><input class="av-search" placeholder="検索..." oninput="prodSearch(this.value)"></div>`;
  h+=`<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">${stBtn('すべて',null)}${stBtn('見積中','見積中')}${stBtn('受注','受注')}${stBtn('製作中','製作中')}${stBtn('完成','完成')}</div>`;
  h+='<div class="tbl-wrap"><table><thead><tr>';cols.forEach(c=>{const a=prodSort.col===c.key?(prodSort.asc?'▲':'▼'):'';h+=`<th data-col="${c.key}">${c.label}<span class="arrow">${a}</span></th>`});h+='<th>伝票</th><th>操作</th></tr></thead><tbody>';
  items.forEach(d=>{h+='<tr>';cols.forEach(c=>{let v=d[c.key]||'';if(c.key==='status'){const opts=['見積中','受注','製作中','完成','出荷済','見送り'];h+=`<td><select onchange="changeStatus('${d.id}',this.value)" style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;font:400 13px/1 'Noto Sans JP',sans-serif;background:var(--surface2);cursor:pointer">`;opts.forEach(o=>{h+=`<option${v===o?' selected':''}>${o}</option>`});h+='</select></td>'}else{if(c.key==='deadline'&&v){const dd=parseD(v);v=dd?`${dd.getMonth()+1}/${dd.getDate()}（${dow[dd.getDay()]}）`:v}h+=`<td>${esc(v)}</td>`}});const chk=String(d.invoiced||'').toUpperCase()==='TRUE';h+=`<td style="text-align:center"><input type="checkbox" ${chk?'checked':''} onchange="toggleInvoiced('${d.id}',this.checked)" style="width:18px;height:18px;cursor:pointer"></td><td><button class="act-btn" onclick="editProd('${d.id}')">編集</button> <button class="act-btn del" onclick="delProd('${d.id}')">削除</button></td></tr>`});
  h+='</tbody></table></div>';el.innerHTML=h;
  el.querySelectorAll('th[data-col]').forEach(th=>{th.onclick=()=>{const c=th.dataset.col;if(prodSort.col===c)prodSort.asc=!prodSort.asc;else{prodSort.col=c;prodSort.asc=true}render()}});
  el.querySelectorAll('[data-st]').forEach(btn=>{btn.onclick=()=>{const v=btn.dataset.st;adminStatusFilter=v||null;render()}});
}

// ===== 出荷済アーカイブ =====
function renderArchive(){
  const el=$('prodArchive');const ARCHIVE_ST=['出荷済'];
  let items=prodData.filter(d=>ARCHIVE_ST.includes(d.status));
  // ソート
  if(archiveSort.col)items.sort((a,b)=>{
    let va=a[archiveSort.col],vb=b[archiveSort.col];
    const ea=va==null||va==='',eb=vb==null||vb==='';
    if(ea&&eb)return 0;if(ea)return 1;if(eb)return-1;
    if(archiveSort.col==='deadline'){const da=parseD(va),db=parseD(vb);if(da&&db)return archiveSort.asc?da-db:db-da;if(!da)return 1;if(!db)return-1}
    va=String(va).toLowerCase();vb=String(vb).toLowerCase();return va<vb?(archiveSort.asc?-1:1):va>vb?(archiveSort.asc?1:-1):0
  });
  const cols=[{key:'project',label:'物件名'},{key:'our_person',label:'担当者'},{key:'estimate_no',label:'見積番号'},{key:'order_no',label:'受注番号'},{key:'client',label:'得意先'},{key:'person',label:'窓口'},{key:'deadline',label:'納期'}];
  let h='<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0 14px"><span style="font-size:13px;color:var(--text-dim)">出荷済の案件（'+items.length+'件）</span><input class="av-search" placeholder="検索..." oninput="archiveFilter(this.value)"></div>';
  h+='<div class="tbl-wrap"><table><thead><tr>';
  cols.forEach(c=>{const a=archiveSort.col===c.key?(archiveSort.asc?'▲':'▼'):'';h+=`<th data-acol="${c.key}" style="cursor:pointer">${c.label}<span class="arrow">${a}</span></th>`});
  h+='<th>ステータス</th><th>伝票</th><th>操作</th></tr></thead><tbody>';
  if(!items.length)h+='<tr><td colspan="10" style="text-align:center;padding:30px;color:var(--text-faint)">該当する案件はありません</td></tr>';
  items.forEach(d=>{const dl=parseD(d.deadline);const dlStr=dl?((dl.getMonth()+1)+'/'+dl.getDate()+'（'+dow[dl.getDay()]+'）'):'';const chk=d.invoiced==='TRUE'||d.invoiced===true;h+='<tr><td>'+esc(d.project)+'</td><td>'+esc(d.our_person||'')+'</td><td>'+esc(d.estimate_no||'')+'</td><td>'+esc(d.order_no||'')+'</td><td>'+esc(d.client||'')+'</td><td>'+esc(d.person||'')+'</td><td>'+dlStr+'</td><td>'+esc(d.status)+'</td><td style="text-align:center"><input type="checkbox" '+(chk?'checked':'')+' onchange="toggleInvoiced(\''+d.id+'\',this.checked)" style="width:18px;height:18px;cursor:pointer"></td><td><button class="act-btn" onclick="editProd(\''+d.id+'\')">編集</button></td></tr>'});
  h+='</tbody></table></div>';el.innerHTML=h;
  el.querySelectorAll('th[data-acol]').forEach(th=>{th.onclick=()=>{const c=th.dataset.acol;if(archiveSort.col===c)archiveSort.asc=!archiveSort.asc;else{archiveSort.col=c;archiveSort.asc=true}render()}});
}
function toggleInvoiced(id,checked){
  const d=prodData.find(x=>String(x.id)===String(id));if(!d)return;
  d.invoiced=checked?'TRUE':'FALSE';
  fireAndForget({dept:'production',action:'save',id:id,invoiced:d.invoiced});
  toast(checked?'伝票済みにしました':'伝票未済に戻しました');
}
function changeStatus(id,newSt){
  const d=prodData.find(x=>String(x.id)===String(id));if(!d)return;
  d.status=newSt;
  fireAndForget({dept:'production',action:'save',id:id,status:newSt});
  toast(newSt+'に変更しました');
  render();
}
function archiveFilter(q){q=q.toLowerCase();$('prodArchive').querySelectorAll('tbody tr').forEach(r=>{r.style.display=r.textContent.toLowerCase().includes(q)?'':'none'})}
function prodSearch(q){$('prodAdmin').querySelectorAll('tbody tr').forEach(r=>{r.style.display=r.textContent.toLowerCase().includes(q.toLowerCase())?'':'none'})}

// ===== 案件詳細 =====
let currentViewId=null;
let driveFiles=null;
function viewProd(id){const d=prodData.find(x=>String(x.id)===String(id));if(!d)return;currentViewId=id;const dl=parseD(d.deadline);const diff=dl?diffDays(dl,today):null;const dlStr=dl?`${dl.getMonth()+1}/${dl.getDate()}（${dow[dl.getDay()]}）${diff!==null?(diff<0?' ⚠ '+Math.abs(diff)+'日超過':' あと'+diff+'日'):''}`:'未定';const st=parseD(d.start_date);const stStr=st?`${st.getMonth()+1}/${st.getDate()}（${dow[st.getDay()]}）`:'';let h='';h+=vr('物件名',d.project);if(d.our_person)h+=vr('担当者',d.our_person);if(d.estimate_no)h+=vr('見積番号',d.estimate_no);if(d.order_no)h+=vr('受注番号',d.order_no);h+=vr('得意先',d.client);h+=vr('窓口',d.person);h+=vr('作業場所',d.section);if(d.subcontractor)h+=vr('外注先',d.subcontractor);if(stStr)h+=vr('作業開始',stStr);h+=vr('納期',dlStr);if(d.notes)h+=vr('備考',d.notes);
  h+='<div class="st-change"><div class="st-change-label">ステータス変更</div><div class="st-change-btns">';
  ['受注','製作中','完成','出荷済'].forEach(s=>{const on=d.status===s?' on':'';h+=`<button class="st-btn${on}" data-st="${s}">${s}</button>`});
  h+='</div></div>';
  $('prodViewContent').innerHTML=h;
  $('prodViewContent').querySelectorAll('.st-btn').forEach(btn=>{btn.onclick=()=>{const newSt=btn.dataset.st;if(d.status===newSt)return;d.status=newSt;fireAndForget({dept:'production',action:'save',id:d.id,status:newSt});toast(newSt+'に変更しました');viewProd(id);render()}});
  renderLinkedFiles(d);$('prodViewBg').classList.add('show')}

// ===== 製作図ファイル =====
function getLinkedFileIds(d){if(!d.files)return[];return String(d.files).split(',').map(s=>s.trim()).filter(Boolean)}
function fileIcon(type){if(type&&type.includes('pdf'))return'PDF';if(type&&type.includes('image'))return'IMG';return'FILE'}

function renderLinkedFiles(d){
  const el=$('linkedFiles');const ids=getLinkedFileIds(d);
  if(!ids.length){el.innerHTML='<div class="files-empty">ファイルが紐づけられていません</div>';return}
  if(!driveFiles){el.innerHTML='<div class="files-empty">読み込み中...</div>';loadDriveFiles().then(()=>renderLinkedFiles(d));return}
  let h='';
  ids.forEach(fid=>{
    const f=driveFiles.find(x=>x.id===fid);
    if(f){h+=`<div class="file-item" onclick="window.open('${f.url}','_blank')"><div class="f-icon">${fileIcon(f.type)}</div><span class="f-name">${esc(f.name)}</span><span class="f-date">${f.updated||''}</span><button class="f-unlink" onclick="event.stopPropagation();unlinkFile('${fid}')">解除</button></div>`}
    else{h+=`<div class="file-item"><div class="f-icon">?</div><span class="f-name" style="color:var(--text-faint)">ファイルが見つかりません (${fid})</span><button class="f-unlink" onclick="event.stopPropagation();unlinkFile('${fid}')">解除</button></div>`}
  });
  el.innerHTML=h;
}

async function loadDriveFiles(){
  try{const res=await fetch(API+'?dept=drive&action=list');const json=await res.json();driveFiles=json.files||[]}catch(e){console.error('Drive load error:',e);driveFiles=[]}
}

function openFilePicker(){
  $('filePickerBg').classList.add('show');
  $('filePickerList').innerHTML='';
  $('filePickerLoading').classList.remove('hidden');
  loadDriveFiles().then(()=>{
    $('filePickerLoading').classList.add('hidden');
    const d=prodData.find(x=>String(x.id)===String(currentViewId));
    const linked=d?getLinkedFileIds(d):[];
    if(!driveFiles||!driveFiles.length){$('filePickerList').innerHTML='<div style="padding:20px;text-align:center;color:var(--text-faint)">Driveフォルダにファイルがありません</div>';return}
    let h='';
    driveFiles.forEach(f=>{
      const already=linked.includes(f.id);
      const size=f.size>1048576?(Math.round(f.size/1048576)+'MB'):(Math.round(f.size/1024)+'KB');
      h+=`<div class="fp-item${already?' already':''}" onclick="linkFile('${f.id}')"><div class="fp-icon">${fileIcon(f.type)}</div><span class="fp-name">${esc(f.name)}${already?' ✓ 追加済':''}</span><span class="fp-meta">${size}　${f.updated||''}</span></div>`;
    });
    $('filePickerList').innerHTML=h;
  });
}
function closeFilePicker(){$('filePickerBg').classList.remove('show')}

function linkFile(fileId){
  const d=prodData.find(x=>String(x.id)===String(currentViewId));if(!d)return;
  const ids=getLinkedFileIds(d);
  if(ids.includes(fileId))return;
  ids.push(fileId);
  d.files=ids.join(',');
  fireAndForget({dept:'production',action:'save',id:d.id,files:d.files});
  toast('ファイルを追加しました');
  renderLinkedFiles(d);
  closeFilePicker();
}

function unlinkFile(fileId){
  const d=prodData.find(x=>String(x.id)===String(currentViewId));if(!d)return;
  const ids=getLinkedFileIds(d).filter(x=>x!==fileId);
  d.files=ids.join(',');
  fireAndForget({dept:'production',action:'save',id:d.id,files:d.files});
  toast('ファイルを解除しました');
  renderLinkedFiles(d);
}

// ===== モーダル操作 =====
function openProdMo(d){$('prodMoTitle').textContent=d?'案件編集':'案件登録';$('pf_id').value=d?d.id:'';$('pf_project').value=d?d.project:'';$('pf_our_person').value=d?d.our_person||'':'';$('pf_estimate_no').value=d?d.estimate_no||'':'';$('pf_order_no').value=d?d.order_no||'':'';$('pf_client').value=d?d.client||'':'';$('pf_person').value=d?d.person||'':'';$('pf_section').value=d?d.section||'未定':'未定';$('pf_status').value=d?d.status||'受注':'受注';$('pf_subcontractor').value=d?d.subcontractor||'':'';$('pf_start_date').value=d?d.start_date||'':'';$('pf_deadline').value=d?d.deadline||'':'';$('pf_notes').value=d?d.notes||'':'';$('prodMoBg').classList.add('show')}
function closeProdMo(){$('prodMoBg').classList.remove('show')}
function editProd(id){const d=prodData.find(x=>String(x.id)===String(id));if(d)openProdMo(d)}

// ===== 保存（楽観的更新） =====
function saveProd(){
  const name=$('pf_project').value.trim();
  if(!name){toast('物件名を入力してください',true);return}
  const editId=$('pf_id').value;
  const body={dept:'production',action:'save',id:editId||undefined,project:name,our_person:$('pf_our_person').value.trim(),estimate_no:$('pf_estimate_no').value.trim(),order_no:$('pf_order_no').value.trim(),client:$('pf_client').value.trim(),person:$('pf_person').value.trim(),section:$('pf_section').value,status:$('pf_status').value,subcontractor:$('pf_subcontractor').value.trim(),start_date:$('pf_start_date').value,deadline:$('pf_deadline').value,notes:$('pf_notes').value.trim()};
  const isNew=!editId;
  if(editId){
    const idx=prodData.findIndex(x=>String(x.id)===String(editId));
    if(idx!==-1)prodData[idx]={...prodData[idx],...body};
  }else{
    body.id='tmp_'+Date.now();
    prodData.push(body);
  }
  fireAndForget(body);
  toast('保存しました');
  closeProdMo();
  render();
  // 新規作成時は GAS が実IDを採番するまで待って再同期（tmp_id 残留防止）
  if(isNew)setTimeout(loadAll,3000);
}

// ===== 削除（楽観的更新） =====
function delProd(id){
  if(!confirm('この案件を削除しますか？'))return;
  prodData=prodData.filter(x=>String(x.id)!==String(id));
  fireAndForget({dept:'production',action:'delete',id:id});
  toast('削除しました');
  render();
}

// ===== イベント =====
$('prodTabs').addEventListener('click',e=>{const t=e.target.closest('.sub-tab');if(!t)return;$('prodTabs').querySelectorAll('.sub-tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');curProdView=t.dataset.view;render()});
/* 背景クリックで閉じない — 明示的にボタンで閉じる */
loadAll();
setInterval(loadAll,60*1000);
</script>
