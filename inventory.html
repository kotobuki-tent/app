<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>在庫管理</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236366f1'/><text x='16' y='23' text-anchor='middle' font-family='sans-serif' font-weight='900' font-size='18' fill='white'>庫</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%236366f1'/><text x='90' y='125' text-anchor='middle' font-family='sans-serif' font-weight='900' font-size='100' fill='white'>庫</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:15px}
body{font-family:'Noto Sans JP',sans-serif;background:#f5f6fa;color:#1a1a2e;min-height:100vh}

/* Header - dark navy bar */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;background:#1e2130;display:flex;align-items:center;height:56px;padding:0 16px;gap:8px}
.hdr h1{font-size:17px;font-weight:900;color:#fff;letter-spacing:.04em;margin-right:auto}
.nav-link{background:none;border:none;color:rgba(255,255,255,.6);font:600 13px/1 'Noto Sans JP',sans-serif;padding:8px 14px;border-radius:8px;cursor:pointer;transition:.15s;text-decoration:none;display:inline-flex;align-items:center}
.nav-link:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav-link.on{color:#fff;background:#3b6de7}
.sub-tabs{display:flex;gap:6px;padding:66px 20px 0;background:#f5f6fa}
.sub-tabs .tab{color:#6b7084;background:#fff;border:1px solid #d8dbe3}
.sub-tabs .tab:hover{color:#1a1a2e;border-color:#3b6de7}
.sub-tabs .tab.on{color:#fff;background:#3b6de7;border-color:#3b6de7}
.tab{background:none;border:1px solid transparent;color:rgba(255,255,255,.6);font:600 13px/1 'Noto Sans JP',sans-serif;padding:7px 16px;border-radius:6px;cursor:pointer;transition:.15s}
.tab:hover{color:#fff;background:rgba(255,255,255,.08)}
.tab.on{color:#fff;background:#3b6de7;border-color:#3b6de7}
.ref-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:6px 14px;border-radius:6px;font:500 12px/1 'Noto Sans JP',sans-serif;cursor:pointer;transition:.15s}
.ref-btn:hover{color:#fff;border-color:rgba(255,255,255,.5)}

/* Main */
.main{padding:16px 24px 40px}
.hidden{display:none!important}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border:none;border-radius:6px;font:600 13px/1 'Noto Sans JP',sans-serif;cursor:pointer;transition:.15s}
.btn-primary{background:#3b6de7;color:#fff}
.btn-primary:hover{background:#2f5ec8}
.btn-danger{background:#fff;color:#e53e3e;border:1px solid #fed7d7}
.btn-danger:hover{background:#fff5f5}
.btn-ghost{background:#fff;color:#555;border:1px solid #ddd}
.btn-ghost:hover{background:#f9f9f9;border-color:#bbb}
.btn-sm{padding:5px 12px;font-size:11px}

/* Table */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;background:#fff;border:1px solid #e2e5f0;border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8f9fc;color:#666;font-weight:600;text-align:left;padding:10px 14px;border-bottom:2px solid #e2e5f0;white-space:nowrap;position:sticky;top:0;z-index:1}
td{padding:10px 14px;border-bottom:1px solid #f0f1f5;white-space:nowrap}
tr:hover td{background:#f8f9fc}
.tbl-actions{display:flex;gap:6px}
.tbl-actions a{font-size:12px;font-weight:600;cursor:pointer;text-decoration:none}
.tbl-actions .edit-link{color:#3b6de7}
.tbl-actions .edit-link:hover{text-decoration:underline}
.tbl-actions .del-link{color:#e53e3e}
.tbl-actions .del-link:hover{text-decoration:underline}

/* Status badge */
.st{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600}
.st-予約{background:#ede9fe;color:#7c3aed}
.st-貸出中{background:#dbeafe;color:#2563eb}
.st-返却済{background:#d1fae5;color:#059669}
.st-検品中{background:#fef9c3;color:#a16207}
.st-メンテ待ち{background:#ffedd5;color:#c2410c}
.st-メンテ中{background:#fee2e2;color:#dc2626}

/* Modal overlay */
.mo-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s}
.mo-bg.show{opacity:1;pointer-events:auto}
.mo{background:#fff;border-radius:12px;width:95%;max-width:560px;max-height:85vh;overflow-y:auto;padding:28px 28px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.mo h3{font-size:17px;font-weight:700;margin-bottom:20px;color:#1a1a2e}
.mo-row{display:flex;gap:14px;margin-bottom:16px}
.mo-row.full{flex-direction:column}
.mo-row label{font-size:12px;font-weight:600;color:#888;margin-bottom:4px;display:block}
.mo-row .field{flex:1}
.mo-row input,.mo-row select,.mo-row textarea{width:100%;padding:10px 12px;background:#fff;border:1px solid #ddd;border-radius:6px;color:#1a1a2e;font:400 14px/1.4 'Noto Sans JP',sans-serif;outline:none;transition:.15s}
.mo-row input:focus,.mo-row select:focus,.mo-row textarea:focus{border-color:#3b6de7;box-shadow:0 0 0 3px rgba(59,109,231,.1)}
.mo-row textarea{resize:vertical;min-height:60px}
.mo-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;padding-top:16px;border-top:1px solid #f0f1f5}

/* Availability bars */
.avail-bar{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.avail-item-name{font-size:13px;font-weight:600;min-width:180px;color:#333}
.avail-meter{flex:1;height:22px;background:#f0f1f5;border-radius:6px;overflow:hidden}
.avail-fill{height:100%;border-radius:6px;transition:.3s}
.avail-fill.ok{background:#34d399}
.avail-fill.warn{background:#fbbf24}
.avail-fill.danger{background:#f87171}
.avail-nums{font-size:12px;color:#888;min-width:120px;text-align:right}
.avail-cat-hd{margin-top:18px;margin-bottom:8px;font-size:13px;font-weight:700;color:#555;padding-bottom:4px;border-bottom:1px solid #e2e5f0}

/* Filter bar */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filter-bar select,.filter-bar input{padding:7px 12px;background:#fff;border:1px solid #ddd;border-radius:6px;color:#333;font:400 13px/1 'Noto Sans JP',sans-serif;outline:none}
.filter-bar select:focus,.filter-bar input:focus{border-color:#3b6de7}

/* Avail date row */
.avail-date-row{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.avail-date-row label{font-size:12px;font-weight:600;color:#888}
.avail-date-row input,.avail-date-row select{padding:7px 12px;background:#fff;border:1px solid #ddd;border-radius:6px;color:#333;font:400 13px/1 'Noto Sans JP',sans-serif;outline:none}

/* Section card */
.section{background:#fff;border:1px solid #e2e5f0;border-radius:10px;padding:20px;margin-bottom:16px}
.section h2{font-size:14px;font-weight:700;color:#333;margin-bottom:6px}
.section p.desc{font-size:12px;color:#999;margin-bottom:16px}

/* Category tag */
.cat-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:#f0f1f5;color:#666}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:8px;font:600 13px/1 'Noto Sans JP',sans-serif;z-index:999;opacity:0;transition:.3s;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.show{opacity:1}
.toast.ok{background:#059669;color:#fff}
.toast.err{background:#dc2626;color:#fff}

/* Loading */
.loading{text-align:center;padding:40px;color:#aaa;font-size:13px}
.empty-msg{text-align:center;color:#aaa;padding:32px;font-size:13px}
tr.overdue td{background:#fff5f5}
tr.overdue td:first-child .st{background:#fee2e2;color:#dc2626}
.overdue-badge{font-size:10px;font-weight:600;color:#dc2626;background:#fee2e2;padding:2px 6px;border-radius:4px;margin-left:4px}

/* Toolbar row */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap}

@media(max-width:640px){
  .hdr{padding:0 12px;gap:6px}
  .hdr h1{font-size:14px}
  .tab{padding:6px 10px;font-size:12px}
  .main{padding:12px 12px 32px}
  .mo{padding:20px 16px;width:98%}
  .mo-row{flex-direction:column}
  .avail-item-name{min-width:100px;font-size:12px}
  .toolbar{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<div class="hdr">
  <h1>在庫管理</h1>
  <a href="index.html" class="nav-link">生産部</a>
  <a href="project.html" class="nav-link">企画制作部</a>
  <a href="inventory.html" class="nav-link on">在庫管理</a>
  <a href="overtime.html" class="nav-link">時間外</a>
  <a href="vehicle.html" class="nav-link">車両管理</a>
  <button class="ref-btn" onclick="loadAll()">↻ 更新</button>
</div>
<div class="sub-tabs">
  <button class="tab on" data-tab="avail" onclick="switchTab('avail')">在庫確認</button>
  <button class="tab" data-tab="rentals" onclick="switchTab('rentals')">貸出/予約</button>
  <button class="tab" data-tab="maint" onclick="switchTab('maint')">メンテ</button>
  <button class="tab" data-tab="items" onclick="switchTab('items')">商品台帳</button>
</div>

<div class="main">

  <!-- ===== 商品台帳 ===== -->
  <div id="v_items" class="hidden">
    <div class="toolbar">
      <div class="filter-bar">
        <select id="flt_cat" onchange="renderItems()"><option value="">全カテゴリ</option></select>
        <input id="flt_item_q" placeholder="検索..." oninput="renderItems()">
      </div>
      <button class="btn btn-primary" onclick="openItemMo()">＋ 商品追加</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th data-col="category" onclick="sortItems('category')" style="cursor:pointer">カテゴリ <span id="item_sort_category" class="arrow"></span></th><th data-col="item_name" onclick="sortItems('item_name')" style="cursor:pointer">商品名 <span id="item_sort_item_name" class="arrow"></span></th><th data-col="total_qty" onclick="sortItems('total_qty')" style="cursor:pointer">保有数 <span id="item_sort_total_qty" class="arrow"></span></th><th>備考</th><th>操作</th></tr></thead>
        <tbody id="items_tbody"></tbody>
      </table>
    </div>
    <div id="items_loading" class="loading">読み込み中...</div>
  </div>

  <!-- ===== 貸出/予約 ===== -->
  <div id="v_rentals" class="hidden">
    <div class="toolbar">
      <div class="filter-bar">
        <select id="flt_r_status" onchange="renderRentals()">
          <option value="">全ステータス</option>
          <option>予約</option><option>貸出中</option><option>返却済</option>
          <option>検品中</option><option>メンテ待ち</option><option>メンテ中</option>
        </select>
        <select id="flt_r_cat" onchange="renderRentals()"><option value="">全カテゴリ</option></select>
        <input id="flt_r_q" placeholder="検索..." oninput="renderRentals()">
      </div>
      <button class="btn btn-primary" onclick="openRentalMo()">＋ 貸出/予約登録</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>ステータス</th><th>カテゴリ</th><th>商品名</th><th>数量</th><th>開始日</th><th>終了日</th><th>案件/顧客</th><th>備考</th><th>操作</th></tr></thead>
        <tbody id="rentals_tbody"></tbody>
      </table>
    </div>
    <div id="rentals_loading" class="loading">読み込み中...</div>
  </div>

  <!-- ===== メンテ ===== -->
  <div id="v_maint" class="hidden">
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>ステータス</th><th>カテゴリ</th><th>商品名</th><th>数量</th><th>開始日</th><th>終了日</th><th>案件/顧客</th><th>備考</th><th>操作</th></tr></thead>
        <tbody id="maint_tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- ===== 在庫確認 ===== -->
  <div id="v_avail">
    <div class="section">
      <h2>在庫バッティング確認</h2>
      <p class="desc">指定期間中に「予約」「貸出中」の数量を合計し、保有数に対する使用率を表示します。</p>
      <div class="avail-date-row">
        <label>開始日</label>
        <input type="date" id="avail_start" onchange="renderAvail()">
        <label>終了日</label>
        <input type="date" id="avail_end" onchange="renderAvail()">
        <select id="avail_cat" onchange="renderAvail()"><option value="">全カテゴリ</option></select>
      </div>
      <div id="avail_body"></div>
    </div>
  </div>

</div>

<!-- ===== 商品モーダル ===== -->
<div class="mo-bg" id="itemMoBg">
  <div class="mo">
    <h3 id="itemMoTitle">商品追加</h3>
    <input type="hidden" id="xf_item_id">
    <div class="mo-row">
      <div class="field">
        <label>カテゴリ *</label>
        <select id="xf_item_cat"><option value="">選択してください</option></select>
      </div>
      <div class="field">
        <label>新規カテゴリ（上にない場合）</label>
        <input id="xf_item_newcat" placeholder="新しいカテゴリ名">
      </div>
    </div>
    <div class="mo-row full">
      <label>商品名 *</label>
      <input id="xf_item_name" placeholder="例: 3m×3m">
    </div>
    <div class="mo-row full">
      <label>保有数</label>
      <input id="xf_item_qty" type="number" min="0" value="0">
    </div>
    <div class="mo-row full">
      <label>備考</label>
      <textarea id="xf_item_notes"></textarea>
    </div>
    <div class="mo-foot">
      <button class="btn btn-ghost" onclick="closeItemMo()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveItem()">保存</button>
    </div>
  </div>
</div>

<!-- ===== 貸出/予約モーダル ===== -->
<div class="mo-bg" id="rentalMoBg">
  <div class="mo">
    <h3 id="rentalMoTitle">貸出/予約登録</h3>
    <input type="hidden" id="xf_r_id">
    <div class="mo-row">
      <div class="field">
        <label>カテゴリ *</label>
        <select id="xf_r_cat" onchange="populateItemSelect()"><option value="">選択</option></select>
      </div>
      <div class="field">
        <label>商品名 *</label>
        <select id="xf_r_item"><option value="">先にカテゴリを選択</option></select>
      </div>
    </div>
    <div class="mo-row">
      <div class="field">
        <label>数量 *</label>
        <input id="xf_r_qty" type="number" min="1" value="1">
      </div>
      <div class="field">
        <label>ステータス</label>
        <select id="xf_r_status">
          <option>予約</option><option>貸出中</option><option>返却済</option>
          <option>検品中</option><option>メンテ待ち</option><option>メンテ中</option>
        </select>
      </div>
    </div>
    <div class="mo-row">
      <div class="field">
        <label>開始日 *</label>
        <input id="xf_r_start" type="date">
      </div>
      <div class="field">
        <label>終了日 *</label>
        <input id="xf_r_end" type="date">
      </div>
    </div>
    <div class="mo-row full">
      <label>案件 / 顧客名</label>
      <div style="display:flex;gap:8px">
        <select id="xf_r_project" style="flex:1" onchange="onProjectSelect()">
          <option value="">案件を選択（任意）</option>
        </select>
        <input id="xf_r_client" style="flex:1" placeholder="または顧客名を入力">
      </div>
    </div>
    <div class="mo-row full">
      <label>備考</label>
      <textarea id="xf_r_notes"></textarea>
    </div>
    <div class="mo-foot">
      <button class="btn btn-ghost" onclick="closeRentalMo()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveRental()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbwD5F1rJcdg7pl1lnVXzyY0vttcO88z-YKUZWG3eLIT0DNMhFZw8jXbJoKW6wCIKEC7/exec';
const DEFAULT_CATS=['テント','横幕','テーブル','イス','備品'];
const ACTIVE_STATUSES=['予約','貸出中','メンテ待ち','メンテ中'];

let items=[], rentals=[], projects=[];

const $=id=>document.getElementById(id);
function toast(msg,ok=true){const t=$('toast');t.textContent=msg;t.className='toast show '+(ok?'ok':'err');setTimeout(()=>t.classList.remove('show'),2500)}
function dateJP(d){if(!d)return'';const dt=new Date(d+'T00:00:00');return(dt.getMonth()+1)+'/'+dt.getDate()}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// === API ===
async function apiGet(params){
  const url=API+'?dept=inventory&'+new URLSearchParams(params);
  const r=await fetch(url);return r.json();
}
function fireAndForget(body){fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify({dept:'inventory',...body})})}

// === Load ===
async function loadAll(){
  try{
    $('items_loading').classList.remove('hidden');
    $('rentals_loading').classList.remove('hidden');
    const [inv,rnt,prj]=await Promise.all([
      apiGet({action:'list'}).catch(()=>[]),
      apiGet({action:'rentals'}).catch(()=>[]),
      apiGet({action:'projects'}).catch(()=>[])
    ]);
    items=inv||[];rentals=rnt||[];projects=prj||[];
    populateCategoryFilters();
    populateProjectSelect();
    renderItems();renderRentals();renderMaint();renderAvail();
    $('items_loading').classList.add('hidden');
    $('rentals_loading').classList.add('hidden');
  }catch(e){
    toast('データ取得に失敗: '+e.message,false);
    $('items_loading').textContent='読み込み失敗';
    $('rentals_loading').textContent='読み込み失敗';
  }
}

// === Categories ===
function getAllCategories(){
  const cats=new Set(DEFAULT_CATS);
  items.forEach(i=>{if(i.category)cats.add(i.category)});
  return [...cats].sort();
}
function populateCategoryFilters(){
  const cats=getAllCategories();
  ['flt_cat','flt_r_cat','avail_cat','xf_item_cat','xf_r_cat'].forEach(id=>{
    const sel=$(id);const val=sel.value;
    const first=sel.options[0].outerHTML;
    sel.innerHTML=first;
    cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o)});
    sel.value=val;
  });
}

// === Projects ===
function populateProjectSelect(){
  const sel=$('xf_r_project');
  sel.innerHTML='<option value="">案件を選択（任意）</option>';
  projects.forEach(p=>{const o=document.createElement('option');o.value=p.name;o.textContent=p.name;sel.appendChild(o)});
}
function onProjectSelect(){if($('xf_r_project').value)$('xf_r_client').value=$('xf_r_project').value}

// === Tab ===
function switchTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));
  ['items','rentals','maint','avail'].forEach(v=>$('v_'+v).classList.toggle('hidden',v!==t));
  if(t==='avail')renderAvail();
  if(t==='maint')renderMaint();
}

// ==================== 商品台帳 ====================
var itemSort={col:'category',asc:true};
function sortItems(col){if(itemSort.col===col)itemSort.asc=!itemSort.asc;else{itemSort.col=col;itemSort.asc=true}renderItems()}
function renderItems(){
  const cat=$('flt_cat').value;const q=$('flt_item_q').value.toLowerCase();
  const f=items.filter(i=>{
    if(cat&&i.category!==cat)return false;
    if(q&&!(i.item_name||'').toLowerCase().includes(q)&&!(i.category||'').toLowerCase().includes(q))return false;
    return true;
  });
  // ソート
  f.sort((a,b)=>{
    let va=a[itemSort.col],vb=b[itemSort.col];
    if(itemSort.col==='total_qty'){va=Number(va)||0;vb=Number(vb)||0;return itemSort.asc?va-vb:vb-va}
    va=String(va||'').toLowerCase();vb=String(vb||'').toLowerCase();
    if(va===vb&&itemSort.col==='category'){va=String(a.item_name||'').toLowerCase();vb=String(b.item_name||'').toLowerCase()}
    return va<vb?(itemSort.asc?-1:1):va>vb?(itemSort.asc?1:-1):0
  });
  // ソート矢印更新
  ['category','item_name','total_qty'].forEach(c=>{const el=document.getElementById('item_sort_'+c);if(el)el.textContent=itemSort.col===c?(itemSort.asc?'▲':'▼'):''});
  const tb=$('items_tbody');
  if(!f.length){tb.innerHTML='<tr><td colspan="5" class="empty-msg">商品が登録されていません</td></tr>';return}
  tb.innerHTML=f.map(i=>`<tr>
    <td><span class="cat-tag">${esc(i.category)}</span></td>
    <td><strong>${esc(i.item_name)}</strong></td>
    <td>${i.total_qty}</td>
    <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${esc(i.notes)}</td>
    <td><div class="tbl-actions">
      <a class="edit-link" onclick="editItem('${i.id}')">編集</a>
      <a class="del-link" onclick="deleteItem('${i.id}','${esc(i.item_name)}')">削除</a>
    </div></td>
  </tr>`).join('');
}

function openItemMo(data){
  $('itemMoTitle').textContent=data?'商品編集':'商品追加';
  $('xf_item_id').value=data?data.id:'';
  $('xf_item_cat').value=data?data.category:'';
  $('xf_item_newcat').value='';
  $('xf_item_name').value=data?data.item_name:'';
  $('xf_item_qty').value=data?data.total_qty:0;
  $('xf_item_notes').value=data?data.notes||'':'';
  $('itemMoBg').classList.add('show');
}
function closeItemMo(){$('itemMoBg').classList.remove('show')}
function editItem(id){const d=items.find(i=>i.id===id);if(d)openItemMo(d)}

function saveItem(){
  const cat=$('xf_item_newcat').value.trim()||$('xf_item_cat').value;
  const name=$('xf_item_name').value.trim();
  if(!cat||!name){toast('カテゴリと商品名は必須です',false);return}
  const existingId=$('xf_item_id').value;const id=existingId||'tmp_'+Date.now();
  const qty=$('xf_item_qty').value;const notes=$('xf_item_notes').value.trim();
  fireAndForget({action:'save_item',id:existingId||undefined,category:cat,item_name:name,total_qty:qty,notes});
  const local={id,category:cat,item_name:name,total_qty:Number(qty)||0,notes};
  if(existingId){const idx=items.findIndex(x=>x.id===existingId);if(idx>=0)items[idx]={...items[idx],...local};else items.push(local)}else{items.push(local)}
  toast('保存しました');closeItemMo();populateCategoryFilters();renderItems();renderAvail();
}

function deleteItem(id,name){
  if(!confirm(name+' を削除しますか？'))return;
  fireAndForget({action:'delete_item',id});
  items=items.filter(x=>x.id!==id);
  toast('削除しました');renderItems();renderAvail();
}

// ==================== メンテ ====================
function renderMaint(){
  const MAINT_ST=['メンテ待ち','メンテ中'];
  const f=rentals.filter(r=>MAINT_ST.includes(r.status));
  const tb=$('maint_tbody');
  if(!f.length){tb.innerHTML='<tr><td colspan="9" class="empty-msg">メンテ待ち・メンテ中の商品はありません</td></tr>';return}
  tb.innerHTML=f.map(r=>`<tr>
    <td><span class="st st-${r.status}">${r.status}</span></td>
    <td><span class="cat-tag">${esc(r.category)}</span></td>
    <td><strong>${esc(r.item_name)}</strong></td>
    <td>${r.qty}</td>
    <td>${dateJP(r.date_start)}</td>
    <td>${dateJP(r.date_end)}</td>
    <td>${esc(r.client_name)}</td>
    <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis">${esc(r.notes)}</td>
    <td><div class="tbl-actions">
      <a class="edit-link" onclick="editRental('${r.id}')">編集</a>
    </div></td>
  </tr>`).join('');
}

// ==================== 貸出/予約 ====================
function renderRentals(){
  const st=$('flt_r_status').value;const cat=$('flt_r_cat').value;const q=$('flt_r_q').value.toLowerCase();
  const f=rentals.filter(r=>{
    if(st&&r.status!==st)return false;
    if(cat&&r.category!==cat)return false;
    if(q&&![r.item_name,r.category,r.client_name,r.notes].join(' ').toLowerCase().includes(q))return false;
    return true;
  });
  const tb=$('rentals_tbody');
  if(!f.length){tb.innerHTML='<tr><td colspan="9" class="empty-msg">貸出/予約データがありません</td></tr>';return}
  const nowStr=todayStr();
  tb.innerHTML=f.map(r=>{
    const isOverdue=r.date_end&&r.date_end<nowStr&&r.status==='貸出中';
    return`<tr${isOverdue?' class="overdue"':''}>
    <td><span class="st st-${r.status}">${r.status}</span>${isOverdue?'<span class="overdue-badge">期限超過</span>':''}</td>
    <td><span class="cat-tag">${esc(r.category)}</span></td>
    <td><strong>${esc(r.item_name)}</strong></td>
    <td>${r.qty}</td>
    <td>${dateJP(r.date_start)}</td>
    <td>${dateJP(r.date_end)}</td>
    <td>${esc(r.client_name)}</td>
    <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis">${esc(r.notes)}</td>
    <td><div class="tbl-actions">
      <a class="edit-link" onclick="editRental('${r.id}')">編集</a>
      <a class="del-link" onclick="deleteRental('${r.id}')">削除</a>
    </div></td>
  </tr>`}).join('');
}

function populateItemSelect(){
  const cat=$('xf_r_cat').value;const sel=$('xf_r_item');
  sel.innerHTML='<option value="">商品を選択</option>';
  if(!cat)return;
  items.filter(i=>i.category===cat).forEach(i=>{
    const o=document.createElement('option');o.value=i.item_name;
    o.textContent=i.item_name+' (保有:'+i.total_qty+')';sel.appendChild(o);
  });
  const o=document.createElement('option');o.value='__new__';o.textContent='＋ 一覧にない商品を追加';sel.appendChild(o);
}

function openRentalMo(data){
  $('rentalMoTitle').textContent=data?'貸出/予約編集':'貸出/予約登録';
  $('xf_r_id').value=data?data.id:'';
  $('xf_r_cat').value=data?data.category:'';
  populateItemSelect();
  if(data){
    const sel=$('xf_r_item');let found=false;
    for(let i=0;i<sel.options.length;i++){if(sel.options[i].value===data.item_name){sel.selectedIndex=i;found=true;break}}
    if(!found&&data.item_name){const o=document.createElement('option');o.value=data.item_name;o.textContent=data.item_name;sel.insertBefore(o,sel.lastElementChild);sel.value=data.item_name}
  }
  $('xf_r_qty').value=data?data.qty:1;
  $('xf_r_status').value=data?data.status:'予約';
  $('xf_r_start').value=data?data.date_start:'';
  $('xf_r_end').value=data?data.date_end:'';
  $('xf_r_client').value=data?data.client_name||'':'';
  $('xf_r_project').value='';
  if(data&&data.client_name){const sel=$('xf_r_project');for(let i=0;i<sel.options.length;i++){if(sel.options[i].value===data.client_name){sel.selectedIndex=i;break}}}
  $('xf_r_notes').value=data?data.notes||'':'';
  $('rentalMoBg').classList.add('show');
}
function closeRentalMo(){$('rentalMoBg').classList.remove('show')}
function editRental(id){const d=rentals.find(r=>r.id===id);if(d)openRentalMo(d)}

function saveRental(){
  const cat=$('xf_r_cat').value;let itemName=$('xf_r_item').value;
  const start=$('xf_r_start').value;const end=$('xf_r_end').value;
  if(itemName==='__new__'){
    const newName=prompt('新しい商品名を入力（カテゴリ: '+cat+'）');if(!newName)return;
    const qty=prompt('保有数を入力','0');
    fireAndForget({action:'save_item',category:cat,item_name:newName,total_qty:Number(qty)||0,notes:''});
    items.push({id:'tmp_'+Date.now(),category:cat,item_name:newName,total_qty:Number(qty)||0,notes:''});
    itemName=newName;toast('商品「'+newName+'」を追加しました');
    populateCategoryFilters();renderItems();
  }
  if(!cat||!itemName||!start||!end){toast('カテゴリ・商品名・開始日・終了日は必須です',false);return}
  const existingId=$('xf_r_id').value;const id=existingId||'tmp_'+Date.now();
  const qtyVal=$('xf_r_qty').value;const status=$('xf_r_status').value;
  const clientName=$('xf_r_client').value.trim();const notes=$('xf_r_notes').value.trim();
  fireAndForget({action:'save_rental',id:existingId||undefined,category:cat,item_name:itemName,qty:qtyVal,date_start:start,date_end:end,status,client_name:clientName,project_id:'',notes});
  const local={id,category:cat,item_name:itemName,qty:Number(qtyVal)||1,date_start:start,date_end:end,status,client_name:clientName,project_id:'',notes};
  if(existingId){const idx=rentals.findIndex(x=>x.id===existingId);if(idx>=0)rentals[idx]={...rentals[idx],...local};else rentals.push(local)}else{rentals.push(local)}
  toast('保存しました');closeRentalMo();renderRentals();renderMaint();renderAvail();
}

function deleteRental(id){
  if(!confirm('この貸出/予約を削除しますか？'))return;
  fireAndForget({action:'delete_rental',id});
  rentals=rentals.filter(x=>x.id!==id);
  toast('削除しました');renderRentals();renderMaint();renderAvail();
}

// ==================== 在庫確認 ====================
function renderAvail(){
  const startStr=$('avail_start').value;const endStr=$('avail_end').value;
  const cat=$('avail_cat').value;const body=$('avail_body');
  if(!startStr||!endStr){body.innerHTML='<p style="color:#aaa;font-size:13px">開始日と終了日を指定してください。</p>';return}

  const start=new Date(startStr+'T00:00:00');const end=new Date(endStr+'T00:00:00');
  const usage={};
  items.forEach(i=>{
    if(cat&&i.category!==cat)return;
    usage[i.category+'|'+i.item_name]={category:i.category,item_name:i.item_name,total:Number(i.total_qty)||0,used:0,rent:0,maint:0};
  });

  const dayMs=86400000;const days=[];
  for(let d=new Date(start);d<=end;d=new Date(d.getTime()+dayMs))days.push(new Date(d));

  Object.keys(usage).forEach(key=>{
    let max=0,maxRent=0,maxMaint=0;
    days.forEach(day=>{
      const ds=day.toISOString().slice(0,10);let u=0,r2=0,m=0;
      rentals.forEach(r=>{
        if(!ACTIVE_STATUSES.includes(r.status))return;
        if((r.category+'|'+r.item_name)!==key)return;
        if(r.date_start<=ds&&r.date_end>=ds){
          const q=Number(r.qty)||0;u+=q;
          if(r.status==='メンテ待ち'||r.status==='メンテ中')m+=q;else r2+=q;
        }
      });
      if(u>max){max=u;maxRent=r2;maxMaint=m}
    });
    usage[key].used=max;usage[key].rent=maxRent;usage[key].maint=maxMaint;
  });

  const entries=Object.values(usage).sort((a,b)=>String(a.category).localeCompare(String(b.category))||String(a.item_name).localeCompare(String(b.item_name)));
  if(!entries.length){body.innerHTML='<p style="color:#aaa;font-size:13px">商品が登録されていません。</p>';return}

  let html='';let lastCat='';
  entries.forEach(e=>{
    if(e.category!==lastCat){lastCat=e.category;html+=`<div class="avail-cat-hd">${esc(e.category)}</div>`}
    const pct=e.total>0?Math.round((e.used/e.total)*100):0;
    const avail=e.total-e.used;
    let cls='ok';if(pct>=100)cls='danger';else if(pct>=70)cls='warn';
    let numColor='#059669';if(avail<=0)numColor='#dc2626';else if(avail<=Math.ceil(e.total*0.3))numColor='#d97706';
    let detail='';
    if(e.rent>0&&e.maint>0)detail='貸出'+e.rent+' + メンテ'+e.maint;
    else if(e.rent>0)detail='貸出'+e.rent;
    else if(e.maint>0)detail='メンテ'+e.maint;
    const usedStr=detail?(detail+' = '+e.used):e.used;
    html+=`<div class="avail-bar">
      <span class="avail-item-name">${esc(e.item_name)}</span>
      <div class="avail-meter"><div class="avail-fill ${cls}" style="width:${Math.min(pct,100)}%"></div></div>
      <span class="avail-nums">${usedStr} / ${e.total} 使用　残 <strong style="color:${numColor}">${avail}</strong></span>
    </div>`;
  });
  body.innerHTML=html;
}

$('avail_start').value=todayStr();

$('avail_end').value=tw.getFullYear()+'-'+String(tw.getMonth()+1).padStart(2,'0')+'-'+String(tw.getDate()).padStart(2,'0');
