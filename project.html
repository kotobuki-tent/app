<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企画制作部 – 工程管理</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='56' fill='%23a3e635'/><text x='90' y='130' text-anchor='middle' font-family='serif' font-weight='900' font-size='110' fill='%23365314'>企</text></svg>">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='10' fill='%23a3e635'/><text x='16' y='24' text-anchor='middle' font-family='serif' font-weight='900' font-size='20' fill='%23365314'>企</text></svg>">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#fb7185">
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(e=>console.warn('SW登録失敗:',e));
  });
}
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f6f8;--surface:#fff;--surface2:#f0f1f4;--surface3:#e6e8ed;
  --border:#d8dbe3;--border-light:#c8ccd6;
  --text:#1a1d27;--text-dim:#6b7084;--text-faint:#9498ab;
  --accent:#3b6fd8;--accent-dim:rgba(59,111,216,.1);
  --red:#d94040;--red-dim:rgba(217,64,64,.1);
  --orange:#d48a20;--orange-dim:rgba(212,138,32,.1);
  --green:#2a9d5a;--green-dim:rgba(42,157,90,.1);
  --purple:#7c5cbf;--purple-dim:rgba(124,92,191,.1);
  --cyan:#2196a8;--cyan-dim:rgba(33,150,168,.1);
}
html{font-size:15px}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.sub-tabs{display:flex;gap:6px;padding:10px 16px 0;background:var(--bg)}
.sub-tab{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);font:500 12px/1 'Noto Sans JP',sans-serif;padding:7px 14px;border-radius:8px;cursor:pointer}
.sub-tab:hover{color:var(--text);border-color:var(--accent)}
.sub-tab.on{color:#fff;background:var(--accent);border-color:var(--accent)}
.app{padding-top:48px}
.hidden{display:none!important}
.loading{text-align:center;padding:80px 20px;color:var(--text-dim);font-size:14px}
.loading .spin{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;margin-bottom:12px}
@keyframes sp{to{transform:rotate(360deg)}}
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px;background:var(--surface)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--surface2);font-weight:600;text-align:left;padding:10px 12px;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--accent)}
th .arrow{font-size:10px;margin-left:4px;color:var(--text-faint)}
td{padding:10px 12px;border-top:1px solid var(--surface3);white-space:nowrap}
tr:hover td{background:rgba(59,111,216,.03)}
.act-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;padding:2px 6px}
.act-btn.del{color:var(--red)}
.act-btn:hover{text-decoration:underline}
.av-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.av-add{background:var(--accent);color:#fff;border:none;padding:9px 18px;border-radius:8px;font:600 13px/1 'Noto Sans JP',sans-serif;cursor:pointer}
.av-add:hover{opacity:.85}
.av-search{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font:400 13px/1 'Noto Sans JP',sans-serif;width:220px}
.mo-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;justify-content:center;align-items:flex-start;padding:40px 16px;overflow-y:auto}
.mo-bg.show{display:flex}
.mo{background:var(--surface);border-radius:14px;padding:28px;width:100%;max-width:580px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mo h2{font-size:18px;font-weight:900;margin-bottom:20px}
.mo-row{display:flex;gap:14px;margin-bottom:14px}
.mo-row.full{display:block;margin-bottom:14px}
.mo-field{flex:1;display:flex;flex-direction:column;gap:5px}
.mo-field label{font-size:12px;font-weight:600;color:var(--text-dim)}
.mo-field input,.mo-field select,.mo-field textarea{padding:10px 12px;border:1px solid var(--border);border-radius:8px;font:400 14px/1.4 'Noto Sans JP',sans-serif;background:var(--surface2);width:100%}
.mo-field textarea{min-height:70px;resize:vertical}
.mo-field input:focus,.mo-field select:focus,.mo-field textarea:focus{outline:none;border-color:var(--accent)}
.mo-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.mo-foot button{padding:10px 22px;border-radius:8px;font:600 14px/1 'Noto Sans JP',sans-serif;cursor:pointer;border:1px solid var(--border)}
.mo-foot .cancel{background:var(--surface);color:var(--text-dim)}
.mo-foot .save{background:var(--accent);color:#fff;border-color:var(--accent)}
.mo-foot .save:hover{opacity:.85}

/* レンタルチェック */
.type-toggle{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:14px;cursor:pointer;user-select:none}
.type-toggle:hover{border-color:var(--accent)}
.type-toggle input{width:18px;height:18px;cursor:pointer}
.type-toggle label{font-size:13px;font-weight:600;color:var(--text);cursor:pointer;margin:0}
.type-toggle .hint{font-size:11px;color:var(--text-dim);margin-left:8px}
/* レンタル選択時：設営関連フィールドをグレーアウト */
.rental-disabled{opacity:.4;pointer-events:none}
.rental-disabled input,.rental-disabled select,.rental-disabled textarea,.rental-disabled button{background:var(--surface3)!important;cursor:not-allowed!important}
/* ガントのセクション見出し */
.gantt-section-hd{font-size:13px;font-weight:700;color:var(--text-dim);padding:14px 4px 8px;margin-top:8px;border-top:1px solid var(--border)}
.gantt-section-hd:first-of-type{border-top:none;margin-top:0;padding-top:4px}
.gantt-section-hd .count{font-weight:500;color:var(--text-faint);margin-left:6px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1d27;color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:500;z-index:400;opacity:0;transition:.3s}
.toast.show{opacity:1}
.toast.err{background:var(--red)}
/* ガントチャート */
.proj-view{padding:16px}
.gantt-controls{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.gantt-controls select{padding:7px 10px;border:1px solid var(--border);border-radius:8px;font:400 13px/1 'Noto Sans JP',sans-serif;background:var(--surface)}
.gantt-nav{display:flex;gap:4px}
.gantt-nav button{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font:500 12px/1 'Noto Sans JP',sans-serif;cursor:pointer}
.gantt-nav button:hover{border-color:var(--accent);color:var(--accent)}
.gantt-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px;background:var(--surface)}
.gantt{min-width:800px}
.gantt-header{display:flex;border-bottom:1px solid var(--border);background:var(--surface2);position:sticky;top:0;z-index:10}
.gantt-label-hd{min-width:220px;max-width:220px;padding:10px 12px;font-weight:700;font-size:12px;border-right:1px solid var(--border);flex-shrink:0}
.gantt-dates{display:flex;flex:1}
.gantt-date-cell{flex:1;min-width:44px;text-align:center;padding:6px 2px;font-size:11px;font-weight:500;color:var(--text-dim);border-right:1px solid var(--surface3)}
.gantt-date-cell.today{background:var(--accent-dim);color:var(--accent);font-weight:700}
.gantt-date-cell.sun{color:var(--red)}
.gantt-date-cell.holiday{color:var(--red);background:rgba(217,64,64,.05)}
.gantt-date-cell .hol-name{font-size:7px;display:block;color:var(--red);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-date-cell.sat{color:var(--accent)}
.gantt-date-cell .dow{font-size:9px;display:block}
.gantt-date-cell .dm{font-size:12px;font-weight:700;display:block}
.gantt-row{display:flex;border-bottom:1px solid var(--surface3);min-height:52px;cursor:pointer;transition:.1s}
.gantt-row:hover{background:rgba(59,111,216,.03)}
.gantt-row-label{min-width:220px;max-width:220px;padding:8px 12px;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;flex-shrink:0;overflow:hidden}
.gantt-row-label .prj-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-row-label .prj-assignee{display:block;font-size:12px;color:var(--text-dim);margin:2px 0}
.prj-meta{font-size:10px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-row-label .prj-status{font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px;display:inline-block;margin-top:2px}
.gantt-bars{display:flex;flex:1;position:relative}
.gantt-bar-cell{flex:1;min-width:44px;border-right:1px solid var(--surface3);position:relative;overflow:hidden;min-height:52px}
.gantt-bar-cell.today{background:rgba(59,111,216,.04)}
.gantt-bar{position:absolute;top:4px;bottom:4px;border-radius:4px;left:2px;right:2px;z-index:2}
.gantt-bar.load_in{background:#64b5f6}
.gantt-bar.setup{background:#81c784}
.gantt-bar.event{background:#ffb74d}
.gantt-bar.teardown{background:#e57373}
.gantt-bar.rental_out{background:#ab47bc}
.gantt-bar.rental_return{background:#78909c}
.gantt-bar.rental_period{background:#ce93d8;opacity:.5}
.gantt-legend{display:flex;gap:16px;margin-top:12px;font-size:12px;color:var(--text-dim);flex-wrap:wrap}
.gantt-legend span{display:flex;align-items:center;gap:4px}
.gantt-legend .dot{width:14px;height:10px;border-radius:3px;display:inline-block}
.vehicle-summary{margin-top:20px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:10px}
.vehicle-summary h3{font-size:14px;font-weight:700;margin-bottom:4px}
.vehicle-summary .vh-desc{font-size:11px;color:var(--text-dim);margin-bottom:12px}
.vh-no-conflict{padding:12px 0;font-size:13px;color:var(--green);font-weight:600}
.chk-list{display:flex;flex-wrap:wrap;gap:8px}
.chk-list label{display:flex;align-items:center;gap:4px;font-size:13px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:var(--surface2)}
.chk-list label:has(input:checked){background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:600}
.chk-list input{display:none}
.phase-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.phase-grid .mo-field{flex:none}
.date-phase-block{margin-bottom:12px}
.date-phase-label{font-size:12px;font-weight:600;color:var(--text-dim);display:block;margin-bottom:4px}
.date-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.date-item{display:flex;align-items:center;gap:4px}
.date-item input[type="date"]{padding:8px 10px;border:1px solid var(--border);border-radius:8px;font:400 13px/1.4 'Noto Sans JP',sans-serif;background:var(--surface2)}
.date-item input[type="date"]:focus{outline:none;border-color:var(--accent)}
.date-rm{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:0 4px;line-height:1}
.date-rm:hover{opacity:.7}
.date-add-btn{background:none;border:1px dashed var(--border);color:var(--text-dim);font:500 12px/1 'Noto Sans JP',sans-serif;padding:6px 12px;border-radius:6px;cursor:pointer}
.date-add-btn:hover{border-color:var(--accent);color:var(--accent)}
.phase-hd{font-size:12px;font-weight:700;color:var(--text-dim);margin:14px 0 8px;padding-top:8px;border-top:1px solid var(--surface3)}
.view-row{display:flex;gap:16px;margin-bottom:10px;font-size:13px}
.view-row .view-label{font-weight:600;color:var(--text-dim);min-width:80px;flex-shrink:0}
.view-row .view-val{color:var(--text)}
.view-section{margin-top:14px;padding-top:12px;border-top:1px solid var(--border-light);font-size:13px}
.view-section h3{font-size:12px;font-weight:700;color:var(--text-dim);margin-bottom:8px}
.view-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.view-tag{font-size:11px;padding:3px 8px;border-radius:5px;background:var(--accent-dim);color:var(--accent);font-weight:600}
.proj-admin{padding:16px}
/* レンタル品追加 */
.rental-add-section{margin-top:14px;padding-top:12px;border-top:1px solid var(--border-light)}
.rental-add-section h3{font-size:12px;font-weight:700;color:var(--text-dim);margin-bottom:8px}
.rental-add-row{display:flex;gap:6px;margin-bottom:6px;align-items:flex-end;flex-wrap:wrap}
.rental-add-row select,.rental-add-row input{padding:7px 8px;border:1px solid var(--border);border-radius:6px;font:400 12px/1.3 'Noto Sans JP',sans-serif;background:var(--surface2)}
.rental-add-row select:focus,.rental-add-row input:focus{outline:none;border-color:var(--accent)}
.rental-add-row .ra-cat{width:100px}
.rental-add-row .ra-item{width:120px}
.rental-add-row .ra-qty{width:55px}
.rental-add-row .ra-date{width:120px}
.rental-add-row .ra-rm{background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:4px}
.rental-add-btn{background:none;border:1px dashed var(--border);color:var(--text-dim);font:500 11px/1 'Noto Sans JP',sans-serif;padding:5px 12px;border-radius:6px;cursor:pointer;margin-top:4px}
.rental-add-btn:hover{border-color:var(--accent);color:var(--accent)}
.rental-save-btn{background:var(--accent);color:#fff;border:none;padding:7px 16px;border-radius:6px;font:600 12px/1 'Noto Sans JP',sans-serif;cursor:pointer;margin-top:8px}
.rental-save-btn:hover{opacity:.85}
.rental-existing{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px;border-bottom:1px solid var(--surface3)}
.rental-existing:last-child{border-bottom:none}
.rental-existing .re-info{flex:1}
.rental-existing .re-del{background:none;border:none;color:var(--red);font-size:11px;cursor:pointer}
.rental-existing .re-del:hover{text-decoration:underline}

/* ステータスログボタン */
.slog-btn{background:none;border:1px solid var(--border);color:var(--text-dim);font:500 12px/1 'Noto Sans JP',sans-serif;padding:6px 12px;border-radius:8px;cursor:pointer;position:relative;transition:.15s;white-space:nowrap}
.slog-btn:hover{border-color:var(--accent);color:var(--accent)}
.slog-btn .dot{position:absolute;top:-3px;right:-3px;width:10px;height:10px;border-radius:50%;background:var(--red);border:2px solid var(--bg);display:none}
.slog-btn.has-new .dot{display:block}
.slog-item{padding:12px 14px;border-bottom:1px solid var(--surface3);font-size:13px;line-height:1.6;cursor:pointer;transition:.15s}
.slog-item:hover{background:var(--accent-dim)}
.slog-item.sl-del{cursor:default;color:var(--text-dim)}
.slog-item.sl-del:hover{background:transparent}
.slog-item.sl-del .sl-st{color:var(--red)}
.slog-item:last-child{border-bottom:none}
.slog-item .sl-name{font-weight:600;color:var(--text)}
.slog-item .sl-st{font-weight:700;color:var(--accent);margin:0 2px}
.slog-empty{text-align:center;padding:40px 20px;color:var(--text-faint);font-size:13px}

/* 現場詳細モーダル内のステータス変更ボタン */
.st-change{margin-top:18px;padding-top:16px;border-top:2px solid var(--surface3)}
.st-change-label{font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:10px}
.st-change-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.st-btn{padding:10px 16px;border-radius:8px;font:600 13px/1 'Noto Sans JP',sans-serif;cursor:pointer;border:2px solid var(--border);background:var(--surface);color:var(--text-dim);transition:.15s}
.st-btn:hover{border-color:var(--accent);color:var(--accent)}
.st-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);cursor:default}

/* ========== スマホ対応 ========== */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;background:#fb7185;display:flex;align-items:stretch;height:48px;padding:0;gap:0}
.hdr-inner{display:flex;align-items:stretch;width:100%;padding:6px 8px 0 8px;gap:2px}
.nav-link{background:rgba(255,255,255,.04);border:none;color:rgba(74,14,31,.85);font:500 13px/1 'Noto Sans JP',sans-serif;padding:0 14px;border-radius:8px 8px 0 0;cursor:pointer;transition:background .15s,color .15s;text-decoration:none;display:inline-flex;align-items:center;margin-bottom:0;position:relative;white-space:nowrap}
.nav-link:hover{color:#4a0e1f;background:rgba(255,255,255,.1)}
.nav-link.on{background:var(--bg,#f5f6fa);color:#1a1d27;font-weight:700}
.nav-link.on::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--bg,#f5f6fa)}
.home-link{font-weight:700}
.hdr-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(74,14,31,.9);padding:0 14px;border-radius:6px;font:500 12px/1 'Noto Sans JP',sans-serif;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;height:32px;align-self:center;margin-left:4px}
.hdr-btn:hover{color:#4a0e1f;border-color:rgba(255,255,255,.5)}
.nav-menu-btn{background:rgba(255,255,255,.08);border:none;color:#4a0e1f;font-size:20px;line-height:1;padding:0 12px;border-radius:6px;cursor:pointer;height:32px;align-self:center;display:none}
.nav-menu-btn:hover{background:rgba(255,255,255,.18)}
.home-link{display:inline-flex;align-items:center}
.nav-spacer{flex:1}
.nav-right{display:contents}
@media(max-width:768px){
  .nav-right{display:none;position:fixed;top:48px;right:10px;background:#fb7185;border-radius:10px;padding:6px;flex-direction:column;gap:2px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:999;min-width:160px}
  .nav-right.open{display:flex}
  .nav-right .nav-link{padding:10px 14px;border-radius:6px;font-size:14px;text-align:left;background:transparent;color:rgba(74,14,31,.85)}
  .nav-right .nav-link.on{background:var(--bg,#f5f6fa);color:#1a1d27}
  .nav-right .nav-link.on::after{display:none}
  .nav-menu-btn{display:inline-flex;align-items:center;justify-content:center}
  .nav-spacer{flex:1}
  .hdr{padding:0}
  .hdr-inner{padding:6px 8px 0 8px;overflow-x:auto;scrollbar-width:none}
  .hdr-inner::-webkit-scrollbar{display:none}
  .nav-link{flex-shrink:0;font-size:12px;padding:0 10px}
}

@media (max-width:768px){
  html{font-size:14px}

  /* ヘッダー：横スクロール */
  .hdr::-webkit-scrollbar{display:none}
  .hdr h1{font-size:15px;margin-right:6px;flex-shrink:0;white-space:nowrap}
  .nav-link{font-size:12px;padding:8px 10px;flex-shrink:0;white-space:nowrap}
  .hdr-btn{font-size:11px;padding:7px 10px;flex-shrink:0;white-space:nowrap}

  /* サブタブ横スクロール */
  .sub-tabs{padding:10px 10px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap}
  .sub-tabs::-webkit-scrollbar{display:none}
  .sub-tab{flex-shrink:0;padding:9px 14px;font-size:12px;min-height:38px}

  /* 本体 padding 削減 */
  .proj-view,.proj-admin{padding:12px 10px}

  /* ガント：最小幅は維持、ラベル列縮小、高さ確保 */
  .gantt-controls{gap:8px;margin-bottom:12px}
  .gantt-controls select{padding:8px 10px;font-size:12px;min-height:38px}
  .gantt-nav button{padding:8px 10px;min-height:36px;font-size:12px}
  .gantt{min-width:720px}
  .gantt-label-hd,.gantt-row-label{min-width:160px;max-width:160px;padding:8px}
  .gantt-row-label .prj-name{font-size:12px}
  .gantt-row-label .prj-assignee{font-size:11px}
  .prj-meta{font-size:9px}
  .gantt-date-cell{min-width:36px;font-size:10px}
  .gantt-date-cell .dm{font-size:11px}
  .gantt-date-cell .hol-name{font-size:6px}

(function(){
  let originalParent=null, originalNextSibling=null;
  function syncNavRight(){
    const nr=document.querySelector('.nav-right');
    if(!nr)return;
    const isMobile=window.matchMedia('(max-width:768px)').matches;
    if(isMobile){
      if(nr.parentElement!==document.body){
        originalParent=nr.parentElement;
        originalNextSibling=nr.nextSibling;
        document.body.appendChild(nr);
      }
    } else {
      if(nr.parentElement===document.body&&originalParent){
        if(originalNextSibling&&originalNextSibling.parentElement===originalParent){
          originalParent.insertBefore(nr,originalNextSibling);
        } else {
          originalParent.appendChild(nr);
        }
      }
    }
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',syncNavRight);
  }else{
    syncNavRight();
  }
  window.addEventListener('resize',syncNavRight);
})();

// ===== データ読み込み =====
async function loadProj(){try{const r=await fetch(API+'?action=read&dept=project');const j=await r.json();if(j.success){projData=j.data;detectStatusChanges()}}catch(e){toast('企画制作データ取得エラー',true)}}
async function loadRentals(){try{const r=await fetch(API+'?dept=inventory&action=rentals');const j=await r.json();rentalsData=j||[]}catch(e){rentalsData=[]}}
async function loadInventoryItems(){try{const r=await fetch(API+'?dept=inventory&action=list');const j=await r.json();inventoryItems=j||[]}catch(e){inventoryItems=[]}}
async function loadAll(){
  const cached=_getCache('project');
  if(cached){
    if(cached.proj)projData=cached.proj;
    if(cached.rent)rentalsData=cached.rent;
    if(cached.inv)inventoryItems=cached.inv;
    render();
  }else{
    $('loader').classList.remove('hidden');
  }
  await Promise.all([loadProj(),loadRentals(),loadInventoryItems()]);

// ===== ステータス変更検知 =====
function detectStatusChanges(){
  const curr={};
  projData.forEach(d=>{if(d.id&&String(d.id).indexOf('tmp_')!==0)curr[String(d.id)]={status:d.status||'',project:d.project||''}});
  try{slog=JSON.parse(localStorage.getItem(SLOG_LIST_KEY)||'[]')}catch(e){slog=[]}
  try{slogUnread=parseInt(localStorage.getItem(SLOG_UNREAD_KEY)||'0',10)||0}catch(e){slogUnread=0}
  let prev=null;
  try{prev=JSON.parse(localStorage.getItem(SLOG_KEY)||'null')}catch(e){prev=null}
  if(!prev){localStorage.setItem(SLOG_KEY,JSON.stringify(curr));return}
  const newEntries=[];
  Object.keys(curr).forEach(id=>{
    if(!prev[id]){
      newEntries.push({id,project:curr[id].project,from:'',to:'新規登録',ts:Date.now(),isNew:true});
    }else if(prev[id].status!==curr[id].status){
      newEntries.push({id,project:curr[id].project,from:prev[id].status,to:curr[id].status,ts:Date.now()});
    }
  });
  Object.keys(prev).forEach(id=>{
    if(!curr[id]){
      newEntries.push({id,project:prev[id].project,from:prev[id].status,to:'削除',ts:Date.now(),isDel:true});
    }
  });
  if(newEntries.length){
    slog=[...newEntries,...slog].slice(0,20);
    slogUnread=Math.min(slogUnread+newEntries.length,20);
    localStorage.setItem(SLOG_LIST_KEY,JSON.stringify(slog));
    localStorage.setItem(SLOG_UNREAD_KEY,String(slogUnread));
  }
  localStorage.setItem(SLOG_KEY,JSON.stringify(curr));
}

// ===== ステータスログモーダル =====
function openSlog(){
  const el=$('slogList');
  if(!slog.length){
    el.innerHTML='<div class="slog-empty">変更履歴はまだありません</div>';
  }else{
    let h='';
    slog.forEach(e=>{
      const verb=(e.isNew||e.isDel)?'されました':'になりました';
      const cls=e.isDel?' sl-del':'';
      h+=`<div class="slog-item${cls}" data-id="${esc(e.id)}" data-del="${e.isDel?'1':'0'}"><span class="sl-name">${esc(e.project)}</span> が <span class="sl-st">${esc(e.to)}</span> ${verb}</div>`;
    });
    el.innerHTML=h;
    el.querySelectorAll('.slog-item').forEach(it=>{
      if(it.dataset.del==='1')return;
      it.onclick=()=>{closeSlog();viewProj(it.dataset.id)};
    });
  }
  slogUnread=0;
  localStorage.setItem(SLOG_UNREAD_KEY,'0');
  $('slogBg').classList.add('show');
  if(curProjView==='gantt')renderGantt();
}
function closeSlog(){
  $('slogBg').classList.remove('show');
}
function clearSlog(){
  if(!slog.length)return;
  if(!confirm('ログをすべて削除しますか？'))return;
  slog=[];
  slogUnread=0;
  localStorage.setItem(SLOG_LIST_KEY,'[]');
  localStorage.setItem(SLOG_UNREAD_KEY,'0');
  $('slogList').innerHTML='<div class="slog-empty">変更履歴はまだありません</div>';
  if(curProjView==='gantt')renderGantt();
}

// ===== 描画 =====
function render(){
  if(curProjView==='gantt'){$('projGantt').classList.remove('hidden');$('projDoneView').classList.add('hidden');$('projAdminView').classList.add('hidden');renderGantt()}
  else if(curProjView==='projDone'){$('projGantt').classList.add('hidden');$('projDoneView').classList.remove('hidden');$('projAdminView').classList.add('hidden');renderProjDone()}
  else{$('projGantt').classList.add('hidden');$('projDoneView').classList.add('hidden');$('projAdminView').classList.remove('hidden');renderProjAdmin()}
}

function initGanttStart(){const d=new Date(today);d.setDate(d.getDate()-((d.getDay()+6)%7)-3);ganttStart=d}
function ganttMove(n){ganttStart.setDate(ganttStart.getDate()+n);render()}

  const todayStr=`${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日（${dow[today.getDay()]}）`;

  h+='<div class="gantt-controls"><div class="gantt-nav"><button onclick="ganttMove(-7)">← 1週</button><button onclick="ganttToday()">今日</button><button onclick="ganttMove(7)">1週 →</button></div>';
  h+=`<select onchange="ganttDays=+this.value;render()"><option value="14"${ganttDays===14?' selected':''}>2週間</option><option value="21"${ganttDays===21?' selected':''}>3週間</option><option value="28"${ganttDays===28?' selected':''}>4週間</option><option value="42"${ganttDays===42?' selected':''}>6週間</option></select>`;
  h+=`<select onchange="ganttStatusFilter=this.value;render()"><option value=""${!ganttStatusFilter?' selected':''}>全ステータス</option><option value="見積中">見積中</option><option value="受注">受注</option><option value="準備中">準備中</option><option value="現場中">現場中</option><option value="レンタル中">レンタル中</option><option value="完了">完了</option></select>`;
  h+=`<input style="padding:7px 12px;border:1px solid var(--border);border-radius:8px;font:400 13px/1 'Noto Sans JP',sans-serif;width:180px" placeholder="検索..." oninput="ganttFilter(this.value)"></div>`;
  // 現場セクション
  h+=`<div class="gantt-section-hd">現場<span class="count">${siteItems.length}件</span></div>`;
  h+=buildGanttTable(siteItems,dates,'現場データがありません');
  // レンタルセクション
  h+=`<div class="gantt-section-hd">レンタル<span class="count">${rentalItems.length}件</span></div>`;
  h+=buildGanttTable(rentalItems,dates,'レンタル案件はありません');
  h+='<div class="gantt-legend"><span><span class="dot" style="background:#64b5f6"></span>搬入</span><span><span class="dot" style="background:#81c784"></span>設営</span><span><span class="dot" style="background:#ffb74d"></span>本番</span><span><span class="dot" style="background:#e57373"></span>撤去</span><span><span class="dot" style="background:#ab47bc"></span>貸出</span><span><span class="dot" style="background:#78909c"></span>返却</span><span><span class="dot" style="background:#ce93d8;opacity:.5"></span>貸出中</span></div>';
  // 車両バッティング（両方含めて判定）
  const allForVh=[...siteItems,...rentalItems];
  const usage={};VEHICLES.forEach(v=>usage[v]={});
  allForVh.forEach(d=>{const projVehDates={};[{vk:'vehicles_load_in',dk:'date_load_in'},{vk:'vehicles_setup',dk:'date_setup'},{vk:'vehicles_event',dk:'date_event'},{vk:'vehicles_teardown',dk:'date_teardown'},{vk:'vehicles_rental_out',dk:'date_rental_out'},{vk:'vehicles_rental_return',dk:'date_rental_return'}].forEach(p=>{if(!d[p.vk])return;const vehs=d[p.vk].split(',').map(s=>s.trim()).filter(Boolean);const dts=parseDates(d[p.dk]);vehs.forEach(v=>{if(!projVehDates[v])projVehDates[v]=new Set();dts.forEach(dt=>projVehDates[v].add(dateStr(dt)))})});Object.entries(projVehDates).forEach(([v,dates])=>{if(!usage[v])usage[v]={};dates.forEach(ds=>{usage[v][ds]=(usage[v][ds]||0)+1})})});

// ガント表の構築（現場/レンタル共用）
function buildGanttTable(items,dates,emptyMsg){
  let h='<div class="gantt-wrap"><div class="gantt"><div class="gantt-header"><div class="gantt-label-hd">現場名</div><div class="gantt-dates">';
  h+=ganttDateHeaders(dates);
  h+='</div></div>';
  if(!items.length){h+=`<div style="padding:24px;text-align:center;color:var(--text-dim);font-size:13px">${emptyMsg}</div>`;h+='</div></div>';return h}
  items.forEach(d=>{
    const stColors={見積中:['var(--text-faint)','var(--surface3)'],受注:['var(--purple)','var(--purple-dim)'],準備中:['var(--orange)','var(--orange-dim)'],現場中:['var(--green)','var(--green-dim)'],'レンタル中':['var(--cyan)','var(--cyan-dim)'],完了:['var(--text-dim)','var(--surface3)']};
    const sc=stColors[d.status]||['var(--text-faint)','var(--surface3)'];
    const allDates=[].concat(parseDates(d.date_load_in),parseDates(d.date_setup),parseDates(d.date_event),parseDates(d.date_teardown),parseDates(d.date_rental_out),parseDates(d.date_rental_return)).filter(Boolean).sort((a,b)=>a-b);
    const dateRange=allDates.length?`${allDates[0].getMonth()+1}/${allDates[0].getDate()}〜${allDates[allDates.length-1].getMonth()+1}/${allDates[allDates.length-1].getDate()}`:'日程未定';
    h+=`<div class="gantt-row" data-id="${d.id}"><div class="gantt-row-label"><span class="prj-name">${esc(d.project)}</span>`;
    if(d.our_person)h+=`<span class="prj-assignee">担当: <span style="color:var(--green);background:rgba(42,157,90,.1);font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px">${esc(d.our_person)}</span></span>`;
    h+=`<span class="prj-meta">${esc(d.client||'')}${d.order_no?' <span style="color:var(--accent);font-weight:600">'+esc(d.order_no)+'</span>':''}</span><span style="font-size:10px;color:var(--text-dim);margin-top:1px">${dateRange}</span><span class="prj-status" style="color:${sc[0]};background:${sc[1]}">${esc(d.status)}</span></div><div class="gantt-bars">`;
    dates.forEach((dt,i)=>{
      const ds=dateStr(dt);const isT=ds===dateStr(today);const hits=[];
      [{key:'load_in',f:'date_load_in'},{key:'setup',f:'date_setup'},{key:'event',f:'date_event'},{key:'teardown',f:'date_teardown'},{key:'rental_out',f:'date_rental_out'},{key:'rental_return',f:'date_rental_return'}].forEach(p=>{const dates_p=parseDates(d[p.f]);if(dates_p.some(pd=>dateStr(pd)===ds))hits.push(p.key)});
      if(!hits.includes('rental_out')&&!hits.includes('rental_return')){const rOut=parseDates(d.date_rental_out);const rRet=parseDates(d.date_rental_return);if(rOut.length&&rRet.length){const minOut=new Date(Math.min(...rOut));const maxRet=new Date(Math.max(...rRet));if(dt>=minOut&&dt<=maxRet)hits.push('rental_period')}}
      h+=`<div class="gantt-bar-cell${isT?' today':''}${hits.length>1?' multi':''}">`;
      if(hits.length===1)h+=`<div class="gantt-bar ${hits[0]}"></div>`;
      else if(hits.length>1)hits.forEach((k,idx)=>{const pct=100/hits.length;h+=`<div class="gantt-bar ${k}" style="top:calc(${pct*idx}% + 1px);height:calc(${pct}% - 2px);bottom:auto;border-radius:3px"></div>`});
      h+='</div>';
    });
    h+='</div></div>';
  });
  h+='</div></div>';
  return h;
}

  const el=$('projAdminView');let items=projData.filter(d=>d.status!=='完了');
  if(projSort.col)items.sort((a,b)=>{let va=String(a[projSort.col]||'').toLowerCase(),vb=String(b[projSort.col]||'').toLowerCase();return va<vb?(projSort.asc?-1:1):va>vb?(projSort.asc?1:-1):0});
  const cols=[{key:'project',label:'物件名'},{key:'our_person',label:'担当者'},{key:'estimate_no',label:'見積番号'},{key:'order_no',label:'受注番号'},{key:'client',label:'得意先'},{key:'person',label:'窓口'},{key:'venue',label:'会場'},{key:'date_load_in',label:'搬入'},{key:'date_event',label:'本番'},{key:'date_teardown',label:'撤去'},{key:'status',label:'ステータス'}];
  let h=`<div class="av-top"><button class="av-add" onclick="openProjMo()">+ 新規登録</button><input class="av-search" placeholder="検索..." oninput="projSearch(this.value)"></div>`;
  h+='<div class="tbl-wrap"><table><thead><tr>';cols.forEach(c=>{const a=projSort.col===c.key?(projSort.asc?'▲':'▼'):'';h+=`<th data-col="${c.key}">${c.label}<span class="arrow">${a}</span></th>`});h+='<th>伝票</th><th>操作</th></tr></thead><tbody>';
  items.forEach(d=>{h+='<tr>';cols.forEach(c=>{let v=d[c.key]||'';if(c.key==='status'){const opts=['見積中','受注','準備中','現場中','レンタル中','完了','見送り'];h+=`<td><select onchange="changeProjStatus('${d.id}',this.value)" style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;font:400 13px/1 'Noto Sans JP',sans-serif;background:var(--surface2);cursor:pointer">`;opts.forEach(o=>{h+=`<option${v===o?' selected':''}>${o}</option>`});h+='</select></td>'}else{if(c.key.startsWith('date_')&&v){v=String(v).split(',').map(s=>{const dd=parseD(s.trim());return dd?`${dd.getMonth()+1}/${dd.getDate()}`:s}).join(', ')}h+=`<td>${esc(v)}</td>`}});const chk=String(d.invoiced||'').toUpperCase()==='TRUE';h+=`<td style="text-align:center"><input type="checkbox" ${chk?'checked':''} onchange="toggleProjInvoiced('${d.id}',this.checked)" style="width:18px;height:18px;cursor:pointer"></td><td><button class="act-btn" onclick="editProj('${d.id}')">編集</button> <button class="act-btn del" onclick="delProj('${d.id}')">削除</button></td></tr>`});
  h+='</tbody></table></div>';el.innerHTML=h;
  el.querySelectorAll('th[data-col]').forEach(th=>{th.onclick=()=>{const c=th.dataset.col;if(projSort.col===c)projSort.asc=!projSort.asc;else{projSort.col=c;projSort.asc=true}render()}});
}
function projSearch(q){$('projAdminView').querySelectorAll('tbody tr').forEach(r=>{r.style.display=r.textContent.toLowerCase().includes(q.toLowerCase())?'':'none'})}

// ===== 現場詳細 =====
function viewProj(id){const d=projData.find(x=>String(x.id)===String(id));if(!d)return;const fmtDates=s=>{if(!s)return'';return String(s).split(',').map(x=>{const dd=parseD(x.trim());return dd?`${dd.getMonth()+1}/${dd.getDate()}（${dow[dd.getDay()]}）`:''}).filter(Boolean).join('、')};let h='';h+=vr('物件名',d.project);if(d.our_person)h+=vr('担当者',d.our_person);if(d.estimate_no)h+=vr('見積番号',d.estimate_no);if(d.order_no)h+=vr('受注番号',d.order_no);h+=vr('得意先',d.client);h+=vr('窓口',d.person);if(d.venue)h+=vr('会場',d.venue);if(d.address)h+=vr('住所',d.address);h+='<div class="view-section"><h3>日程</h3>';if(d.date_load_in)h+=vr('搬入',fmtDates(d.date_load_in));if(d.date_setup)h+=vr('設営',fmtDates(d.date_setup));if(d.date_event)h+=vr('本番',fmtDates(d.date_event));if(d.date_teardown)h+=vr('撤去',fmtDates(d.date_teardown));if(d.date_rental_out)h+=vr('貸出',fmtDates(d.date_rental_out));if(d.date_rental_return)h+=vr('返却',fmtDates(d.date_rental_return));h+='</div>';if(d.people_load_in||d.people_setup||d.people_event||d.people_teardown){h+='<div class="view-section"><h3>人数（予定）</h3>';if(d.people_load_in)h+=vr('搬入',d.people_load_in+'人');if(d.people_setup)h+=vr('設営',d.people_setup+'人');if(d.people_event)h+=vr('本番',d.people_event+'人');if(d.people_teardown)h+=vr('撤去',d.people_teardown+'人');h+='</div>'}const hasVh=d.vehicles_load_in||d.vehicles_setup||d.vehicles_event||d.vehicles_teardown||d.vehicles_rental_out||d.vehicles_rental_return;if(hasVh){h+='<div class="view-section"><h3>車両</h3>';if(d.vehicles_load_in)h+=vr('搬入',d.vehicles_load_in);if(d.vehicles_setup)h+=vr('設営',d.vehicles_setup);if(d.vehicles_event)h+=vr('本番',d.vehicles_event);if(d.vehicles_teardown)h+=vr('撤去',d.vehicles_teardown);if(d.vehicles_rental_out)h+=vr('貸出',d.vehicles_rental_out);if(d.vehicles_rental_return)h+=vr('返却',d.vehicles_rental_return);h+='</div>'}if(d.rentals)h+='<div class="view-section"><h3>レンタル品（メモ）</h3><div class="view-row"><div class="view-val">'+esc(d.rentals)+'</div></div></div>';const projRentals=rentalsData.filter(r=>r.client_name===d.project);h+='<div class="rental-add-section"><h3>レンタル品</h3>';if(projRentals.length){projRentals.forEach(r=>{const ds=r.date_start?((new Date(r.date_start+'T00:00:00').getMonth()+1)+'/'+new Date(r.date_start+'T00:00:00').getDate()):'';const de=r.date_end?((new Date(r.date_end+'T00:00:00').getMonth()+1)+'/'+new Date(r.date_end+'T00:00:00').getDate()):'';h+='<div class="rental-existing"><span class="re-info">'+esc(r.category)+' '+esc(r.item_name)+' × '+r.qty+'　'+ds+'〜'+de+'　<span style="font-size:11px;padding:2px 6px;border-radius:4px;background:var(--purple-dim);color:var(--purple)">'+esc(r.status)+'</span></span><button class="re-del" onclick="deleteProjectRental(\''+r.id+'\')">削除</button></div>'})}else{h+='<div style="font-size:12px;color:var(--text-faint);margin-bottom:6px">まだ登録されていません</div>'}h+='<div id="rentalAddRows"></div><button class="rental-add-btn" onclick="addRentalRow(\''+esc(d.project)+'\')">＋ レンタル品を追加</button>';h+='<div id="rentalSaveBtnWrap" class="hidden"><button class="rental-save-btn" onclick="saveProjectRentals(\''+esc(d.project)+'\')">まとめて登録</button></div>';h+='</div>';if(d.notes)h+='<div class="view-section"><h3>備考</h3><div class="view-row"><div class="view-val">'+esc(d.notes)+'</div></div></div>';
  h+='<div class="st-change"><div class="st-change-label">ステータス変更</div><div class="st-change-btns">';
  ['見積中','受注','準備中','現場中','レンタル中','完了'].forEach(s=>{const on=d.status===s?' on':'';h+=`<button class="st-btn${on}" data-st="${s}">${s}</button>`});
  h+='</div></div>';
  $('projViewContent').innerHTML=h;
  $('projViewContent').querySelectorAll('.st-btn').forEach(btn=>{btn.onclick=()=>{const newSt=btn.dataset.st;if(d.status===newSt)return;d.status=newSt;fireAndForget({dept:'project',action:'save',id:d.id,status:newSt});toast(newSt+'に変更しました');viewProj(id);render()}});
  $('projViewBg').classList.add('show')}

// ===== モーダル操作 =====
function openProjMo(d){$('projMoTitle').textContent=d?'現場編集':'現場登録';$('xf_id').value=d?d.id:'';$('xf_project').value=d?d.project:'';$('xf_our_person').value=d?d.our_person||'':'';$('xf_estimate_no').value=d?d.estimate_no||'':'';$('xf_order_no').value=d?d.order_no||'':'';$('xf_client').value=d?d.client||'':'';$('xf_person').value=d?d.person||'':'';$('xf_venue').value=d?d.venue||'':'';$('xf_address').value=d?d.address||'':'';$('xf_status').value=d?d.status||'受注':'受注';['load_in','setup','event','teardown','rental_out','rental_return'].forEach(phase=>{const key='date_'+phase;const el=$('xf_dates_'+phase);el.innerHTML='';const vals=d&&d[key]?String(d[key]).split(',').map(s=>s.trim()).filter(Boolean):[];if(vals.length)vals.forEach(v=>addDateInput('xf_dates_'+phase,v));else addDateInput('xf_dates_'+phase)});$('xf_people_load_in').value=d?d.people_load_in||'':'';$('xf_people_setup').value=d?d.people_setup||'':'';$('xf_people_event').value=d?d.people_event||'':'';$('xf_people_teardown').value=d?d.people_teardown||'':'';$('xf_rentals').value=d?d.rentals||'':'';$('xf_notes').value=d?d.notes||'':'';VH_PHASES.forEach(p=>setVehiclesForPhase(p,d?d['vehicles_'+p]||'':''));$('xf_is_rental').checked=(d&&d.type==='レンタル');applyProjTypeUI();$('projMoBg').classList.add('show')}
function toggleProjType(){
  const cb=$('xf_is_rental');
  cb.checked=!cb.checked;
  applyProjTypeUI();
}
function applyProjTypeUI(){
  const isRental=$('xf_is_rental').checked;
  document.querySelectorAll('#projMoBg .setup-only, #projMoBg .setup-only-hd').forEach(el=>{
    if(isRental)el.classList.add('rental-disabled');
    else el.classList.remove('rental-disabled');
  });
}
function closeProjMo(){$('projMoBg').classList.remove('show')}
function editProj(id){const d=projData.find(x=>x.id===id);if(d)openProjMo(d)}

// ===== 保存（楽観的更新） =====
function saveProj(){
  const name=$('xf_project').value.trim();
  if(!name){toast('物件名を入力してください',true);return}
  const editId=$('xf_id').value;
  const isRental=$('xf_is_rental').checked;
  const type=isRental?'レンタル':'現場';
  const body={dept:'project',action:'save',id:editId||undefined,project:name,type:type,our_person:$('xf_our_person').value.trim(),estimate_no:$('xf_estimate_no').value.trim(),order_no:$('xf_order_no').value.trim(),client:$('xf_client').value.trim(),person:$('xf_person').value.trim(),venue:$('xf_venue').value.trim(),address:$('xf_address').value.trim(),status:$('xf_status').value,date_load_in:isRental?'':getDatesFromList('xf_dates_load_in'),date_setup:isRental?'':getDatesFromList('xf_dates_setup'),date_event:isRental?'':getDatesFromList('xf_dates_event'),date_teardown:isRental?'':getDatesFromList('xf_dates_teardown'),date_rental_out:getDatesFromList('xf_dates_rental_out'),date_rental_return:getDatesFromList('xf_dates_rental_return'),people_load_in:isRental?'':$('xf_people_load_in').value,people_setup:isRental?'':$('xf_people_setup').value,people_event:isRental?'':$('xf_people_event').value,people_teardown:isRental?'':$('xf_people_teardown').value,vehicles_load_in:isRental?'':getVehiclesFromPhase('load_in'),vehicles_setup:isRental?'':getVehiclesFromPhase('setup'),vehicles_event:isRental?'':getVehiclesFromPhase('event'),vehicles_teardown:isRental?'':getVehiclesFromPhase('teardown'),vehicles_rental_out:getVehiclesFromPhase('rental_out'),vehicles_rental_return:getVehiclesFromPhase('rental_return'),rentals:$('xf_rentals').value.trim(),notes:$('xf_notes').value.trim()};
  const isNew=!editId;
  if(editId){
    const idx=projData.findIndex(x=>String(x.id)===String(editId));
    if(idx!==-1)projData[idx]={...projData[idx],...body};
  }else{
    body.id='tmp_'+Date.now();
    projData.push(body);
  }
  fireAndForget(body);
  toast('保存しました');
  closeProjMo();
  render();
  // 新規作成時は GAS が実IDを採番するまで待って再同期（tmp_id 残留防止）
  if(isNew)setTimeout(loadAll,3000);
}

// ===== 削除（楽観的更新） =====
function delProj(id){
  if(!confirm('この現場を削除しますか？'))return;
  projData=projData.filter(x=>x.id!==id);
  fireAndForget({dept:'project',action:'delete',id:id});
  toast('削除しました');
  render();
}

// ===== レンタル品追加（現場詳細から） =====
function getInvCategories(){const cats=new Set();inventoryItems.forEach(i=>{if(i.category)cats.add(i.category)});return[...cats].sort()}
function getInvItemsByCat(cat){return inventoryItems.filter(i=>i.category===cat)}
function addRentalRow(projectName){
  const wrap=$('rentalAddRows');
  const cats=getInvCategories();
  const row=document.createElement('div');row.className='rental-add-row';
  const catSel=document.createElement('select');catSel.className='ra-cat';
  catSel.innerHTML='<option value="">カテゴリ</option>'+cats.map(c=>'<option value="'+c+'">'+c+'</option>').join('');
  const itemSel=document.createElement('select');itemSel.className='ra-item';
  itemSel.innerHTML='<option value="">商品</option>';
  catSel.onchange=()=>{const items=getInvItemsByCat(catSel.value);itemSel.innerHTML='<option value="">商品</option>'+items.map(i=>'<option value="'+esc(String(i.item_name))+'">'+esc(String(i.item_name))+' ('+i.total_qty+')</option>').join('')};
  const qtyInp=document.createElement('input');qtyInp.className='ra-qty';qtyInp.type='number';qtyInp.min='1';qtyInp.value='1';qtyInp.placeholder='数量';
  const startInp=document.createElement('input');startInp.className='ra-date';startInp.type='date';
  const endInp=document.createElement('input');endInp.className='ra-date';endInp.type='date';
  const rmBtn=document.createElement('button');rmBtn.className='ra-rm';rmBtn.textContent='×';rmBtn.onclick=()=>{row.remove();if(!wrap.children.length)$('rentalSaveBtnWrap').classList.add('hidden')};
  row.appendChild(catSel);row.appendChild(itemSel);row.appendChild(qtyInp);row.appendChild(startInp);row.appendChild(endInp);row.appendChild(rmBtn);
  wrap.appendChild(row);
  $('rentalSaveBtnWrap').classList.remove('hidden');
}

// レンタル品保存（楽観的更新）
function saveProjectRentals(projectName){
  const rows=$('rentalAddRows').querySelectorAll('.rental-add-row');
  if(!rows.length){toast('追加する行がありません',true);return}
  const items=[];
  for(const row of rows){
    const cat=row.querySelector('.ra-cat').value;
    const item=row.querySelector('.ra-item').value;
    const qty=row.querySelector('.ra-qty').value;
    const dates=row.querySelectorAll('.ra-date');
    const start=dates[0]?.value||'';
    const end=dates[1]?.value||'';
    if(!cat||!item||!start||!end){toast('カテゴリ・商品・日付を全て入力してください',true);return}
    const rental={category:cat,item_name:item,qty:qty,date_start:start,date_end:end,status:'予約',client_name:projectName,notes:''};
    items.push(rental);
    // ローカル配列に追加
    rentalsData.push({...rental,id:'tmp_'+Date.now()+'_'+Math.random().toString(36).slice(2,6)});
    // fire-and-forget
    fireAndForget({dept:'inventory',action:'save_rental',...rental});
  }
  toast(items.length+'件登録しました');
  // 現場詳細を再表示
  const d=projData.find(x=>x.project===projectName);
  if(d)viewProj(d.id);
}

// レンタル品削除（楽観的更新）
function deleteProjectRental(id){
  if(!confirm('このレンタル品を削除しますか？'))return;
  rentalsData=rentalsData.filter(x=>x.id!==id);
  fireAndForget({dept:'inventory',action:'delete_rental',id:id});
  toast('削除しました');
  $('projViewBg').classList.remove('show');
}

// ===== イベント =====
$('projTabs').addEventListener('click',e=>{const t=e.target.closest('.sub-tab');if(!t)return;$('projTabs').querySelectorAll('.sub-tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');curProjView=t.dataset.view;render()});
/* 背景クリックで閉じない — 明示的にボタンで閉じる */
loadAll();
// 自動更新：5分間隔、タブが見えてる時だけ、前回が走り切ってから
let _bgBusy=false;
setInterval(()=>{
  if(document.visibilityState!=='visible')return;
  if(_bgBusy)return;
  _bgBusy=true;
  Promise.resolve(loadAll()).finally(()=>{_bgBusy=false});
},5*60*1000);

// 「↻ 更新」ボタン共通：連打防止＋進行表示
async function safeRefresh(btn, fn){
  if(!btn || btn.disabled) return;
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '↻ 更新中...';
  try{
    await Promise.resolve(fn());
    btn.innerHTML = '✓ 完了';
  }catch(e){
    btn.innerHTML = '⚠ 失敗';
  }finally{
    setTimeout(()=>{ btn.innerHTML = orig; btn.disabled = false; }, 1000);
  }
}

</script>
