<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>時間外ボード</title>

<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23ea580c'/><text x='90' y='125' text-anchor='middle' font-family='sans-serif' font-weight='900' font-size='100' fill='white'>時</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f4f5f7;--surface:#fff;--surface2:#eef0f4;--surface3:#e2e5ec;
  --border:#d4d8e1;--border-light:#c0c6d2;
  --text:#1a1d27;--text-dim:#5f6477;--text-faint:#8e93a6;
  --accent:#2563eb;--accent-light:#dbeafe;--accent-hover:#1d4ed8;
  --green:#16a34a;--green-light:#dcfce7;
  --orange:#ea580c;--orange-light:#ffedd5;
  --red:#dc2626;--red-light:#fee2e2;
  --purple:#7c3aed;--purple-light:#ede9fe;
  --radius:10px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
html{font-size:15px}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px}
.header{background:#1e2130;color:#fff;padding:0 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100;height:56px}
.header h1{font-size:17px;font-weight:900;letter-spacing:.04em;margin-right:auto}
.nav-link{background:none;border:none;color:rgba(255,255,255,.6);font:600 13px/1 'Noto Sans JP',sans-serif;padding:8px 14px;border-radius:8px;cursor:pointer;transition:.15s;text-decoration:none;display:inline-flex;align-items:center}
.nav-link:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav-link.on{color:#fff;background:#3b6de7}
.hdr-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:7px 14px;border-radius:8px;font:500 12px/1 'Noto Sans JP',sans-serif;cursor:pointer}
.hdr-btn:hover{color:#fff;border-color:rgba(255,255,255,.5)}
.tabs{display:flex;gap:0;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;position:sticky;top:56px;z-index:90}
.tab{padding:12px 20px;font:600 13px/1 'Noto Sans JP',sans-serif;color:var(--text-dim);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.week-bar{display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border)}
.week-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:var(--radius);font:500 13px/1 'Noto Sans JP',sans-serif;cursor:pointer;transition:.15s}
.week-btn:hover{background:var(--surface3)}
.week-label{font:700 14px/1 'Noto Sans JP',sans-serif;flex:1;text-align:center}
.request-banner{margin:12px 16px;padding:14px 18px;background:var(--orange-light);border:1px solid #fed7aa;border-radius:var(--radius);font:500 13px/1.6 'Noto Sans JP',sans-serif;color:#9a3412}
.request-banner strong{font-weight:700}
.staff-section{padding:16px}
.staff-select-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.staff-chip{padding:8px 16px;border-radius:20px;font:600 13px/1 'Noto Sans JP',sans-serif;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;transition:.15s}
.staff-chip:hover{border-color:var(--accent);color:var(--accent)}
.staff-chip.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.day-grid{display:flex;flex-direction:column;gap:8px}
.day-row{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow)}
.day-row.holiday-row{background:#fffbeb;border:1px solid #fde68a}
.day-label{font:700 13px/1 'Noto Sans JP',sans-serif;width:80px;flex-shrink:0}
.day-label .date{font:400 11px/1 'Noto Sans JP',sans-serif;color:var(--text-faint);margin-top:2px}
.day-label .holiday-name{font:400 10px/1 'Noto Sans JP',sans-serif;color:var(--red);margin-top:2px}
.day-label.today{color:var(--accent)}
.day-label.sat{color:var(--accent)}
.day-label.sun,.day-label.holiday{color:var(--red)}
.time-chips{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.time-chip{padding:6px 12px;border-radius:6px;font:500 12px/1 'Noto Sans JP',sans-serif;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;transition:.15s;min-width:56px;text-align:center}
.time-chip:hover{border-color:var(--accent);color:var(--accent)}
.time-chip.selected{background:var(--green);color:#fff;border-color:var(--green)}
.time-chip.holiday-chip{border-color:#fbbf24;min-width:64px}
.time-chip.holiday-chip:hover{border-color:var(--orange);color:var(--orange)}
.time-chip.holiday-chip.selected{background:var(--orange);color:#fff;border-color:var(--orange)}
.day-clear{font:500 11px/1 'Noto Sans JP',sans-serif;color:var(--red);background:none;border:none;cursor:pointer;padding:4px 8px}
.day-clear:hover{text-decoration:underline}
.admin-section{padding:16px}
.admin-tools{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.admin-btn{padding:8px 18px;border-radius:var(--radius);font:600 13px/1 'Noto Sans JP',sans-serif;border:none;cursor:pointer;transition:.15s}
.admin-btn.primary{background:var(--accent);color:#fff}
.admin-btn.primary:hover{background:var(--accent-hover)}
.admin-btn.danger{background:var(--red-light);color:var(--red)}
.admin-btn.secondary{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border)}
.admin-btn.secondary:hover{background:var(--surface3)}
.overview-grid{display:flex;flex-direction:column;gap:2px;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.ov-header{display:grid;grid-template-columns:100px repeat(var(--cols),1fr);background:#1e293b;color:#fff;font:700 12px/1 'Noto Sans JP',sans-serif}
.ov-header .ov-cell{padding:10px 8px;text-align:center}
.ov-header .ov-cell.today-col{background:#334155}
.ov-header .ov-cell.holiday-col{background:#92400e}
.ov-row{display:grid;grid-template-columns:100px repeat(var(--cols),1fr);border-bottom:1px solid var(--border)}
.ov-row:last-child{border-bottom:none}
.ov-row:nth-child(even){background:#f8f9fb}
.ov-cell{padding:8px;font:500 12px/1.4 'Noto Sans JP',sans-serif;text-align:center}
.ov-cell.name-cell{text-align:left;font-weight:700;color:var(--text)}
.ov-cell.today-col{background:var(--accent-light)}
.ov-cell.holiday-col{background:#fffbeb}
.ov-cell .ot-time{display:inline-block;padding:3px 8px;border-radius:4px;background:var(--green-light);color:var(--green);font-weight:600;font-size:11px}
.ov-cell .ot-holiday{display:inline-block;padding:3px 8px;border-radius:4px;background:var(--orange-light);color:var(--orange);font-weight:600;font-size:11px}
.ov-cell .ot-none{color:var(--text-faint);font-size:11px}
.ov-summary{display:grid;grid-template-columns:100px repeat(var(--cols),1fr);background:var(--accent-light);font:700 12px/1 'Noto Sans JP',sans-serif;color:var(--accent);border-top:2px solid var(--accent)}
.ov-summary .ov-cell{padding:10px 8px}
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;justify-content:center;align-items:center}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border-radius:14px;padding:24px;width:90%;max-width:420px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h2{font:800 17px/1 'Noto Sans JP',sans-serif;margin-bottom:16px}
.modal-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-dim);margin-top:-4px}
.modal input[type=text]{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font:400 14px/1 'Noto Sans JP',sans-serif;margin-bottom:10px}
.staff-list-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border)}
.staff-list-item:last-child{border-bottom:none}
.staff-list-item span{font:500 14px/1 'Noto Sans JP',sans-serif}
.staff-del{background:none;border:none;color:var(--red);font:500 12px/1 'Noto Sans JP',sans-serif;cursor:pointer;padding:4px 8px}
.staff-del:hover{text-decoration:underline}
.req-textarea{width:100%;min-height:80px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font:400 14px/1.5 'Noto Sans JP',sans-serif;resize:vertical;margin-bottom:12px}
.loading{text-align:center;padding:40px;color:var(--text-faint);font:500 14px/1 'Noto Sans JP',sans-serif}
@media(max-width:768px){
  html{font-size:14px}
  body{padding-bottom:40px}

  /* ヘッダー：横スクロール */
  .header{padding:0 10px;gap:4px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .header::-webkit-scrollbar{display:none}
  .header h1{font-size:15px;margin-right:6px;flex-shrink:0;white-space:nowrap}
  .nav-link{font-size:12px;padding:8px 10px;flex-shrink:0;white-space:nowrap}
  .hdr-btn{font-size:11px;padding:7px 10px;flex-shrink:0;white-space:nowrap}

  /* タブ */
  .tabs{padding:0 10px;top:56px}
  .tab{padding:12px 16px;font-size:13px;min-height:46px;flex:1;text-align:center}

  /* 週ナビ：コンパクトに */
  .week-bar{padding:10px 12px;gap:8px}
  .week-btn{padding:10px 12px;font-size:12px;min-height:40px}
  .week-label{font-size:13px}

  /* リクエストバナー */
  .request-banner{margin:10px 12px;padding:12px 14px;font-size:12px;line-height:1.5}

  /* 申告ビュー */
  .staff-section{padding:12px 10px}
  .staff-select-bar{gap:6px;margin-bottom:14px}
  .staff-select-bar>span{width:100%;margin-bottom:4px}
  .staff-chip{padding:10px 14px;font-size:13px;min-height:40px}

  /* day-row：縦積み、時間チップ拡大 */
  .day-row{flex-direction:column;align-items:stretch;gap:10px;padding:12px 14px}
  .day-row.holiday-row{background:#fffbeb}
  .day-label{width:auto;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .day-label .date{margin-top:0;font-size:12px}
  .day-label .holiday-name{margin-top:0;font-size:11px}
  .time-chips{gap:6px}
  .time-chip{padding:11px 10px;font-size:13px;min-height:44px;flex:0 1 calc(33.333% - 6px);min-width:0;text-align:center}
  .time-chip.holiday-chip{flex-basis:calc(33.333% - 6px)}
  .day-clear{align-self:flex-end;padding:8px 12px;font-size:12px;min-height:36px}

  /* 管理ビュー：overview-grid は横スクロール */
  .admin-section{padding:12px 10px}
  .admin-tools{gap:8px;margin-bottom:12px}
  .admin-btn{padding:10px 14px;font-size:12px;min-height:42px}
  .overview-grid{overflow-x:auto;-webkit-overflow-scrolling:touch;display:block}
  .overview-grid::-webkit-scrollbar{height:6px}
  .overview-grid::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}
  .ov-header,.ov-row,.ov-summary{min-width:560px;font-size:11px;display:grid}
  .ov-header{grid-template-columns:80px repeat(var(--cols),minmax(60px,1fr))}
  .ov-row{grid-template-columns:80px repeat(var(--cols),minmax(60px,1fr))}
  .ov-summary{grid-template-columns:80px repeat(var(--cols),minmax(60px,1fr))}
  .ov-cell{padding:8px 4px}
  .ov-cell.name-cell{font-size:11px;text-align:left}
  .ov-cell .ot-time,.ov-cell .ot-holiday{font-size:10px;padding:3px 6px}

  /* モーダル：ボトムシート風 */
  .modal-bg{align-items:flex-end;padding:0}
  .modal{width:100%;max-width:100%;border-radius:14px 14px 0 0;padding:20px 16px 24px;max-height:92vh}
  .modal h2{font-size:16px;margin-bottom:14px}
  .modal input[type=text]{padding:12px 14px;font-size:16px;min-height:44px}
  .req-textarea{padding:12px 14px;font-size:16px;min-height:90px}
  .staff-list-item{padding:12px;font-size:14px}
  .staff-list-item span{font-size:14px}
  .staff-del{padding:8px 12px;font-size:12px;min-height:36px}
}
@media(max-width:420px){
  .nav-link{font-size:11px;padding:7px 8px}
  .header h1{font-size:14px}
  .hdr-btn{font-size:10px;padding:6px 8px}
  .time-chip{flex-basis:calc(50% - 6px);font-size:12px}
  .time-chip.holiday-chip{flex-basis:calc(50% - 6px)}
  .week-btn{padding:9px 10px;font-size:11px}
  .week-label{font-size:12px}
}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:14px 28px;border-radius:12px;font:600 14px/1 'Noto Sans JP',sans-serif;z-index:999;opacity:0;transition:.3s;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.15)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:#059669;color:#fff}
.toast.err{background:#dc2626;color:#fff}

.home-link{display:inline-flex;align-items:center}
.nav-right{display:contents}
.nav-menu-btn{display:none;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:20px;line-height:1;padding:4px 12px;border-radius:8px;cursor:pointer;flex-shrink:0}
.nav-menu-btn:hover{background:rgba(255,255,255,.2)}
@media(max-width:768px){
  .nav-right{display:none;position:fixed;top:56px;right:10px;background:#1e2130;border-radius:10px;padding:6px;flex-direction:column;gap:2px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:999;min-width:160px}
  .nav-right.open{display:flex}
  .nav-right .nav-link{padding:10px 14px;border-radius:6px;font-size:14px;text-align:left}
  .nav-menu-btn{display:inline-flex;align-items:center;justify-content:center}
  .nav-spacer{flex:1}
}
</style>
</head>
<body>

</div>

      <input type="text" id="newStaffName" placeholder="名前を入力">
      <button class="admin-btn primary" onclick="addStaff()" style="flex-shrink:0">追加</button>
    </div>
    <div id="staffListItems"></div>
  </div>
</div>
<div class="modal-bg" id="reqModalBg">
  <div class="modal">
    <button class="modal-close" onclick="closeReqModal()">✕</button>
    <h2>時間外募集を出す</h2>
    <p style="font:400 13px/1.6 'Noto Sans JP',sans-serif;color:var(--text-dim);margin-bottom:12px">この週に時間外募集のメッセージを表示します。従業員側に表示されます。</p>

      <button class="admin-btn primary" onclick="submitRequest()">募集を出す</button>
    </div>
  </div>
</div>
<script>
function toggleNavMenu(){
  const el=document.querySelector('.nav-right');
  if(el)el.classList.toggle('open');
}
document.addEventListener('click',function(e){
  const btn=e.target.closest('.nav-menu-btn');
  const menu=e.target.closest('.nav-right');
  if(!btn&&!menu){
    const nr=document.querySelector('.nav-right');
    if(nr)nr.classList.remove('open');
  }
});
const API='https://script.google.com/macros/s/AKfycbwD5F1rJcdg7pl1lnVXzyY0vttcO88z-YKUZWG3eLIT0DNMhFZw8jXbJoKW6wCIKEC7/exec';
const DEPT='overtime';
const TIME_SLOTS=['18:00','18:30','19:00','19:30','20:00'];
const HOLIDAY_SLOTS=['午前','午後','終日'];
const DAY_NAMES=['日','月','火','水','木','金','土'];
const HOLIDAYS={
  '2025-01-01':'元日','2025-01-13':'成人の日','2025-02-11':'建国記念の日','2025-02-23':'天皇誕生日','2025-02-24':'振替休日',
  '2025-03-20':'春分の日','2025-04-29':'昭和の日','2025-05-03':'憲法記念日','2025-05-04':'みどりの日','2025-05-05':'こどもの日','2025-05-06':'振替休日',
  '2025-07-21':'海の日','2025-08-11':'山の日','2025-09-15':'敬老の日','2025-09-23':'秋分の日',
  '2025-10-13':'スポーツの日','2025-11-03':'文化の日','2025-11-23':'勤労感謝の日','2025-11-24':'振替休日',
  '2026-01-01':'元日','2026-01-12':'成人の日','2026-02-11':'建国記念の日','2026-02-23':'天皇誕生日',
  '2026-03-20':'春分の日','2026-04-29':'昭和の日','2026-05-03':'憲法記念日','2026-05-04':'みどりの日','2026-05-05':'こどもの日','2026-05-06':'振替休日',
  '2026-07-20':'海の日','2026-08-11':'山の日','2026-09-21':'敬老の日','2026-09-23':'秋分の日',
  '2026-10-12':'スポーツの日','2026-11-03':'文化の日','2026-11-23':'勤労感謝の日',
  '2027-01-01':'元日','2027-01-11':'成人の日','2027-02-11':'建国記念の日','2027-02-23':'天皇誕生日',
  '2027-03-21':'春分の日','2027-04-29':'昭和の日','2027-05-03':'憲法記念日','2027-05-04':'みどりの日','2027-05-05':'こどもの日',
  '2027-07-19':'海の日','2027-08-11':'山の日','2027-09-20':'敬老の日','2027-09-23':'秋分の日',
  '2027-10-11':'スポーツの日','2027-11-03':'文化の日','2027-11-23':'勤労感謝の日'
};

let currentWeekStart=getMonday(new Date());
let staffList=[];
let entries=[];
let selectedStaff=localStorage.getItem('ot_my_name')||'';
let currentTab='staff';
let staffShuffled=false;
let currentRequest=null;

function getMonday(d){const dt=new Date(d);const day=dt.getDay();const diff=day===0?-6:1-day;dt.setDate(dt.getDate()+diff);dt.setHours(0,0,0,0);return dt;}
function toast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(err?'err':'ok');setTimeout(()=>t.className='toast',3000);}
function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getWeekDates(mon){const dates=[];for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(d.getDate()+i);dates.push(d);}return dates;}
function isHolidayOrWeekend(ds,dow){return dow===0||dow===6||HOLIDAYS.hasOwnProperty(ds);}
function getHolidayName(ds){return HOLIDAYS[ds]||null;}
function todayStr(){return fmtDate(new Date());}

async function apiGet(params){const qs=new URLSearchParams({dept:DEPT,...params}).toString();const r=await fetch(API+'?'+qs);return r.json();}
async function apiPost(body){fetch(API,{method:'POST',mode:'no-cors',body:JSON.stringify({dept:DEPT,...body})});return{success:true};}

let syncTimer=null;
let pendingOps=0;
function scheduleSyncFromServer(){
  if(syncTimer)clearTimeout(syncTimer);
  pendingOps++;
  syncTimer=setTimeout(async()=>{
    pendingOps--;
    if(pendingOps>0)return;
    try{
      const entryRes=await apiGet({action:'entries',week_start:fmtDate(currentWeekStart)});
      entries=entryRes.data||[];
      render();
    }catch(e){toast('データ同期に失敗しました',true)}
  },6000);
}

async function loadAll(){
  try{
    const[staffRes,entryRes,reqRes]=await Promise.all([
      apiGet({action:'staff'}),
      apiGet({action:'entries',week_start:fmtDate(currentWeekStart)}),
      apiGet({action:'request',week_start:fmtDate(currentWeekStart)})
    ]);
    staffList=staffRes.data||[];
    if(!staffShuffled){for(let i=staffList.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[staffList[i],staffList[j]]=[staffList[j],staffList[i]]}staffShuffled=true;}
    entries=entryRes.data||[];
    currentRequest=reqRes.data||null;
  }catch(e){console.error('Load error:',e);staffList=[];entries=[];currentRequest=null;toast('データ取得に失敗しました',true);}
  render();
}
async function refreshData(){document.getElementById('overviewGrid').innerHTML='<div class="loading">読み込み中...</div>';await loadAll();}

function changeWeek(delta){const d=new Date(currentWeekStart);d.setDate(d.getDate()+7*delta);currentWeekStart=d;entries=[];render();loadAll();}
function goThisWeek(){currentWeekStart=getMonday(new Date());entries=[];render();loadAll();}
function renderWeekLabel(){const dates=getWeekDates(currentWeekStart);const s=dates[0],e=dates[6];document.getElementById('weekLabel').textContent=`${s.getMonth()+1}/${s.getDate()} (月) 〜 ${e.getMonth()+1}/${e.getDate()} (日)`;}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[tab==='staff'?0:1].classList.add('active');
  document.getElementById('staffView').style.display=tab==='staff'?'':'none';
  document.getElementById('adminView').style.display=tab==='admin'?'':'none';
  render();
}

function render(){renderWeekLabel();renderBanner();if(currentTab==='staff')renderStaffView();else renderAdminView();}

function renderBanner(){
  const banner=document.getElementById('requestBanner');
  if(currentRequest&&currentRequest.active){banner.style.display='';banner.innerHTML='<strong>📢 時間外募集中：</strong>'+esc(currentRequest.message);}
  else{banner.style.display='none';}
}

function renderStaffView(){
  const container=document.getElementById('staffChips');
  let html='<label style="font:600 13px/1 \'Noto Sans JP\',sans-serif;color:var(--text-dim);display:flex;align-items:center;gap:10px;flex-wrap:wrap;width:100%">自分を選択：';
  html+='<select id="staffSelect" onchange="onStaffSelectChange()" style="flex:1;min-width:200px;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font:500 14px/1 \'Noto Sans JP\',sans-serif;background:var(--surface)">';
  html+='<option value="">-- 氏名を選んでください --</option>';
  // dept別にまとめる
  const byDept={};
  staffList.forEach(s=>{
    const d=s.dept||'その他';
    if(!byDept[d])byDept[d]=[];
    byDept[d].push(s);
  });
  Object.keys(byDept).forEach(dept=>{
    html+=`<optgroup label="${esc(dept)}">`;
    byDept[dept].forEach(s=>{
      const sel=s.name===selectedStaff?' selected':'';
      html+=`<option value="${esc(s.name)}"${sel}>${esc(s.name)}</option>`;
    });
    html+='</optgroup>';
  });
  html+='</select></label>';
  container.innerHTML=html;

  const grid=document.getElementById('dayGrid');
  if(!selectedStaff){grid.innerHTML='<div class="loading">上から自分の名前を選んでください</div>';return;}

  const dates=getWeekDates(currentWeekStart);
  const today=todayStr();
  let dhtml='';

  dates.forEach(d=>{
    const ds=fmtDate(d);
    const dow=d.getDay();
    const dayName=DAY_NAMES[dow];
    const isToday=ds===today;
    const holidayName=getHolidayName(ds);
    const isHoliday=isHolidayOrWeekend(ds,dow);
    const isSat=dow===6;
    const isSun=dow===0;
    let labelCls=isToday?'today':(holidayName||isSun)?'holiday':isSat?'sat':'';
    let rowCls=isHoliday?'holiday-row':'';
    const entry=entries.find(e=>e.name===selectedStaff&&e.date===ds);
    const selectedTime=entry?entry.until_time:'';
    const slots=isHoliday?HOLIDAY_SLOTS:TIME_SLOTS;
    const chipCls=isHoliday?'holiday-chip':'';

    dhtml+=`<div class="day-row ${rowCls}">
      <div class="day-label ${labelCls}">
        ${dayName}曜日
        <div class="date">${d.getMonth()+1}/${d.getDate()}${isToday?' (今日)':''}</div>
        ${holidayName?`<div class="holiday-name">${holidayName}</div>`:''}
      </div>
      <div class="time-chips">`;
    slots.forEach(t=>{
      const sel=t===selectedTime?'selected':'';
      dhtml+=`<button class="time-chip ${chipCls} ${sel}" onclick="toggleTime('${ds}','${t}')">${t}</button>`;
    });
    dhtml+=`</div>`;
    if(selectedTime){dhtml+=`<button class="day-clear" onclick="clearDay('${ds}')">取消</button>`;}
    dhtml+=`</div>`;
  });
  grid.innerHTML=dhtml;
}

function selectStaff(name){selectedStaff=name;localStorage.setItem('ot_my_name',name);render();}
function onStaffSelectChange(){const v=document.getElementById('staffSelect').value;selectStaff(v);}

async function toggleTime(date,time){
  const entry=entries.find(e=>e.name===selectedStaff&&e.date===date);
  if(entry&&entry.until_time===time){
    entries=entries.filter(e=>!(e.name===selectedStaff&&e.date===date));
    render();apiPost({action:'delete_entry',name:selectedStaff,date:date});
  }else if(entry){
    entry.until_time=time;render();
    apiPost({action:'save_entry',name:selectedStaff,date:date,until_time:time,week_start:fmtDate(currentWeekStart),note:''});
  }else{
    entries.push({name:selectedStaff,date:date,until_time:time,week_start:fmtDate(currentWeekStart),note:''});
    render();apiPost({action:'save_entry',name:selectedStaff,date:date,until_time:time,week_start:fmtDate(currentWeekStart),note:''});
  }
  scheduleSyncFromServer();
}

async function clearDay(date){
  entries=entries.filter(e=>!(e.name===selectedStaff&&e.date===date));
  render();apiPost({action:'delete_entry',name:selectedStaff,date:date});
  scheduleSyncFromServer();
}

function renderAdminView(){
  const dates=getWeekDates(currentWeekStart);
  const today=todayStr();
  const cols=dates.length;
  let html=`<div class="overview-grid" style="--cols:${cols}">`;
  html+='<div class="ov-header"><div class="ov-cell"></div>';
  dates.forEach(d=>{
    const ds=fmtDate(d);const isToday=ds===today;const dow=d.getDay();
    const isHoliday=isHolidayOrWeekend(ds,dow);
    const colCls=isToday?'today-col':isHoliday?'holiday-col':'';
    html+=`<div class="ov-cell ${colCls}">${d.getMonth()+1}/${d.getDate()}<br>${DAY_NAMES[dow]}</div>`;
  });
  html+='</div>';

  if(staffList.length===0){html+='<div class="loading">従業員が登録されていません</div>';}
  else{
    staffList.forEach(s=>{
      const name=s.name;
      html+='<div class="ov-row">';
      html+=`<div class="ov-cell name-cell">${esc(name)}</div>`;
      dates.forEach(d=>{
        const ds=fmtDate(d);const isToday=ds===today;const dow=d.getDay();
        const isHoliday=isHolidayOrWeekend(ds,dow);
        const colCls=isToday?'today-col':isHoliday?'holiday-col':'';
        const entry=entries.find(e=>e.name===name&&e.date===ds);
        if(entry&&entry.until_time){
          const isH=HOLIDAY_SLOTS.includes(entry.until_time);
          const cls=isH?'ot-holiday':'ot-time';
          const prefix=isH?'':'〜';
          html+=`<div class="ov-cell ${colCls}"><span class="${cls}">${prefix}${entry.until_time}</span></div>`;
        }else{
          html+=`<div class="ov-cell ${colCls}"><span class="ot-none">—</span></div>`;
        }
      });
      html+='</div>';
    });
  }
  html+='</div>';
  document.getElementById('overviewGrid').innerHTML=html;
}

function openStaffModal(){document.getElementById('staffModalBg').classList.add('show');renderStaffList();}
function closeStaffModal(){document.getElementById('staffModalBg').classList.remove('show');}
function renderStaffList(){
  const container=document.getElementById('staffListItems');
  if(staffList.length===0){container.innerHTML='<div style="color:var(--text-faint);padding:12px;font-size:13px">まだ登録されていません</div>';return;}
  let html='';
  staffList.forEach(s=>{const name=s.name;html+=`<div class="staff-list-item"><span>${esc(name)}</span><button class="staff-del" onclick="removeStaff('${esc(name)}')">削除</button></div>`;});
  container.innerHTML=html;
}
function addStaff(){const input=document.getElementById('newStaffName');const name=input.value.trim();if(!name)return;if(staffList.some(s=>s.name===name)){toast('すでに登録されています');return;}staffList.push({name:name,dept:'',employee_no:''});apiPost({action:'save_staff',name:name,active:true});input.value='';renderStaffView();renderStaffList();renderOverview();}
function removeStaff(name){if(!confirm(name+' を削除しますか？'))return;staffList=staffList.filter(s=>s.name!==name);apiPost({action:'delete_staff',name:name});if(selectedStaff===name){selectedStaff='';localStorage.removeItem('ot_my_name');}renderStaffView();renderStaffList();renderOverview();}

function openRequestModal(){document.getElementById('reqModalBg').classList.add('show');document.getElementById('reqMessage').value=currentRequest&&currentRequest.active?currentRequest.message:'';}
function closeReqModal(){document.getElementById('reqModalBg').classList.remove('show');}
function submitRequest(){
  const msg=document.getElementById('reqMessage').value.trim();
  if(!msg){alert('メッセージを入力してください');return;}
  if(currentRequest&&currentRequest.active&&currentRequest.id){apiPost({action:'close_request',id:currentRequest.id});}
  apiPost({action:'save_request',week_start:fmtDate(currentWeekStart),message:msg});
  currentRequest={active:true,message:msg,id:'tmp_'+Date.now(),week_start:fmtDate(currentWeekStart)};
  closeReqModal();renderStaffView();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
/* 背景クリックで閉じない — 明示的にボタンで閉じる */
loadAll();
</script>
<div class="toast" id="toast"></div>
</body>
</html>
